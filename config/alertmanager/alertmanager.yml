# AlertManager Configuration for Moltis
# https://prometheus.io/docs/alerting/latest/configuration/

global:
  # SMTP configuration for email alerts
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # Slack configuration
  slack_api_url: '${SLACK_WEBHOOK}'

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Inhibition rules
inhibit_rules:
  # If critical is firing, suppress warning
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'service']

  # If instance is down, suppress other alerts for that instance
  - source_matchers:
      - alertname="MoltisDown"
    target_matchers:
      - service="moltis"
    equal: ['instance']

  # If Clawdiy is down, suppress follow-on alerts for the same service
  - source_matchers:
      - alertname="ClawdiyDown"
    target_matchers:
      - service="clawdiy"
    equal: ['instance']

# Route tree
route:
  # Default receiver
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'service', 'severity']

  # Wait time before sending initial notification
  group_wait: 30s

  # Wait time before sending updated notification
  group_interval: 5m

  # Wait time before resending notification
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts - immediate notification
    - matchers:
        - severity="critical"
      receiver: 'critical-alerts'
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: true

    # Moltis-specific alerts
    - matchers:
        - service="moltis"
      receiver: 'moltis-team'
      routes:
        - matchers:
            - alertname="MoltisDown"
          receiver: 'moltis-critical'
          group_wait: 10s

    # Clawdiy-specific alerts
    - matchers:
        - service="clawdiy"
      receiver: 'clawdiy-team'
      routes:
        - matchers:
            - alertname="ClawdiyDown"
          receiver: 'clawdiy-critical'
          group_wait: 10s

    # Backup alerts - critical first
    - matchers:
        - alertname=~"BackupFailed|BackupRestoreFailed|BackupStorageFull"
      receiver: 'backup-critical'
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h

    # Backup alerts - warnings
    - matchers:
        - alertname=~"Backup.*"
      receiver: 'backup-alerts'

    # Container alerts
    - matchers:
        - alertname=~"Container.*"
      receiver: 'container-alerts'

    # LLM Failover alerts - critical infrastructure
    - matchers:
        - component="llm-failover"
      receiver: 'llm-failover-alerts'
      routes:
        # All providers down - highest priority
        - matchers:
            - alertname="AllLLMProvidersDown"
          receiver: 'llm-critical'
          group_wait: 10s
          group_interval: 1m
          repeat_interval: 30m
        # Circuit breaker open - high priority
        - matchers:
            - alertname="CircuitBreakerOpen"
          receiver: 'llm-failover-alerts'
          group_wait: 30s
          repeat_interval: 1h
        # Primary LLM down - warning level
        - matchers:
            - alertname="PrimaryLLMProviderDown"
          receiver: 'llm-failover-alerts'
          group_wait: 2m
          repeat_interval: 2h
        # Info level alerts
        - matchers:
            - severity="info"
          receiver: 'llm-failover-info'
          group_wait: 10m
          repeat_interval: 24h

    # Warning alerts - fallback for warnings without a more specific route
    - matchers:
        - severity="warning"
      receiver: 'warning-alerts'
      group_wait: 5m
      group_interval: 10m
      repeat_interval: 4h

# Receivers
receivers:
  # Default receiver
  - name: 'default-receiver'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true

  # Critical alerts
  - name: 'critical-alerts'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: 'CRITICAL: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          *Details:*
          {{ range .Labels.SortedPairs }}  *{{ .Name }}:* {{ .Value }}
          {{ end }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  # Warning alerts
  - name: 'warning-alerts'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: 'WARNING: {{ .GroupLabels.alertname }}'
        color: 'warning'

  # Moltis team
  - name: 'moltis-team'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
    slack_configs:
      - channel: '#moltis-alerts'
        send_resolved: true

  # Moltis critical (pagerduty/ops can be added here)
  - name: 'moltis-critical'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
        headers:
          Subject: '[URGENT] Moltis Down'
    slack_configs:
      - channel: '#moltis-alerts'
        send_resolved: true
        title: 'URGENT: Moltis Service Issue'
        color: 'danger'

  # Clawdiy team
  - name: 'clawdiy-team'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
    slack_configs:
      - channel: '#clawdiy-alerts'
        send_resolved: true

  # Clawdiy critical (pagerduty/ops can be added here)
  - name: 'clawdiy-critical'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
        headers:
          Subject: '[URGENT] Clawdiy Down'
    slack_configs:
      - channel: '#clawdiy-alerts'
        send_resolved: true
        title: 'URGENT: Clawdiy Service Issue'
        color: 'danger'

  # Backup alerts
  - name: 'backup-alerts'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
    slack_configs:
      - channel: '#backup-alerts'
        send_resolved: true
        title: 'Backup Alert: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        color: 'warning'

  # Backup critical - immediate attention
  - name: 'backup-critical'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] Backup Issue Detected'
    slack_configs:
      - channel: '#backup-alerts'
        send_resolved: true
        title: 'CRITICAL: Backup Issue'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Description:* {{ .Annotations.description }}
          *Action Required:* Check backup logs immediately
          {{ end }}
        color: 'danger'

  # Container alerts
  - name: 'container-alerts'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
    slack_configs:
      - channel: '#infra-alerts'
        send_resolved: true

  # ====================================================================
  # LLM FAILOVER ALERT RECEIVERS
  # ====================================================================

  # LLM failover alerts - standard
  - name: 'llm-failover-alerts'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
        headers:
          Subject: '[LLM] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#moltis-alerts'
        send_resolved: true
        title: 'LLM Failover: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Provider State:*
          *Description:* {{ .Annotations.description }}
          *Circuit Breaker:* Check `/tmp/moltis-llm-state.json`
          {{ end }}
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'

  # LLM critical - all providers down
  - name: 'llm-critical'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] All LLM Providers Down'
    slack_configs:
      - channel: '#moltis-alerts'
        send_resolved: true
        title: 'CRITICAL: No LLM Provider Available'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}

          *Immediate Actions:*
          1. Check `openai-codex` auth state in the live Moltis runtime
          2. Check Ollama container: `docker logs ollama-fallback`
          3. Verify OLLAMA_API_KEY is valid for cloud fallback models
          4. Check network connectivity

          *State File:* `/tmp/moltis-llm-state.json`
          {{ end }}
        color: 'danger'

  # LLM failover info - low priority notifications
  - name: 'llm-failover-info'
    email_configs:
      - to: '${NOTIFY_EMAIL}'
        send_resolved: true
        headers:
          Subject: '[INFO] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#moltis-alerts'
        send_resolved: true
        title: 'LLM Info: {{ .GroupLabels.alertname }}'
        color: '#439FE0'  # Blue for info
