# Moltis Backup Configuration
# Copy to backup.conf and customize

# ========================================================================
# RETENTION POLICY
# ========================================================================
RETENTION_DAYS=30        # Keep daily backups for 30 days
RETENTION_WEEKS=12       # Keep weekly backups for 12 weeks
RETENTION_MONTHS=12      # Keep monthly backups for 12 months

# ========================================================================
# ENCRYPTION
# ========================================================================
ENCRYPTION_ENABLED=true
ENCRYPTION_KEY_FILE="/etc/moltis/backup.key"

# ========================================================================
# LOCAL STORAGE
# ========================================================================
BACKUP_DIR="/var/backups/moltis"

# ========================================================================
# CLAWDIY INVENTORY
# ========================================================================
CLAWDIY_BACKUP_ENABLED=true
CLAWDIY_CONFIG_DIR="${PROJECT_ROOT}/config/clawdiy"
CLAWDIY_RUNTIME_DIR="${PROJECT_ROOT}/data/clawdiy/runtime"
CLAWDIY_STATE_DIR="${PROJECT_ROOT}/data/clawdiy/state"
CLAWDIY_AUDIT_DIR="${PROJECT_ROOT}/data/clawdiy/audit"
CLAWDIY_CONTAINER_NAME="clawdiy"
CLAWDIY_RESTORE_AUTOSTART=true
CLAWDIY_ALLOW_PARTIAL_RESTORE=false

# ========================================================================
# S3 OFFSITE BACKUP (AWS)
# ========================================================================
S3_ENABLED=false
S3_BUCKET="your-backup-bucket"
S3_PREFIX="moltis-backups"
AWS_REGION="us-east-1"
# AWS credentials should be configured via:
# - IAM role (recommended for EC2)
# - ~/.aws/credentials file
# - AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY env vars

# ========================================================================
# SFTP OFFSITE BACKUP
# ========================================================================
SFTP_ENABLED=false
SFTP_HOST="backup.example.com"
SFTP_USER="moltis-backup"
SFTP_PATH="/backups/moltis"
# SSH key should be configured for passwordless auth

# ========================================================================
# NOTIFICATIONS
# ========================================================================
NOTIFY_EMAIL="admin@example.com"
SLACK_WEBHOOK=""
# Slack webhook format: https://hooks.slack.com/services/XXX/YYY/ZZZ
