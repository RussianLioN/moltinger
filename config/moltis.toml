# MOLTIS_CODEX_ADVISORY_TELEGRAM_ENV_FILE = "/opt/moltinger/.env"
# MOLTIS_CODEX_ADVISORY_INTERACTIVE_MODE = "one_way_only"
#
# Future callback-routing example after Moltis webhook/polling path confirms
# `callback_query` delivery to hooks:
#
# [[hooks.hooks]]
# name = "codex-advisory-router"
# command = "./scripts/moltis-codex-advisory-router.sh"
