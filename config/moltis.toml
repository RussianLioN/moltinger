- Локальную установленную версию Codex CLI проверяй только если пользователь явно спрашивает именно про локальную установку.
"""                                # Freeform personality text injected into system prompt

# ══════════════════════════════════════════════════════════════════════════════
# USER PROFILE
# ══════════════════════════════════════════════════════════════════════════════
# Information about you. Set during onboarding.

[user]
name = "Сергей"
timezone = "Europe/Moscow"
# name = "Your Name"              # Your name (used in conversations)
# timezone = "America/New_York"   # Your timezone (IANA format)

# ══════════════════════════════════════════════════════════════════════════════
# LLM PROVIDERS
# ══════════════════════════════════════════════════════════════════════════════
# Configure API keys and settings for each LLM provider.
# API keys can also be set via environment variables (preferred for security).
#
# Each provider supports:
#   enabled   - Whether to use this provider (default: true)
#   api_key   - API key (or use env var like ANTHROPIC_API_KEY)
#   base_url  - Override API endpoint
#   model     - Default model for this provider
#   alias     - Custom name for metrics labels (useful for multiple instances)

[providers]
offered = [
    "openai-codex",  # Primary: ChatGPT subscription OAuth
    "ollama",        # Fallback 1: Ollama cloud Gemini
    "openai",        # Fallback 2: GLM-5 via Z.ai Coding Plan
] # Providers shown in onboarding/picker UI ([] = show all)
# All available providers:
#   "anthropic", "openai", "gemini", "groq", "xai", "deepseek",
#   "mistral", "openrouter", "cerebras", "minimax", "moonshot",
#   "venice", "ollama", "local-llm", "openai-codex", "github-copilot",
#   "kimi-code"

# ── Anthropic (Claude) ────────────────────────────────────────
[providers.anthropic]
enabled = false                     # Set to true and add API key to enable
api_key = "${ANTHROPIC_API_KEY}"    # Or set ANTHROPIC_API_KEY env var
model = "claude-sonnet-4-20250514"  # Default model
base_url = "https://api.anthropic.com"
alias = "anthropic"

# ── OpenAI Codex via ChatGPT OAuth ────────────────────────────
[providers.openai-codex]
enabled = true
model = "gpt-5.4"
alias = "openai-codex"
models = ["gpt-5.4"]

# ── OpenAI / GLM-5 via Z.ai Coding Plan ───────────────────────────────────────
# Using Z.ai Coding Plan (Pro subscription) through OpenAI-compatible API
# Docs: https://docs.z.ai/api-reference/introduction
# Coding Plan endpoint: https://api.z.ai/api/coding/paas/v4
[providers.openai]
enabled = true
api_key = "${GLM_API_KEY}"                          # Use GLM_API_KEY from .env
model = "glm-5"                                     # Default model
base_url = "https://api.z.ai/api/coding/paas/v4"    # Coding Plan endpoint
alias = "zai"
models = ["glm-5"]                                  # Keep GLM-5 as third step in chain

# ── GLM (Zhipu AI) - DISABLED (invalid provider name) ────────────────────────
# This section is NOT a valid Moltis provider! Use [providers.openai] instead.
[providers.glm-coding]
enabled = false

# ── Google Gemini ─────────────────────────────────────────────
# Direct Gemini provider stays disabled to keep one explicit fallback path
# through Ollama in the canonical chain.
[providers.gemini]
enabled = false                         # Keep disabled unless direct Gemini is explicitly required
api_key = "${GOOGLE_API_KEY}"           # Or set GOOGLE_API_KEY env var
model = "gemini-2.0-flash-exp"          # Experimental flash model (free tier available)
alias = "gemini"

# ── Groq (Fast inference, free tier) ─────────────────────────────
[providers.groq]
enabled = false                     # Set to true and add API key to enable
api_key = "${GROQ_API_KEY}"         # Or set GROQ_API_KEY env var
model = "llama-3.3-70b-versatile"
alias = "groq"

# ── DeepSeek ──────────────────────────────────────────────────
# [providers.deepseek]
# enabled = true
# api_key = "..."                             # Or set DEEPSEEK_API_KEY env var
# model = "deepseek-chat"
# base_url = "https://api.deepseek.com"
# alias = "deepseek"

# ── xAI (Grok) ────────────────────────────────────────────────
# [providers.xai]
# enabled = true
# api_key = "..."                             # Or set XAI_API_KEY env var
# model = "grok-3-mini"
# alias = "xai"

# ── OpenRouter (multi-provider gateway) ───────────────────────
# [providers.openrouter]
# enabled = true
# api_key = "..."                             # Or set OPENROUTER_API_KEY env var
# model = "anthropic/claude-3.5-sonnet"       # Any model on OpenRouter
# base_url = "https://openrouter.ai/api/v1"

# ── Moonshot (Kimi) ─────────────────────────────────────────
# [providers.moonshot]
# enabled = true
# api_key = "..."                             # Or set MOONSHOT_API_KEY env var
# model = "kimi-k2.5"
# base_url = "https://api.moonshot.ai/v1"
# alias = "moonshot"

# ══════════════════════════════════════════════════════════════════════════════
# CHAT SETTINGS
# ══════════════════════════════════════════════════════════════════════════════

[chat]
message_queue_mode = "followup"   # How to handle messages during an active agent run:
                                  #   "followup" - Queue messages, replay one-by-one after run
                                  #   "collect"  - Buffer messages, concatenate as single message
# priority_models = ["claude-opus-4-5", "gpt-5.4", "gemini-3-flash"]  # Optional: models to pin first in selectors
# allowed_models = ["opus", "gpt 5.4", "gemini-3"]  # Optional: only show models matching these patterns (local-llm/ollama are always included)
# Preferred chain: GPT-5.4 (OAuth) -> Ollama Gemini 3 Flash Preview -> GLM-5
allowed_models = [
    "openai-codex::gpt-5.4",                 # Primary
    "ollama::gemini-3-flash-preview:cloud",  # Fallback 1
    "zai::glm-5"                             # Fallback 2
]
priority_models = [
    "openai-codex::gpt-5.4",
    "ollama::gemini-3-flash-preview:cloud",
    "zai::glm-5",
]

# ══════════════════════════════════════════════════════════════════════════════
# TOOLS
# ══════════════════════════════════════════════════════════════════════════════

[tools]
agent_timeout_secs = 30           # Max seconds for an agent run (30s for fast failover on rate limits)
max_tool_result_bytes = 50000     # Max bytes per tool result before truncation (50KB)

# ── Command Execution ─────────────────────────────────────────────────────────

[tools.exec]
default_timeout_secs = 30         # Default timeout for commands
max_output_bytes = 204800         # Max command output bytes (200KB)
approval_mode = "on-miss"         # When to require approval:
                                  #   "always"  - Always ask before running
                                  #   "on-miss" - Ask if not in allowlist
                                  #   "never"   - Never ask (dangerous)
security_level = "allowlist"      # Security mode:
                                  #   "permissive" - Allow most commands
                                  #   "allowlist"  - Only allow listed commands
                                  #   "strict"     - Very restrictive
allowlist = []                    # Command patterns to allow (when security_level = "allowlist")
                                  # Example: ["git *", "npm *", "cargo *"]

# ── Sandbox Configuration ─────────────────────────────────────────────────────
# Commands run inside isolated containers for security.

[tools.exec.sandbox]
mode = "all"                      # Which commands to sandbox:
                                  #   "off"      - No sandboxing (commands run on host)
                                  #   "non-main" - Sandbox all except main session
                                  #   "all"      - Sandbox everything (recommended)
scope = "session"                 # Container lifecycle:
                                  #   "command" - New container per command
                                  #   "session" - Container per session (recommended)
                                  #   "global"  - Single shared container
workspace_mount = "ro"            # How to mount workspace in sandbox:
                                  #   "ro"   - Read-only (safe)
                                  #   "rw"   - Read-write (can modify files)
                                  #   "none" - No mount
backend = "auto"                  # Container backend:
                                  #   "auto"            - Auto-detect (prefers Apple Container on macOS)
                                  #   "docker"          - Use Docker
                                  #   "apple-container" - Use Apple Container (macOS only)
no_network = true                 # Disable network access in sandbox (recommended)
# image = "custom-image:tag"      # Custom Docker image (default: auto-built)
# container_prefix = "moltis"     # Prefix for container names

# Resource limits for sandbox containers
[tools.exec.sandbox.resource_limits]
memory_limit = "512M"             # Memory limit (e.g., "512M", "1G", "2G")
cpu_quota = 0.5                   # CPU quota as fraction (0.5 = half a core)
pids_max = 100                    # Maximum number of processes

# Packages installed in sandbox containers via apt-get.
# This list is used to build the sandbox image. Customize as needed.
packages = [
    "curl",
    "wget",
    "ca-certificates",
    "dnsutils",
    "netcat-openbsd",
    "openssh-client",
    "iproute2",
    "net-tools",
    "python3",
    "python3-dev",
    "python3-pip",
    "python3-venv",
    "python-is-python3",
    "nodejs",
    "npm",
    "ruby",
    "ruby-dev",
    "build-essential",
    "clang",
    "libclang-dev",
    "llvm-dev",
    "pkg-config",
    "libssl-dev",
    "libsqlite3-dev",
    "libyaml-dev",
    "liblzma-dev",
    "autoconf",
    "automake",
    "libtool",
    "bison",
    "flex",
    "dpkg-dev",
    "fakeroot",
    "zip",
    "unzip",
    "bzip2",
    "xz-utils",
    "p7zip-full",
    "tar",
    "zstd",
    "lz4",
    "pigz",
    "git",
    "gnupg2",
    "jq",
    "rsync",
    "file",
    "tree",
    "sqlite3",
    "sudo",
    "locales",
    "tzdata",
    "shellcheck",
    "patchelf",
    "ripgrep",
    "chromium",
    "libxss1",
    "libnss3",
    "libnspr4",
    "libasound2t64",
    "libatk1.0-0t64",
    "libatk-bridge2.0-0t64",
    "libcups2t64",
    "libdrm2",
    "libgbm1",
    "libgtk-3-0t64",
    "libxcomposite1",
    "libxdamage1",
    "libxfixes3",
    "libxrandr2",
    "libxkbcommon0",
    "fonts-liberation",
]

# ── Tool Policy ───────────────────────────────────────────────────────────────
# Control which tools agents can use.

[tools.policy]
allow = []                        # Tools to always allow (e.g., ["exec", "web_fetch"])
deny = []                         # Tools to always deny (e.g., ["browser"])
# profile = "default"             # Named policy profile

# ── Web Search ────────────────────────────────────────────────────────────────
# NOTE: Built-in providers (Brave, Perplexity) require credit card.
# Using Tavily via MCP server instead (1,000 free requests/month, no card).
# See [mcp.servers.tavily] configuration below.

[tools.web.search]
enabled = false                   # Disabled: using Tavily MCP server instead
provider = "brave"                # Search provider: "brave" or "perplexity"
max_results = 5                   # Number of results to return (1-10)
timeout_seconds = 30              # HTTP request timeout
cache_ttl_minutes = 15            # Cache results for this many minutes (0 = no cache)
# api_key = "..."                 # Brave API key (or set BRAVE_API_KEY env var)
# api_key = "${BRAVE_API_KEY}"    # Requires credit card now - NOT FREE

# Perplexity-specific settings (when provider = "perplexity")
[tools.web.search.perplexity]

[mcp.servers]
# api_key = "..."                 # Or set PERPLEXITY_API_KEY env var
# base_url = "..."                # API base URL (auto-detected from key prefix)
# model = "sonar"                 # Perplexity model to use

# ── Web Fetch ─────────────────────────────────────────────────────────────────

[tools.web.fetch]
enabled = true                    # Enable web fetch tool
max_chars = 50000                 # Max characters to return from fetched content
timeout_seconds = 30              # HTTP request timeout
cache_ttl_minutes = 15            # Cache fetched pages for this many minutes (0 = no cache)
max_redirects = 3                 # Maximum HTTP redirects to follow
readability = true                # Use readability extraction for HTML (cleaner output)

[channels.telegram]
enabled = true                    # Keep Telegram integration explicitly enabled

# ── Telegram Bot Configuration ────────────────────────────────────────────────
# Create bot via @BotFather, get token
# Get user ID via @userinfobot
[channels.telegram.moltis-bot]
token = "${TELEGRAM_BOT_TOKEN}"
dm_policy = "allowlist"
allowlist = ["262872984"]  # Telegram user IDs as strings
# Controlled webhook rollout (keep disabled until endpoint contract is verified).
# webhook_url = "${TELEGRAM_WEBHOOK_URL}"
# webhook_secret = "${TELEGRAM_WEBHOOK_SECRET}"

# ── Browser Automation ────────────────────────────────────────────────────────
# Full browser control via Chrome DevTools Protocol (CDP).
# Use for JavaScript-heavy sites, form filling, screenshots.

[tools.browser]
enabled = true                    # Enable browser tool
headless = true                   # Run without visible window (true = background)
viewport_width = 2560             # Default viewport width in pixels (QHD for tech users)
viewport_height = 1440            # Default viewport height in pixels
device_scale_factor = 2.0         # HiDPI/Retina scaling (2.0 = Retina, 1.0 = standard)
max_instances = 3                 # Maximum concurrent browser instances
idle_timeout_secs = 300           # Close idle browsers after this many seconds (5 min)
navigation_timeout_ms = 30000     # Page load timeout in milliseconds (30 sec)
# chrome_path = "/path/to/chrome" # Custom Chrome/Chromium binary path (auto-detected)
# user_agent = "Custom UA"        # Custom user agent string
# chrome_args = []                # Extra Chrome command-line arguments
                                  # Example: ["--disable-extensions", "--disable-gpu"]

# Domain restrictions for security.
# When set, browser will refuse to navigate to domains not in this list.
# This helps prevent prompt injection from untrusted websites.
allowed_domains = []              # Empty = all domains allowed
memory_limit_percent = 90
sandbox_image = "browserless/chrome"
profile_dir = "/tmp/moltis-browser-profile/shared"  # Host-visible path shared with the Moltis container so sibling browser sandboxes can write Chrome profile state
container_host = "host.docker.internal"  # Moltis-in-Docker sibling browser access via host-gateway on Linux
# allowed_domains = [
#     "docs.example.com",         # Exact match
#     "*.github.com",             # Wildcard: matches any subdomain of github.com
#     "localhost",                # Allow localhost
#     "127.0.0.1",
# ]

# ══════════════════════════════════════════════════════════════════════════════
# SKILLS
# ══════════════════════════════════════════════════════════════════════════════
# Reusable prompt templates and workflows.

[skills]
enabled = true                    # Enable skills system
search_paths = ["/server/skills"] # Additional directories to search for skills
                                  # Default locations: ~/.config/moltis/skills/, ./skills/
auto_load = ["telegram-learner", "codex-update"]  # Skills to always load without explicit activation
                                  # Example: ["code-review", "commit"]

# ══════════════════════════════════════════════════════════════════════════════
# MCP SERVERS
# ══════════════════════════════════════════════════════════════════════════════
# Model Context Protocol servers provide additional tools and capabilities.
# See https://modelcontextprotocol.io for available servers.

[mcp]
# Each server has a name and configuration:
#
# [mcp.servers.server-name]
# command = "npx"                 # Command to run (for stdio transport)
# args = ["-y", "@package/name"]  # Command arguments
# env = { KEY = "value" }         # Environment variables for the process
# enabled = true                  # Whether this server is enabled
# transport = "stdio"             # Transport: "stdio" (default) or "sse"
# url = "http://..."              # URL for SSE transport

# Example: Filesystem access
# [mcp.servers.filesystem]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/allow"]
# enabled = true

# Example: GitHub integration
# [mcp.servers.github]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# env = { GITHUB_TOKEN = "${GITHUB_TOKEN}" }
# enabled = true

# Example: SSE server
# [mcp.servers.remote]
# transport = "sse"
# url = "http://localhost:8080/sse"
# enabled = true

# ── Tavily Web Search (FREE: 1,000 requests/month, no credit card) ────────────
# Get API key: https://tavily.com (sign up with email only)
# Docs: https://docs.tavily.com/documentation/mcp
# Using SSE transport to remote Tavily MCP server (no npx needed)
[mcp.servers.tavily]
transport = "sse"
url = "https://mcp.tavily.com/mcp/?tavilyApiKey=${TAVILY_API_KEY}"
enabled = true

# ══════════════════════════════════════════════════════════════════════════════
# METRICS
# ══════════════════════════════════════════════════════════════════════════════
# Prometheus metrics for observability.

[metrics]
enabled = true                    # Enable metrics collection
prometheus_endpoint = true        # Expose /metrics endpoint for Prometheus scraping

[metrics.labels]
# labels = { environment = "production", instance = "main" }
                                  # Additional labels to add to all metrics

# ══════════════════════════════════════════════════════════════════════════════
# HEARTBEAT
# ══════════════════════════════════════════════════════════════════════════════
# Periodic health-check agent turns to keep the agent "alive" and responsive.

[heartbeat]
enabled = true                    # Enable periodic heartbeats
every = "30m"                     # Interval between heartbeats (e.g., "30m", "1h", "6h")
# model = "anthropic/claude-sonnet-4-20250514"  # Override model for heartbeats
# prompt = "..."                  # Custom heartbeat prompt (default: built-in)
ack_max_chars = 300               # Max characters for acknowledgment reply
sandbox_enabled = true            # Run heartbeat commands in sandbox
# sandbox_image = "..."           # Override sandbox image for heartbeats

# Active hours window - heartbeats only run during this time
[heartbeat.active_hours]
start = "08:00"                   # Start time (HH:MM, 24-hour format)
end = "23:59"                     # End time (HH:MM, "24:00" = end of day)
timezone = "local"                # Timezone: "local" or IANA name like "Europe/Paris"

# ══════════════════════════════════════════════════════════════════════════════
# FAILOVER
# ══════════════════════════════════════════════════════════════════════════════
# Automatic fallback to alternative models/providers on failure.

[failover]
enabled = true                    # Enable automatic failover
# Fallback chain: GPT-5.4 → Ollama Gemini → GLM-5
fallback_models = [
    "ollama::gemini-3-flash-preview:cloud",  # Primary fallback: Ollama sidecar
    "zai::glm-5"                             # Secondary fallback: GLM-5 via Z.ai
]
# Chain: gpt-5.4 → ollama-gemini → glm-5

# ══════════════════════════════════════════════════════════════════════════════
# VOICE
# ══════════════════════════════════════════════════════════════════════════════
# Voice provider settings for text-to-speech (TTS) and speech-to-text (STT).
# `providers` controls what appears in the Settings UI provider list.

[voice.tts]
enabled = true                   # Enable text-to-speech
provider = "piper"                # Active TTS provider (FREE, local)
providers = ["piper", "coqui", "elevenlabs"]  # UI allowlist (empty = show all TTS providers)

[memory.qmd.collections]
# All available TTS providers:
#   "elevenlabs", "openai", "google", "piper", "coqui"

[voice.stt]
enabled = true                   # Enable speech-to-text
provider = "whisper"              # Active STT provider (FREE, local, excellent Russian)
providers = [
    "whisper",
    "groq",
    "mistral",
] # UI allowlist (empty = show all STT providers)
# All available STT providers:
#   "whisper", "groq", "deepgram", "google", "mistral",
#   "voxtral-local", "whisper-cli", "sherpa-onnx", "elevenlabs-stt"

# [voice.tts.elevenlabs]
# api_key = "${ELEVENLABS_API_KEY}" # Or set ELEVENLABS_API_KEY env var
# voice_id = "21m00Tcm4TlvDq8ikWAM"
# model = "eleven_flash_v2_5"

# [voice.stt.mistral]
# api_key = "${MISTRAL_API_KEY}"    # Or set MISTRAL_API_KEY env var
# model = "voxtral-mini-latest"
# language = "en"

# ══════════════════════════════════════════════════════════════════════════════
# TAILSCALE
# ══════════════════════════════════════════════════════════════════════════════
# Expose moltis via Tailscale Serve (private) or Funnel (public).

[tailscale]
mode = "off"                      # Tailscale mode:
                                  #   "off"    - Disabled
                                  #   "serve"  - Tailnet-only HTTPS (private)
                                  #   "funnel" - Public HTTPS via Tailscale
reset_on_exit = true              # Reset serve/funnel when gateway shuts down

# ══════════════════════════════════════════════════════════════════════════════
# MEMORY / EMBEDDINGS
# ══════════════════════════════════════════════════════════════════════════════
# Configure the embedding provider for memory/RAG features.

[memory]
llm_reranking = false
session_export = false
provider = "ollama"              # Pin embeddings to Ollama instead of chat-provider auto-detect
                                  #   "local"   - Built-in local embeddings
                                  #   "ollama"  - Ollama server
                                  #   "openai"  - OpenAI API
                                  #   "custom"  - Custom endpoint
base_url = "http://ollama:11434/v1"  # Use the internal Ollama sidecar for embeddings
model = "nomic-embed-text"       # Lightweight embedding model verified on the live Ollama sidecar
# api_key = "..."                 # API key (optional for local endpoints like Ollama)

# Knowledge base directories for RAG (semantic search)
watch_dirs = [
  "~/.moltis/memory",            # Default memory location
  "/server/knowledge",           # Project knowledge base
]

# ══════════════════════════════════════════════════════════════════════════════
# CHANNELS
# ══════════════════════════════════════════════════════════════════════════════
# External messaging integrations.

[channels]

[voice.tts.elevenlabs]
api_key = "${ELEVENLABS_API_KEY}"

[voice.tts.openai]

[voice.tts.google]

[voice.tts.piper]
# Piper runs locally, no API key needed
# Russian models: ru_RU-irina-medium, ru_RU-dmitri-medium
model = "ru_RU-irina-medium"      # Russian female voice
noise_scale = 0.667               # Voice variation (0.0-1.0)
length_scale = 1.0                # Speech speed

[voice.tts.coqui]
endpoint = "http://localhost:5002"

[voice.stt.whisper]
# Whisper runs locally via whisper.cpp, no API key needed
model = "large-v3"                # Model size: tiny, base, small, medium, large-v3
language = "ru"                   # Russian language
initial_prompt = ""               # Optional context hint

[voice.stt.groq]

[voice.stt.deepgram]
smart_format = false

[voice.stt.google]

[voice.stt.mistral]

[voice.stt.elevenlabs]
api_key = "${ELEVENLABS_API_KEY}"

[voice.stt.voxtral_local]
endpoint = "http://localhost:8000"

[voice.stt.whisper_cli]

[voice.stt.sherpa_onnx]

[cron]
rate_limit_max = 10
rate_limit_window_secs = 60
# Telegram bots
# [channels.telegram.my-bot]
# token = "..."                   # Bot token from @BotFather
# allowed_users = "${TELEGRAM_ALLOWED_USERS:-}"  # Comma-separated user IDs from env

# ══════════════════════════════════════════════════════════════════════════════
# HOOKS
# ══════════════════════════════════════════════════════════════════════════════
# Shell commands triggered by events.

[hooks]
# Historical repo-side consent routing is intentionally not enabled here.
# The old `/codex_*` and `/codex-followup ...` user-facing flow is retired.
# Codex advisories now move through a producer contract plus a Moltis-native
# intake surface. Safe default remains `one_way_only` until Moltis core owns
# callback routing end-to-end. The repo now contains advisory-native session
# store and router helpers; once Moltis confirms callback ingress, the mode can
# be switched from `one_way_only` to `inline_callbacks`.
#
# Future Moltis-native intake example:
#
# [[hooks.hooks]]
# name = "codex-advisory-intake"
# command = "./scripts/moltis-codex-advisory-intake.sh"
# events = ["MessageSending"]
# timeout = 10
# [hooks.hooks.env]
# MOLTIS_CODEX_ADVISORY_EVENT_SCHEMA = "./specs/021-moltis-native-codex-update-advisory/contracts/advisory-event.schema.json"
# MOLTIS_CODEX_ADVISORY_AUDIT_DIR = "/opt/moltinger/.tmp/current/codex-advisory-intake-audit"
