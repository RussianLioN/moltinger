# Moltis Configuration
# ====================
# This file contains all available configuration options.
# Uncomment and modify settings as needed.
# Changes require a restart to take effect.
#
# Environment variable substitution is supported: ${ENV_VAR}
# Example: api_key = "${ANTHROPIC_API_KEY}"

# ══════════════════════════════════════════════════════════════════════════════
# SERVER
# ══════════════════════════════════════════════════════════════════════════════

[server]
bind = "0.0.0.0"                  # Address to bind to (Docker: must be 0.0.0.0 for external access)
port = 13131                      # Port number (must match docker-compose.yml mapping)
http_request_logs = false              # Enable verbose Axum HTTP request/response logs (debugging)
ws_request_logs = false                # Enable WebSocket RPC request/response logs (debugging)
update_repository_url = "https://github.com/moltis-org/moltis"    # GitHub repo used for update checks (comment out to disable)

# ══════════════════════════════════════════════════════════════════════════════
# AUTHENTICATION
# ══════════════════════════════════════════════════════════════════════════════

[auth]
disabled = false                  # true = disable auth entirely (DANGEROUS if exposed)
                                  # When disabled, anyone with network access can use moltis

# ══════════════════════════════════════════════════════════════════════════════
# ENV
# ══════════════════════════════════════════════════════════════════════════════
# Fleet handoff metadata is exported as env vars so hooks, smoke scripts, and
# later runtime integrations can share one authoritative contract without
# inventing an unsupported Moltis-specific config section.

[env]
MOLTIS_FLEET_AGENT_ID = "moltinger"
MOLTIS_FLEET_INTERNAL_ENDPOINT = "http://moltis:13131/internal/v1"
MOLTIS_FLEET_REPLY_TO = "agent://moltinger"
MOLTIS_FLEET_HANDOFF_SUBMIT_PATH = "/internal/v1/agent-handoffs"
MOLTIS_FLEET_HANDOFF_ACK_PATH_TEMPLATE = "/internal/v1/agent-handoffs/{correlation_id}/acks"
MOLTIS_FLEET_HANDOFF_STATUS_PATH_TEMPLATE = "/internal/v1/agent-handoffs/{correlation_id}"
MOLTIS_FLEET_HANDOFF_CANCEL_PATH_TEMPLATE = "/internal/v1/agent-handoffs/{correlation_id}/cancel"
MOLTIS_FLEET_AUTHORIZATION_HEADER = "Authorization"
MOLTIS_FLEET_AGENT_HEADER = "X-Agent-Id"
MOLTIS_FLEET_CORRELATION_HEADER = "X-Correlation-Id"
MOLTIS_FLEET_IDEMPOTENCY_HEADER = "Idempotency-Key"
MOLTIS_FLEET_SERVICE_AUTH_MODE = "bearer"
MOLTIS_FLEET_SERVICE_TOKEN_ENV = "MOLTINGER_SERVICE_TOKEN"
MOLTIS_FLEET_ALLOWED_RECIPIENTS = "clawdiy"
MOLTIS_FLEET_PROVIDER_AUTH_CHECK_CAPABILITY = "provider.auth.check"
MOLTIS_FLEET_FAIL_CLOSED_ON_AUTH_ERROR = "true"
MOLTIS_FLEET_ACK_CALLBACK_PATH_TEMPLATE = "/internal/v1/agent-handoffs/{correlation_id}/acks"
MOLTIS_FLEET_REQUIRED_ACKS = "delivery,accept,start,terminal"
MOLTIS_FLEET_DELIVERY_ACK_DEADLINE_SECONDS = "10"
MOLTIS_FLEET_START_ACK_DEADLINE_SECONDS = "60"
MOLTIS_FLEET_PROGRESS_HEARTBEAT_SECONDS = "300"
MOLTIS_FLEET_TERMINAL_TIMEOUT_SECONDS = "900"
# Legacy migration-only Codex advisory surfaces.
# Keep these for transition/reference paths; they are no longer canonical.
MOLTIS_CODEX_ADVISORY_EVENT_SCHEMA = "./specs/021-moltis-native-codex-update-advisory/contracts/advisory-event.schema.json"
MOLTIS_CODEX_ADVISORY_INTAKE_SCRIPT = "./scripts/moltis-codex-advisory-intake.sh"
MOLTIS_CODEX_ADVISORY_AUDIT_DIR = "/opt/moltinger/.tmp/current/codex-advisory-intake-audit"
MOLTIS_CODEX_ADVISORY_TELEGRAM_SEND_SCRIPT = "./scripts/telegram-bot-send.sh"
MOLTIS_CODEX_ADVISORY_TELEGRAM_ENV_FILE = "/opt/moltinger/.env"
MOLTIS_CODEX_ADVISORY_INTERACTIVE_MODE = "one_way_only"
MOLTIS_CODEX_ADVISORY_SESSION_STORE_SCRIPT = "./scripts/codex-advisory-session-store.sh"
MOLTIS_CODEX_ADVISORY_SESSION_STORE_DIR = "/opt/moltinger/.tmp/current/codex-advisory-session-store"
MOLTIS_CODEX_ADVISORY_ROUTER_SEND_SCRIPT = "./scripts/telegram-bot-send.sh"
MOLTIS_CODEX_ADVISORY_ROUTER_ENV_FILE = "/opt/moltinger/.env"
MOLTIS_CODEX_ADVISORY_ROUTER_SEND_REPLY = "true"
MOLTIS_CODEX_ADVISORY_CALLBACK_WINDOW_HOURS = "24"
MOLTIS_CODEX_ADVISORY_RECOVERY_COMMAND = "/codex-advisory-followup"
# Canonical Moltis-native Codex update skill runtime.
# Live Moltis must see the repo through /server; writable skill state lives under ~/.moltis.
MOLTIS_CODEX_UPDATE_STATE_FILE = "/home/moltis/.moltis/codex-update/state.json"
MOLTIS_CODEX_UPDATE_STATE_SCRIPT = "/server/scripts/moltis-codex-update-state.sh"
MOLTIS_CODEX_UPDATE_PROFILE_SCRIPT = "/server/scripts/moltis-codex-update-profile.sh"
MOLTIS_CODEX_UPDATE_AUDIT_DIR = "/home/moltis/.moltis/codex-update/audit"
MOLTIS_CODEX_UPDATE_PROFILE_SCHEMA = "/server/specs/023-full-moltis-codex-update-skill/contracts/project-profile.schema.json"
MOLTIS_CODEX_UPDATE_RELEASE_URL = "https://developers.openai.com/codex/changelog"
MOLTIS_CODEX_UPDATE_ISSUE_SIGNALS_URL = "https://api.github.com/repos/openai/codex/issues?state=open&per_page=20"
MOLTIS_CODEX_UPDATE_MAX_RELEASES = "3"
MOLTIS_CODEX_UPDATE_PROFILE_FILE = ""
MOLTIS_CODEX_UPDATE_TELEGRAM_ENABLED = "false"
MOLTIS_CODEX_UPDATE_TELEGRAM_CHAT_ID = ""
MOLTIS_CODEX_UPDATE_TELEGRAM_SEND_SCRIPT = "/server/scripts/telegram-bot-send.sh"
MOLTIS_CODEX_UPDATE_TELEGRAM_ENV_FILE = ""
MOLTIS_CODEX_UPDATE_TELEGRAM_SILENT = "false"

# ══════════════════════════════════════════════════════════════════════════════
# TLS / HTTPS
# ══════════════════════════════════════════════════════════════════════════════

[tls]
enabled = true                    # Enable HTTPS (recommended)
auto_generate = true              # Auto-generate local CA and server certificate

[providers.ollama]
enabled = true                    # Fallback LLM provider via Ollama sidecar
base_url = "http://ollama:11434"  # Docker service name
model = "gemini-3-flash-preview:cloud"  # Cloud model via Ollama
alias = "ollama"
api_key = "${OLLAMA_API_KEY}"     # API key for Ollama cloud models
# http_redirect_port = 18790      # Optional override (default: server.port + 1)
# cert_path = "/path/to/cert.pem"     # Custom certificate file (overrides auto-gen)
# key_path = "/path/to/key.pem"       # Custom private key file
# ca_cert_path = "/path/to/ca.pem"    # CA certificate for trust instructions

# ══════════════════════════════════════════════════════════════════════════════
# AGENT IDENTITY
# ══════════════════════════════════════════════════════════════════════════════
# Customize your agent's personality. These are typically set during onboarding.

[identity]
name = "Молтингер"
emoji = "🤖"
vibe = "technical"                # Personality vibe/style (Expert: Prompt Engineer | Issue: moltinger-z7k)
soul = """
Ты - Молтингер, AI-ассистент для разработки и DevOps.

## Контекст
- Пользователь: Сергей (timezone Europe/Moscow)
- Проект: Moltinger - Docker deployment на ainetic.tech
- Стек: Docker Compose, Moltis, Traefik, GLM-5, GitHub Actions

## Роль
- Эксперт в Docker, GitOps, CI/CD, автоматизации
- Помощник в разработке и DevOps задачах
- Консультант по архитектуре и best practices

## Поведение
- Язык: русский
- Стиль: кратко, технически точно
