# Moltis Docker Deployment Configuration
# https://docs.moltis.org/docker.html
# Routes: https://ainetic.tech/moltis

services:
  moltis:
    image: ghcr.io/moltis-org/moltis:latest
    container_name: moltis
    restart: unless-stopped
    privileged: true
    networks:
      - ainetic_net

    ports:
      - "13131:13131"  # HTTP/WebSocket gateway
      - "13132:13132"  # HTTP redirect / CA download

    volumes:
      - ./config:/home/moltis/.config/moltis
      - ./data:/home/moltis/.moltis
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - MOLTIS_HOST=0.0.0.0
      - MOLTIS_NO_TLS=true
      - MOLTIS_BEHIND_PROXY=true
      - MOLTIS_PASSWORD=${MOLTIS_PASSWORD}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13131/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.moltis.rule=Host(`ainetic.tech`) && PathPrefix(`/moltis`)"
      - "traefik.http.routers.moltis.entrypoints=websecure"
      - "traefik.http.routers.moltis.tls.certresolver=letsencrypt"
      - "traefik.http.routers.moltis.middlewares=moltis-stripprefix"
      - "traefik.http.routers.moltis.priority=100"
      - "traefik.http.middlewares.moltis-stripprefix.stripprefix.prefixes=/moltis"
      - "traefik.http.services.moltis.loadbalancer.server.port=13131"
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_LABEL_ENABLE=true

networks:
  ainetic_net:
    external: true
