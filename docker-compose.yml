# Moltis Docker Deployment Configuration
# https://docs.moltis.org/docker.html
#
# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║                        SECURITY NOTICE                                    ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║ This container runs with elevated privileges:                             ║
# ║                                                                           ║
# ║ 1. privileged: true                                                       ║
# ║    - Required for: Moltis sandbox execution (Docker-in-Docker)            ║
# ║    - Enables: container creation within Moltis for code execution         ║
# ║    - Risk: Near-host-level access if container compromised                ║
# ║                                                                           ║
# ║ 2. /var/run/docker.sock mount                                             ║
# ║    - Required for: Sandbox container management                           ║
# ║    - Enables: Creating/managing isolated execution containers             ║
# ║    - Risk: Full Docker daemon access if compromised                       ║
# ║                                                                           ║
# ║ MITIGATION: This is intentional for Moltis's core functionality.          ║
# ║ - Container runs on isolated VM, not shared infrastructure                ║
# ║ - Network restricted via Traefik with authentication                      ║
# ║ - Regular security audits recommended                                     ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

services:
  moltis:
    image: ghcr.io/moltis-org/moltis:${MOLTIS_VERSION:-latest}
    container_name: moltis
    restart: unless-stopped
    # SECURITY: privileged mode required for Docker-in-Docker sandbox execution
    # See SECURITY NOTICE above for details
    privileged: true
    networks:
      - ainetic_net

    ports:
      - "13131:13131"  # HTTP/WebSocket gateway
      - "13132:13132"  # HTTP redirect / CA download

    volumes:
      # Configuration files
      - ./config:/home/moltis/.config/moltis
      # Persistent data (sessions, memory, logs)
      - ./data:/home/moltis/.moltis
      # Docker socket for sandbox execution (WARNING: root access)
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      # Network configuration
      - MOLTIS_HOST=0.0.0.0
      - MOLTIS_PORT=13131
      # TLS disabled - handled by Traefik reverse proxy
      - MOLTIS_NO_TLS=true
      # Force remote connection treatment (required for reverse proxy)
      - MOLTIS_BEHIND_PROXY=true
      # Authentication password (from .env file)
      - MOLTIS_PASSWORD=${MOLTIS_PASSWORD}
      # Telegram bot configuration
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      # Tavily API for MCP server
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      # GLM-5 API key for Z.ai Coding Plan (OpenAI-compatible)
      - GLM_API_KEY=${GLM_API_KEY}

    # Docker healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13131/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Traefik labels for reverse proxy (Phase 4)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.moltis.rule=Host(`moltis.ainetic.tech`)"
      - "traefik.http.routers.moltis.entrypoints=websecure"
      - "traefik.http.routers.moltis.tls.certresolver=letsencrypt"
      - "traefik.http.services.moltis.loadbalancer.server.port=13131"
      # Watchtower auto-update label
      - "com.centurylinklabs.watchtower.enable=true"

  # Watchtower - Automatic container updates
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      # Clean up old images after update
      - WATCHTOWER_CLEANUP=true
      # Check for updates every 24 hours
      - WATCHTOWER_POLL_INTERVAL=86400
      # Only update containers with watchtower label
      - WATCHTOWER_LABEL_ENABLE=true

# Connect to existing Traefik network (CRITICAL for routing)
networks:
  ainetic_net:
    external: true
