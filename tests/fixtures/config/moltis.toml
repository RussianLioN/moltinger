[server]
bind = "0.0.0.0"
port = 13131
http_request_logs = false
ws_request_logs = false

[auth]
disabled = false

[env]
MOLTIS_FLEET_AGENT_ID = "moltinger"
MOLTIS_FLEET_INTERNAL_ENDPOINT = "http://moltis:13131/internal/v1"
MOLTIS_FLEET_REPLY_TO = "agent://moltinger"
MOLTIS_FLEET_HANDOFF_SUBMIT_PATH = "/internal/v1/agent-handoffs"
MOLTIS_FLEET_HANDOFF_ACK_PATH_TEMPLATE = "/internal/v1/agent-handoffs/{correlation_id}/acks"
MOLTIS_FLEET_HANDOFF_STATUS_PATH_TEMPLATE = "/internal/v1/agent-handoffs/{correlation_id}"
MOLTIS_FLEET_HANDOFF_CANCEL_PATH_TEMPLATE = "/internal/v1/agent-handoffs/{correlation_id}/cancel"
MOLTIS_FLEET_AUTHORIZATION_HEADER = "Authorization"
MOLTIS_FLEET_AGENT_HEADER = "X-Agent-Id"
MOLTIS_FLEET_CORRELATION_HEADER = "X-Correlation-Id"
MOLTIS_FLEET_IDEMPOTENCY_HEADER = "Idempotency-Key"
MOLTIS_FLEET_SERVICE_AUTH_MODE = "bearer"
MOLTIS_FLEET_SERVICE_TOKEN_ENV = "MOLTINGER_SERVICE_TOKEN"
MOLTIS_FLEET_ALLOWED_RECIPIENTS = "clawdiy"
MOLTIS_FLEET_PROVIDER_AUTH_CHECK_CAPABILITY = "provider.auth.check"
MOLTIS_FLEET_FAIL_CLOSED_ON_AUTH_ERROR = "true"
MOLTIS_FLEET_ACK_CALLBACK_PATH_TEMPLATE = "/internal/v1/agent-handoffs/{correlation_id}/acks"
MOLTIS_FLEET_REQUIRED_ACKS = "delivery,accept,start,terminal"
MOLTIS_FLEET_DELIVERY_ACK_DEADLINE_SECONDS = "10"
MOLTIS_FLEET_START_ACK_DEADLINE_SECONDS = "60"
MOLTIS_FLEET_PROGRESS_HEARTBEAT_SECONDS = "300"
MOLTIS_FLEET_TERMINAL_TIMEOUT_SECONDS = "900"
MOLTIS_FACTORY_MODE = "agent-factory-discovery-first-mvp0"
MOLTIS_FACTORY_LANGUAGE = "ru"
MOLTIS_FACTORY_ASC_MIRROR_INDEX = "docs/ASC-AI-FABRIQUE-MIRROR.md"
MOLTIS_FACTORY_ASC_ROADMAP_ROOT = "docs/asc-roadmap"
MOLTIS_FACTORY_ASC_CONCEPT_ROOT = "docs/concept"
MOLTIS_FACTORY_LIFECYCLE_PLAN = "docs/plans/agent-factory-lifecycle.md"
MOLTIS_FACTORY_PARALLEL_PLAN = "docs/plans/parallel-doodling-coral.md"
MOLTIS_FACTORY_ACTIVE_SPEC_DIR = "specs/022-telegram-ba-intake"
MOLTIS_FACTORY_DOWNSTREAM_SPEC_DIR = "specs/020-agent-factory-prototype"
MOLTIS_FACTORY_TEMPLATE_ROOT = "docs/templates/agent-factory"
MOLTIS_FACTORY_DISCOVERY_SCRIPT = "scripts/agent-factory-discovery.py"
MOLTIS_FACTORY_REQUIREMENTS_BRIEF_TEMPLATE = "docs/templates/agent-factory/requirements-brief.md"
MOLTIS_FACTORY_DISCOVERY_OUTPUT_ROOT = "data/agent-factory/discovery"
MOLTIS_FACTORY_DISCOVERY_SESSION_SUBDIR = "sessions"
MOLTIS_FACTORY_DISCOVERY_BRIEF_SUBDIR = "briefs"
MOLTIS_FACTORY_DISCOVERY_HANDOFF_SUBDIR = "handoffs"
MOLTIS_FACTORY_DISCOVERY_HISTORY_SUBDIR = "history"
MOLTIS_FACTORY_DISCOVERY_REQUIRED_TOPICS = "problem,target_users,current_workflow,desired_outcome,user_story,input_examples,expected_outputs,constraints,success_metrics"
MOLTIS_FACTORY_DISCOVERY_BLOCKING_TOPICS = "problem,target_users,current_workflow,desired_outcome,constraints,success_metrics"
MOLTIS_FACTORY_DISCOVERY_ALLOWED_SESSION_STATES = "new,in_progress,awaiting_user_reply,awaiting_clarification,awaiting_confirmation,confirmed,reopened,abandoned"
MOLTIS_FACTORY_DISCOVERY_ALLOWED_TOPIC_STATES = "unasked,partial,clarified,confirmed,unresolved"
MOLTIS_FACTORY_DISCOVERY_ALLOWED_BRIEF_STATES = "draft,awaiting_confirmation,confirmed,superseded,reopened"
MOLTIS_FACTORY_DISCOVERY_ALLOWED_CLARIFICATION_REASONS = "missing_information,ambiguous_answer,contradictory_examples,scope_conflict,unsafe_data_example"
MOLTIS_FACTORY_DISCOVERY_ENTRYPOINT = "run"
MOLTIS_FACTORY_DISCOVERY_TOPIC_ORDER = "problem,target_users,current_workflow,desired_outcome,user_story,input_examples,expected_outputs,constraints,success_metrics"
MOLTIS_FACTORY_DISCOVERY_NEXT_ACTIONS = "ask_next_question,resolve_clarification,prepare_brief"
MOLTIS_FACTORY_DISCOVERY_CONFIRMATION_REQUIRED = "true"
MOLTIS_FACTORY_DISCOVERY_HANDOFF_REQUIRED_STATUS = "confirmed"
MOLTIS_FACTORY_DISCOVERY_RESUME_POLICY = "reuse_confirmed_topics"
MOLTIS_FACTORY_REQUIRED_ARTIFACTS = "project_doc,agent_spec,presentation"
MOLTIS_FACTORY_REQUIRED_SWARM_ROLES = "coder,tester,validator,auditor,assembler"
MOLTIS_FACTORY_DEFENSE_GATE_REQUIRED = "true"
MOLTIS_FACTORY_TERMINAL_OUTPUT = "playground_package"
MOLTIS_FACTORY_DEPLOY_STAGE = "mvp1"
MOLTIS_FACTORY_INTAKE_SCRIPT = "scripts/agent-factory-intake.py"
MOLTIS_FACTORY_ARTIFACT_SCRIPT = "scripts/agent-factory-artifacts.py"
MOLTIS_FACTORY_REVIEW_SCRIPT = "scripts/agent-factory-review.py"
MOLTIS_FACTORY_SWARM_SCRIPT = "scripts/agent-factory-swarm.py"
MOLTIS_FACTORY_PLAYGROUND_SCRIPT = "scripts/agent-factory-playground.py"
MOLTIS_FACTORY_ARTIFACT_OUTPUT_ROOT = "data/agent-factory/concepts"
MOLTIS_FACTORY_ARTIFACT_MANIFEST_NAME = "concept-pack.json"
MOLTIS_FACTORY_WORKING_SUBDIR = "working"
MOLTIS_FACTORY_DOWNLOAD_SUBDIR = "downloads"
MOLTIS_FACTORY_DOWNLOAD_CHANNEL = "telegram"
MOLTIS_FACTORY_DOWNLOADABLE_FORMATS = "md"
MOLTIS_FACTORY_INTAKE_REQUIRED_FIELDS = "target_business_problem,target_users,current_workflow_summary,constraints_or_exclusions,measurable_success_expectation"
MOLTIS_FACTORY_INTAKE_FINAL_STATE = "ready_for_pack"
MOLTIS_FACTORY_DEFENSE_ALLOWED_OUTCOMES = "approved,rework_requested,rejected,pending_decision"
MOLTIS_FACTORY_PRODUCTION_READY_STATE = "approved"
MOLTIS_FACTORY_SWARM_TERMINAL_STATE = "completed"
MOLTIS_FACTORY_PLAYGROUND_DATA_PROFILE = "synthetic"

[tls]
enabled = false
auto_generate = false

[identity]
name = "Moltis Factory Test"
vibe = "technical"
soul = "Test fixture identity for the discovery-first agent-factory flow"

[user]
name = "Fixture"
timezone = "Europe/Moscow"

[providers]
offered = ["ollama"]

[providers.ollama]
enabled = true
base_url = "http://ollama:11434"
model = "test-model"
alias = "ollama"
api_key = "${OLLAMA_API_KEY}"

[providers.openai]
enabled = false
api_key = "${GLM_API_KEY}"
model = "glm-5"
base_url = "https://api.z.ai/api/coding/paas/v4"
alias = "zai"

[chat]
message_queue_mode = "followup"
allowed_models = ["ollama::test-model"]
priority_models = ["ollama::test-model"]

[tools]
agent_timeout_secs = 15
max_tool_result_bytes = 50000

[tools.exec]
default_timeout_secs = 15
max_output_bytes = 65536
approval_mode = "never"
security_level = "permissive"
allowlist = []

[tools.exec.sandbox]
mode = "off"
scope = "session"
workspace_mount = "none"

[mcp]

[metrics]
enabled = true
prometheus_endpoint = true

[heartbeat]
enabled = false

[failover]
enabled = false
