services:
  ollama:
    image: python:3.12.8-slim-bookworm
    working_dir: /workspace
    command: ["python", "/workspace/tests/fixtures/fake_ollama_server.py"]
    volumes:
      - ./:/workspace:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:11434/api/tags', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 2s
    networks:
      - test-net

  moltis:
    image: ghcr.io/moltis-org/moltis@sha256:f13c9a0c584e29f739f1d7b22c914b19810e55afe3577bfcea427057cbb1bff3
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - >-
        set -eu;
        mkdir -p /home/moltis/.config/moltis;
        if [ ! -f /home/moltis/.config/moltis/moltis.toml ]; then
          cp /fixture-config/moltis.toml /home/moltis/.config/moltis/moltis.toml;
        fi;
        exec moltis --bind 0.0.0.0
    environment:
      MOLTIS_HOST: 0.0.0.0
      MOLTIS_NO_TLS: "true"
      MOLTIS_BEHIND_PROXY: "true"
      MOLTIS_PASSWORD: ${MOLTIS_PASSWORD:-test_password}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-fixture-ollama-key}
      TELEGRAM_ALLOWED_USERS: ""
      GLM_API_KEY: ""
      TAVILY_API_KEY: ""
    volumes:
      - ./tests/fixtures/config:/fixture-config:ro
      - moltis-test-config:/home/moltis/.config/moltis
      - moltis-test-data:/home/moltis/.moltis
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13131/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 10s
    networks:
      - test-net

  test-runner:
    build:
      context: .
      dockerfile: tests/Dockerfile.runner
    working_dir: /workspace
    environment:
      CI: "1"
      TEST_BASE_URL: http://moltis:13131
      TEST_ENV_FILE: ""
      TEST_LIVE: "0"
      MOLTIS_PASSWORD: ${MOLTIS_PASSWORD:-test_password}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-moltinger-test}
    volumes:
      - ./:/workspace
      - /workspace/node_modules
    depends_on:
      moltis:
        condition: service_healthy
    networks:
      - test-net
    command: ["bash", "-lc", "sleep infinity"]

networks:
  test-net:
    driver: bridge

volumes:
  moltis-test-config:
  moltis-test-data:
