name: clawdiy

x-clawdiy-logging: &clawdiy-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"
    labels: "service,environment,agent"

x-clawdiy-healthcheck: &clawdiy-healthcheck
  test:
    [
      "CMD-SHELL",
      "wget -q --spider http://localhost:${CLAWDIY_INTERNAL_PORT:-18789}/health || wget -q --spider http://localhost:${CLAWDIY_INTERNAL_PORT:-18789}/"
    ]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  clawdiy:
    image: ${CLAWDIY_IMAGE:?set CLAWDIY_IMAGE in CI or deployment env}
    container_name: clawdiy
    init: true
    restart: unless-stopped
    read_only: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    ports:
      - "127.0.0.1:${CLAWDIY_PORT:-18789}:${CLAWDIY_INTERNAL_PORT:-18789}"

    volumes:
      - ./config/clawdiy:/home/node/.openclaw:ro
      - ./config/fleet:/home/node/.openclaw/registry:ro
      - clawdiy-state:/home/node/.openclaw-data/state
      - clawdiy-audit:/home/node/.openclaw-data/audit
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m

    environment:
      NODE_ENV: production
      CLAWDIY_AGENT_ID: ${CLAWDIY_AGENT_ID:-clawdiy}
      CLAWDIY_DOMAIN: ${CLAWDIY_DOMAIN:-clawdiy.ainetic.tech}
      CLAWDIY_INTERNAL_PORT: ${CLAWDIY_INTERNAL_PORT:-18789}
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_REGISTRY_ROOT: /home/node/.openclaw/registry
      OPENCLAW_STATE_ROOT: /home/node/.openclaw-data/state
      OPENCLAW_AUDIT_ROOT: /home/node/.openclaw-data/audit
      # Secret and provider env wiring lands in T003/T024 after inventory is defined.

    healthcheck:
      <<: *clawdiy-healthcheck

    logging:
      <<: *clawdiy-logging
      options:
        labels: "service=clawdiy,environment=production,agent=clawdiy"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.clawdiy.rule=Host(`${CLAWDIY_DOMAIN:-clawdiy.ainetic.tech}`)"
      - "traefik.http.routers.clawdiy.entrypoints=websecure"
      - "traefik.http.routers.clawdiy.tls=true"
      - "traefik.http.routers.clawdiy.tls.certresolver=letsencrypt"
      - "traefik.http.routers.clawdiy.service=clawdiy"
      - "traefik.http.routers.clawdiy.middlewares=clawdiy-proxy-headers@docker"
      - "traefik.http.middlewares.clawdiy-proxy-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.clawdiy-proxy-headers.headers.customrequestheaders.X-Forwarded-Host=${CLAWDIY_DOMAIN:-clawdiy.ainetic.tech}"
      - "traefik.http.middlewares.clawdiy-proxy-headers.headers.customrequestheaders.X-Forwarded-Port=443"
      - "traefik.http.services.clawdiy.loadbalancer.server.port=${CLAWDIY_INTERNAL_PORT:-18789}"
      - "traefik.http.services.clawdiy.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.clawdiy.loadbalancer.healthcheck.interval=30s"
      - "com.centurylinklabs.watchtower.enable=false"
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=${CLAWDIY_INTERNAL_PORT:-18789}"
      - "prometheus.io/path=/metrics"

    networks:
      - traefik-net
      - fleet-internal
      - monitoring

volumes:
  clawdiy-state:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/clawdiy/state
  clawdiy-audit:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/clawdiy/audit

networks:
  traefik-net:
    external: true
  fleet-internal:
    name: ${FLEET_INTERNAL_NETWORK:-fleet-internal}
    external: true
  monitoring:
    name: ${MONITORING_NETWORK:-moltinger_monitoring}
    external: true
