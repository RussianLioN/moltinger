# Moltis Deployment Workflow
# Passwordless SSH deployment to ainetic.tech via Traefik

name: Deploy Moltis

# Prevent parallel deployments - queue them instead
# Expert: CI/CD Architect | Issue: moltinger-9q3
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Moltis image version (e.g., latest, v1.0.0)'
        required: false
        default: 'latest'
        type: string
      rollback:
        description: 'Rollback to previous version'
        required: false
        default: false
        type: boolean

env:
  # Server configuration
  SSH_HOST: ainetic.tech
  SSH_USER: root
  DEPLOY_PATH: /opt/moltinger
  BACKUP_PATH: /var/backups/moltis

  # Container configuration
  MOLTIS_IMAGE: ghcr.io/moltis-org/moltis
  CONTAINER_NAME: moltis

jobs:
  # ===========================================
  # GitOps Compliance Check (P1 - Incident #002)
  # ===========================================
  # Verifies server configuration matches git before deployment
  # Detects manual modifications that would cause config drift
  gitops-compliance:
    name: GitOps Compliance Check
    runs-on: ubuntu-latest
    outputs:
      compliant: ${{ steps.check.outputs.compliant }}
      drift_detected: ${{ steps.check.outputs.drift_detected }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Check GitOps compliance
        id: check
        run: |
          echo "::group::GitOps Compliance Check"
          DRIFT_FOUND=false

          # Function to compare files
          compare_files() {
            local LOCAL_FILE="$1"
            local REMOTE_FILE="$2"
            local DESCRIPTION="$3"

            if [ -f "$LOCAL_FILE" ]; then
              LOCAL_HASH=$(sha256sum "$LOCAL_FILE" | cut -d' ' -f1)
              REMOTE_HASH=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "sha256sum $REMOTE_FILE 2>/dev/null | cut -d' ' -f1" || echo "NOT_FOUND")

              if [ "$REMOTE_HASH" = "NOT_FOUND" ]; then
                echo "::notice::$DESCRIPTION not found on server (will be created)"
              elif [ "$LOCAL_HASH" != "$REMOTE_HASH" ]; then
                echo "::warning::$DESCRIPTION DRIFT DETECTED (local != server)"
                echo "  Local:  $LOCAL_HASH"
                echo "  Server: $REMOTE_HASH"
                return 1
              else
                echo "::notice::$DESCRIPTION compliant ✅"
              fi
            fi
            return 0
          }

          # Check 1: docker-compose.yml
          echo "=== Check 1: docker-compose.yml ==="
          if ! compare_files "docker-compose.yml" "${{ env.DEPLOY_PATH }}/docker-compose.yml" "docker-compose.yml"; then
            DRIFT_FOUND=true
          fi

          # Check 2: config/moltis.toml
          echo "=== Check 2: config/moltis.toml ==="
          if ! compare_files "config/moltis.toml" "${{ env.DEPLOY_PATH }}/config/moltis.toml" "moltis.toml"; then
            DRIFT_FOUND=true
          fi

          # Check 3: config/mcp-servers.json (if exists)
          echo "=== Check 3: config/mcp-servers.json ==="
          if [ -f "config/mcp-servers.json" ]; then
            if ! compare_files "config/mcp-servers.json" "${{ env.DEPLOY_PATH }}/config/mcp-servers.json" "mcp-servers.json"; then
              DRIFT_FOUND=true
            fi
          fi

          # Check 4: scripts/ directory
          echo "=== Check 4: scripts/ directory ==="
          if [ -d "scripts" ] && [ "$(ls -A scripts 2>/dev/null)" ]; then
            for SCRIPT in scripts/*; do
              if [ -f "$SCRIPT" ]; then
                SCRIPT_NAME=$(basename "$SCRIPT")
                if ! compare_files "$SCRIPT" "${{ env.DEPLOY_PATH }}/scripts/$SCRIPT_NAME" "scripts/$SCRIPT_NAME"; then
                  DRIFT_FOUND=true
                fi
              fi
            done
          fi

          # Output results
          if [ "$DRIFT_FOUND" = true ]; then
            echo "::warning::GitOps drift detected - files will be synced during deployment"
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            echo "compliant=false" >> $GITHUB_OUTPUT
          else
            echo "::notice::All GitOps checks passed ✅"
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "compliant=true" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Compliance summary
        if: always()
        run: |
          echo "## GitOps Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Drift Detected | \`${{ steps.check.outputs.drift_detected }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliant | \`${{ steps.check.outputs.compliant }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Note: Drift will be auto-corrected during deployment" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Pre-flight checks and validation
  # ===========================================
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_deploy: ${{ steps.validate.outputs.should_deploy }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Deploying Moltis version: $VERSION"

      - name: Validate deployment prerequisites
        id: validate
        run: |
          # Check if this is a rollback
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "::notice::Rollback requested, skipping preflight"
            exit 0
          fi

          echo "should_deploy=true" >> $GITHUB_OUTPUT

          # Validate SSH key is available
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::SSH_PRIVATE_KEY secret not configured"
            exit 1
          fi

          echo "::notice::All preflight checks passed"

      - name: Validate scripts manifest (IaC)
        run: |
          echo "::group::Scripts Manifest Validation"
          if [ -f "scripts/manifest.json" ]; then
            # Install jq if not available
            if ! command -v jq &>/dev/null; then
              sudo apt-get update -qq && sudo apt-get install -y -qq jq
            fi

            # Validate manifest syntax
            if ! jq empty scripts/manifest.json 2>/dev/null; then
              echo "::error::scripts/manifest.json is not valid JSON"
              exit 1
            fi

            # Check all scripts in manifest exist
            MISSING=0
            while IFS= read -r script; do
              if [ ! -f "scripts/$script" ]; then
                echo "::error::Script missing: $script (in manifest but not in repo)"
                MISSING=$((MISSING + 1))
              fi
            done < <(jq -r '.scripts | keys[]' scripts/manifest.json)

            if [ $MISSING -gt 0 ]; then
              exit 1
            fi

            # Summary
            TOTAL=$(jq -r '.scripts | length' scripts/manifest.json)
            ENTRYPOINTS=$(jq -r '[.scripts[] | select(.entrypoint == true)] | length' scripts/manifest.json)
            echo "::notice::Scripts validated: $TOTAL total, $ENTRYPOINTS entrypoints"
          else
            echo "::warning::scripts/manifest.json not found (IaC validation skipped)"
          fi
          echo "::endgroup::"

  # ===========================================
  # Pre-deployment Tests (moltinger-kpt)
  # ===========================================
  # Runs validation tests before deployment
  # Deploy is blocked if tests fail
  # ===========================================
  test:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.should_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck yamllint

      - name: Shellcheck - Bash scripts
        run: |
          echo "::group::Shellcheck analysis"
          FAILED=0

          # Run shellcheck on all bash scripts
          for script in scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking: $script"
              if ! shellcheck -x -s bash "$script"; then
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED script(s) failed shellcheck"
            exit 1
          fi

          echo "::notice::All scripts passed shellcheck ✅"
          echo "::endgroup::"

      - name: Yamllint - Docker Compose
        run: |
          echo "::group::YAML lint validation"

          if [ -f "docker-compose.yml" ]; then
            yamllint -d "{extends: relaxed, rules: {line-length: {max: 150}}}" docker-compose.yml
            echo "::notice::docker-compose.yml passed yamllint ✅"
          fi

          if [ -f "docker-compose.prod.yml" ]; then
            yamllint -d "{extends: relaxed, rules: {line-length: {max: 150}}}" docker-compose.prod.yml
            echo "::notice::docker-compose.prod.yml passed yamllint ✅"
          fi

          echo "::endgroup::"

      - name: Validate docker-compose syntax
        run: |
          echo "::group::Docker Compose validation"

          # Install docker-compose for validation
          sudo apt-get install -y -qq docker-compose

          # Validate compose file syntax (without pulling images)
          if docker-compose config --quiet 2>/dev/null; then
            echo "::notice::docker-compose.yml syntax valid ✅"
          else
            echo "::error::docker-compose.yml has syntax errors"
            docker-compose config
            exit 1
          fi

          echo "::endgroup::"

      - name: Test summary
        if: always()
        run: |
          echo "## Pre-deployment Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Shellcheck | ${{ job.status == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Yamllint | ${{ job.status == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Compose | ${{ job.status == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Backup current state before deployment
  # ===========================================
  backup:
    name: Backup Current State
    runs-on: ubuntu-latest
    needs: [preflight, gitops-compliance]
    if: needs.preflight.outputs.should_deploy == 'true' && github.event.inputs.rollback != 'true'

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create pre-deployment backup
        id: backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e

            BACKUP_DIR="${{ env.BACKUP_PATH }}"
            CONFIG_DIR="${{ env.DEPLOY_PATH }}/config"
            DATA_DIR="${{ env.DEPLOY_PATH }}/data"
            COMPOSE_FILE="${{ env.DEPLOY_PATH }}/docker-compose.yml"

            mkdir -p "$BACKUP_DIR"

            # Get current image version for backup metadata
            CURRENT_IMAGE=$(docker inspect moltis --format='{{.Config.Image}}' 2>/dev/null || echo "unknown")

            # Create backup (includes docker-compose.yml for full rollback)
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="$BACKUP_DIR/pre_deploy_$TIMESTAMP.tar.gz"

            if [ -d "$CONFIG_DIR" ] && [ -d "$DATA_DIR" ]; then
              tar -czf "$BACKUP_FILE" \
                -C "$(dirname $CONFIG_DIR)" "$(basename $CONFIG_DIR)" \
                -C "$(dirname $DATA_DIR)" "$(basename $DATA_DIR)" \
                2>/dev/null || true

              # Backup docker-compose.yml separately (for GitOps rollback)
              if [ -f "$COMPOSE_FILE" ]; then
                cp "$COMPOSE_FILE" "$BACKUP_FILE.compose"
              fi

              # Save image version metadata
              echo "$CURRENT_IMAGE" > "$BACKUP_FILE.version"

              echo "::notice::Backup created: $BACKUP_FILE ($CURRENT_IMAGE)"
            else
              echo "::warning::Config or data directories not found, skipping backup"
            fi

            # Rotate old backups (keep last 10)
            cd "$BACKUP_DIR"
            ls -t pre_deploy_*.tar.gz 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true
            ls -t pre_deploy_*.compose 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true
          EOF

          echo "backup_timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

  # ===========================================
  # Deploy Moltis container
  # ===========================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [preflight, backup, test]
    if: always() && needs.preflight.outputs.should_deploy == 'true' && needs.test.result == 'success'
    environment:
      name: production
      url: https://moltis.ainetic.tech

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      # ===========================================
      # GitOps Step 1: Sync ALL configuration files
      # ===========================================
      # CRITICAL: We sync the ENTIRE docker-compose.yml, not just the version.
      # This ensures: labels, networks, volumes, environment - all match git.
      # NEVER use 'sed' to update only part of the file (causes config drift).
      # ===========================================
      - name: Sync configuration files (GitOps)
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          echo "::group::Syncing configuration files to server"

          # Sync docker-compose.yml from git to server
          # This ensures ALL configuration (labels, networks, volumes) matches git
          scp docker-compose.yml ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml

          # Sync config directory (moltis.toml, mcp-servers.json, etc.)
          # This ensures MCP servers and all Moltis settings match git
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}/config"
          scp -r config/* ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/config/

          # Sync scripts directory (GitOps compliance - incident #002)
          # All server scripts must come from git, not manual scp
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}/scripts"
          scp -r scripts/* ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/scripts/ 2>/dev/null || echo "No scripts to sync"

          echo "Configuration synced successfully (docker-compose.yml + config/ + scripts/)"
          echo "::endgroup::"

      # ===========================================
      # GitOps Step 1.4: Install Cron Jobs (moltinger-hdn)
      # ===========================================
      # Installs system cron jobs from scripts/cron.d/
      # All cron configurations must come from git (GitOps compliance)
      # ===========================================
      - name: Install cron jobs
        run: |
          echo "::group::Installing cron jobs from scripts/cron.d/"

          # Check if cron.d directory exists in repo
          if [ -d "scripts/cron.d" ] && [ "$(ls -A scripts/cron.d/ 2>/dev/null)" ]; then
            ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'CRONEOF'
              # Create cron.d directory if not exists
              mkdir -p /opt/moltinger/scripts/cron.d

              # Install each cron file
              for cron_file in /opt/moltinger/scripts/cron.d/*; do
                if [ -f "$cron_file" ]; then
                  cron_name=$(basename "$cron_file")
                  echo "Installing cron: $cron_name"

                  # Copy to system cron.d with correct permissions
                  cp "$cron_file" "/etc/cron.d/$cron_name"
                  chmod 644 "/etc/cron.d/$cron_name"
                  chown root:root "/etc/cron.d/$cron_name"
                fi
              done

              # Verify cron service is running
              if command -v systemctl &>/dev/null; then
                systemctl reload cron 2>/dev/null || systemctl restart cron 2>/dev/null || true
              fi

              echo "Cron jobs installed successfully"
          CRONEOF

            echo "::notice::Cron jobs installed from GitOps"
          else
            echo "::notice::No cron jobs to install (scripts/cron.d/ empty or missing)"
          fi

          echo "::endgroup::"

      # ===========================================
      # GitOps Step 1.5: Generate .env from Secrets
      # ===========================================
      # CRITICAL: .env file is generated from GitHub Secrets, never committed to git
      # This ensures secrets are synced to server without exposing in repo
      # ===========================================
      - name: Generate .env from Secrets
        run: |
          echo "::group::Generating .env file from GitHub Secrets"

          # Create .env file content with secrets expanded
          cat > /tmp/moltis.env << EOF
          # Auto-generated by CI/CD from GitHub Secrets
          # DO NOT EDIT MANUALLY - changes will be overwritten

          # Authentication
          MOLTIS_PASSWORD=${{ secrets.MOLTIS_PASSWORD }}

          # LLM Provider - GLM (Zhipu AI)
          GLM_API_KEY=${{ secrets.GLM_API_KEY }}

          # Web Search - Tavily
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}

          # Telegram Bot
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS=${{ secrets.TELEGRAM_ALLOWED_USERS }}

          # Domain
          MOLTIS_DOMAIN=ainetic.tech
          EOF

          # Copy to server
          scp /tmp/moltis.env ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/.env

          # Cleanup local temp file
          rm /tmp/moltis.env

          echo ".env file generated and synced successfully"
          echo "::endgroup::"

      - name: Pull new image
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          echo "::group::Pulling Moltis image $VERSION"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << EOF
            docker pull ${{ env.MOLTIS_IMAGE }}:$VERSION
          EOF
          echo "::endgroup::"

      # ===========================================
      # GitOps Step 2: Validate configuration before deploy
      # ===========================================
      - name: Validate configuration (GitOps)
        run: |
          echo "::group::Validating docker-compose configuration"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # Validate docker-compose.yml syntax
            docker compose config --quiet

            # Verify the file matches expected structure
            if ! grep -q "traefik.enable=true" docker-compose.yml; then
              echo "::error::Traefik labels missing in docker-compose.yml"
              exit 1
            fi

            echo "Configuration validation passed"
          EOF
          echo "::endgroup::"

      - name: Deploy container
        id: deploy
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          echo "::group::Deploying Moltis $VERSION"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e

            cd ${{ env.DEPLOY_PATH }}

            # Pull latest image
            docker compose pull moltis

            # Stop container gracefully
            echo "Stopping current container..."
            docker compose stop moltis || true

            # Start new container
            echo "Starting new container..."
            docker compose up -d moltis

            # Remove old images
            docker image prune -f

            echo "Deployment completed"
          EOF
          echo "::endgroup::"

      - name: Wait for health check
        id: health
        timeout-minutes: 3
        run: |
          echo "::group::Waiting for health check"

          MAX_RETRIES=30
          RETRY_INTERVAL=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HEALTH=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
              "docker inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo 'not_found'")

            echo "Health check attempt $((RETRY_COUNT + 1))/$MAX_RETRIES: $HEALTH"

            if [ "$HEALTH" = "healthy" ]; then
              echo "::notice::Container is healthy!"
              echo "status=healthy" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$HEALTH" = "not_found" ]; then
              echo "::error::Container not found!"
              echo "status=not_found" >> $GITHUB_OUTPUT
              exit 1
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep $RETRY_INTERVAL
          done

          echo "::error::Health check timeout after $MAX_RETRIES attempts"
          echo "status=unhealthy" >> $GITHUB_OUTPUT
          exit 1

          echo "::endgroup::"

      - name: Verify external access
        if: success()
        run: |
          echo "::group::Verifying external access"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            # Check Traefik routing
            curl -sf https://moltis.ainetic.tech/health -o /dev/null && \
              echo "::notice::External access verified via Traefik" || \
              echo "::warning::External access check failed"
          EOF
          echo "::endgroup::"

      - name: Deployment summary
        if: always()
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          STATUS="${{ steps.health.outputs.status }}"

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://moltis.ainetic.tech |" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Rollback procedure
  # ===========================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: preflight
    if: github.event.inputs.rollback == 'true'
    environment:
      name: production
      url: https://moltis.ainetic.tech

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Find last backup
        id: backup
        run: |
          echo "::group::Finding last backup"
          BACKUP_INFO=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            BACKUP_DIR="${{ env.BACKUP_PATH }}"
            LATEST=$(ls -t $BACKUP_DIR/pre_deploy_*.tar.gz 2>/dev/null | head -1)

            if [ -z "$LATEST" ]; then
              echo "ERROR: No backup found"
              exit 1
            fi

            VERSION=$(cat "${LATEST}.version" 2>/dev/null || echo "unknown")
            echo "backup_file=$LATEST"
            echo "backup_version=$VERSION"
          EOF
          )

          BACKUP_FILE=$(echo "$BACKUP_INFO" | grep "backup_file=" | cut -d= -f2)
          BACKUP_VERSION=$(echo "$BACKUP_INFO" | grep "backup_version=" | cut -d= -f2)

          if [ -z "$BACKUP_FILE" ]; then
            echo "::error::No backup found for rollback"
            exit 1
          fi

          echo "backup_file=$BACKUP_FILE" >> $GITHUB_OUTPUT
          echo "backup_version=$BACKUP_VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Found backup: $BACKUP_FILE (version: $BACKUP_VERSION)"
          echo "::endgroup::"

      - name: Restore backup
        run: |
          BACKUP_FILE="${{ steps.backup.outputs.backup_file }}"
          BACKUP_VERSION="${{ steps.backup.outputs.backup_version }}"

          echo "::group::Restoring backup (GitOps)"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << EOF
            set -e

            cd ${{ env.DEPLOY_PATH }}

            # Stop container
            docker compose stop moltis || true

            # Restore data (config + data directories)
            tar -xzf $BACKUP_FILE -C /

            # Restore docker-compose.yml from backup (GitOps: exact config restore)
            if [ -f "${BACKUP_FILE}.compose" ]; then
              cp "${BACKUP_FILE}.compose" docker-compose.yml
              echo "Restored docker-compose.yml from backup"
            fi

            # Pull the backed-up image version if known
            if [ "$BACKUP_VERSION" != "unknown" ]; then
              docker pull $BACKUP_VERSION
            fi

            # Start container
            docker compose up -d moltis

            echo "Rollback completed to version: $BACKUP_VERSION"
          EOF
          echo "::endgroup::"

      - name: Wait for health check
        timeout-minutes: 3
        run: |
          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HEALTH=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
              "docker inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo 'not_found'")

            if [ "$HEALTH" = "healthy" ]; then
              echo "::notice::Rollback successful - container is healthy!"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 5
          done

          echo "::error::Rollback health check failed"
          exit 1

      - name: Rollback summary
        if: always()
        run: |
          echo "## Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backup | \`${{ steps.backup.outputs.backup_file }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.backup.outputs.backup_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Post-deployment verification
  # ===========================================
  verify:
    name: Post-deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy, rollback]
    if: always() && (needs.deploy.result == 'success' || needs.rollback.result == 'success')

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Run smoke tests
        id: smoke
        run: |
          echo "::group::Running smoke tests"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e

            # Test 1: Container is running
            echo "Test 1: Container running..."
            docker ps --filter "name=moltis" --filter "status=running" | grep -q moltis

            # Test 2: Health endpoint responds
            echo "Test 2: Health endpoint..."
            curl -sf http://localhost:13131/health > /dev/null

            # Test 3: Traefik routing works (401 = auth required, that's OK)
            echo "Test 3: Traefik routing..."
            HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://moltis.ainetic.tech/health)
            if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "Traefik routing OK (HTTP $HTTP_CODE)"
            else
              echo "Unexpected HTTP code: $HTTP_CODE"
              exit 1
            fi

            # Test 4: Main endpoint (non-blocking - Traefik middleware may cause delays)
            echo "Test 4: Main endpoint..."
            HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 https://moltis.ainetic.tech/ 2>/dev/null) || true
            if [ -n "$HTTP_CODE" ] && { [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "303" ]; }; then
              echo "Main endpoint OK (HTTP $HTTP_CODE)"
            else
              echo "Main endpoint: HTTP $HTTP_CODE (non-critical - Traefik middleware may cause delays)"
            fi

            # Test 5: GitOps - verify docker-compose.yml has correct Traefik labels
            echo "Test 5: GitOps configuration check..."
            cd ${{ env.DEPLOY_PATH }}
            if grep -q 'traefik.http.routers.moltis.rule=Host(`moltis.ainetic.tech`)' docker-compose.yml; then
              echo "GitOps: Traefik Host rule correct (moltis.ainetic.tech)"
            else
              echo "::error::GitOps violation: Traefik Host rule mismatch in docker-compose.yml"
              echo "Expected: Host(\`moltis.ainetic.tech\`)"
              echo "Found in file:"
              grep "traefik.http.routers.moltis.rule" docker-compose.yml || echo "(not found)"
              exit 1
            fi

            echo "All smoke tests passed!"
          EOF
          echo "::endgroup::"

      - name: Get deployment info
        id: info
        run: |
          INFO=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            IMAGE=$(docker inspect --format='{{.Config.Image}}' moltis)
            CREATED=$(docker inspect --format='{{.Created}}' moltis)
            UPTIME=$(docker inspect --format='{{.State.StartedAt}}' moltis)

            echo "image=$IMAGE"
            echo "created=$CREATED"
            echo "uptime=$UPTIME"
          EOF
          )

          echo "image=$(echo "$INFO" | grep "^image=" | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Verification summary
        run: |
          echo "## Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All smoke tests passed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Container Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ steps.info.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://moltis.ainetic.tech" >> $GITHUB_STEP_SUMMARY
          echo "- **Health**: https://moltis.ainetic.tech/health" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Notify on failure
  # ===========================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy, rollback]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "::warning::Deployment failed! Check the logs for details."
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deployment to production has failed. Please check the logs above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rollback Instructions" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to Actions tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Select 'Deploy Moltis' workflow" >> $GITHUB_STEP_SUMMARY
          echo "3. Click 'Run workflow'" >> $GITHUB_STEP_SUMMARY
          echo "4. Check 'Rollback to previous version'" >> $GITHUB_STEP_SUMMARY
          echo "5. Click 'Run workflow'" >> $GITHUB_STEP_SUMMARY
