# Moltis Deployment Workflow
# Passwordless SSH deployment to ainetic.tech via Traefik

name: Deploy Moltis

# Prevent parallel deployments - queue them instead
# Expert: CI/CD Architect | Issue: moltinger-9q3
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      version:
        description: 'Moltis image version (leave blank to use tracked git version, typically latest per official Docker docs)'
        required: false
        default: 'latest'
        type: string
      repair_server_checkout:
        description: 'Capture evidence and reconcile a dirty /opt/moltinger checkout before deploy (workflow_dispatch only)'
        required: false
        default: false
        type: boolean
      rollback:
        description: 'Rollback to previous version'
        required: false
        default: false
        type: boolean

env:
  # Server configuration
  SSH_HOST: ainetic.tech
  SSH_USER: root
  DEPLOY_PATH: /opt/moltinger
  BACKUP_PATH: /var/backups/moltis

  # Container configuration
  MOLTIS_IMAGE: ghcr.io/moltis-org/moltis
  CONTAINER_NAME: moltis

jobs:
  # ===========================================
  # GitOps Compliance Check (P1 - Incident #002)
  # ===========================================
  # Verifies server configuration matches git before deployment
  # Detects manual modifications that would cause config drift
  gitops-compliance:
    name: GitOps Compliance Check
    runs-on: ubuntu-latest
    outputs:
      compliant: ${{ steps.check.outputs.compliant }}
      drift_detected: ${{ steps.check.outputs.drift_detected }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Check GitOps compliance
        id: check
        run: |
          echo "::group::GitOps Compliance Check"
          DRIFT_FOUND=false
          SERVER_DIRTY=false
          PENDING_SYNC=false
          REPAIR_PERFORMED=false
          DRIFT_SNAPSHOT=""
          TARGET_ENV="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}"
          REPAIR_REQUESTED=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.repair_server_checkout }}" = "true" ]; then
            REPAIR_REQUESTED=true
          fi

          if [ "$REPAIR_REQUESTED" = true ] && [ "$TARGET_ENV" = "production" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            echo "::error::repair_server_checkout is only allowed for production deploys from main or a matching release tag."
            exit 1
          fi

          # Function to compare files
          compare_files() {
            local LOCAL_FILE="$1"
            local REMOTE_FILE="$2"
            local DESCRIPTION="$3"

            if [ -f "$LOCAL_FILE" ]; then
              LOCAL_HASH=$(sha256sum "$LOCAL_FILE" | cut -d' ' -f1)
              REMOTE_HASH=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "sha256sum $REMOTE_FILE 2>/dev/null | cut -d' ' -f1" || echo "NOT_FOUND")

              if [ "$REMOTE_HASH" = "NOT_FOUND" ]; then
                echo "::notice::$DESCRIPTION not found on server (will be created during deploy)"
              elif [ "$LOCAL_HASH" != "$REMOTE_HASH" ]; then
                echo "::notice::$DESCRIPTION pending sync (git desired state differs from deployed server file)"
                echo "  Local:  $LOCAL_HASH"
                echo "  Server: $REMOTE_HASH"
                return 1
              else
                echo "::notice::$DESCRIPTION compliant ✅"
              fi
            fi
            return 0
          }

          is_managed_path() {
            local candidate="$1"
            case "$candidate" in
              docker-compose.yml|docker-compose.prod.yml|config/*|scripts/*|systemd/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          status_entry_is_repairable() {
            local entry="$1"
            local source_path target_path

            if [[ "$entry" == *" -> "* ]]; then
              source_path="${entry%% -> *}"
              target_path="${entry##* -> }"
              is_managed_path "$source_path" && is_managed_path "$target_path"
              return
            fi

            is_managed_path "$entry"
          }

          # Check 1: docker-compose.yml
          echo "=== Check 1: docker-compose.yml ==="
          if ! compare_files "docker-compose.yml" "${{ env.DEPLOY_PATH }}/docker-compose.yml" "docker-compose.yml"; then
            PENDING_SYNC=true
          fi

          # Check 2: docker-compose.prod.yml
          echo "=== Check 2: docker-compose.prod.yml ==="
          if ! compare_files "docker-compose.prod.yml" "${{ env.DEPLOY_PATH }}/docker-compose.prod.yml" "docker-compose.prod.yml"; then
            PENDING_SYNC=true
          fi

          # Check 3: config/moltis.toml
          echo "=== Check 3: config/moltis.toml ==="
          if ! compare_files "config/moltis.toml" "${{ env.DEPLOY_PATH }}/config/moltis.toml" "moltis.toml"; then
            PENDING_SYNC=true
          fi

          # Check 4: config/mcp-servers.json (if exists)
          echo "=== Check 4: config/mcp-servers.json ==="
          if [ -f "config/mcp-servers.json" ]; then
            if ! compare_files "config/mcp-servers.json" "${{ env.DEPLOY_PATH }}/config/mcp-servers.json" "mcp-servers.json"; then
              PENDING_SYNC=true
            fi
          fi

          # Check 5: scripts/ directory
          echo "=== Check 5: scripts/ directory ==="
          if [ -d "scripts" ] && [ "$(ls -A scripts 2>/dev/null)" ]; then
            for SCRIPT in scripts/*; do
              if [ -f "$SCRIPT" ]; then
                SCRIPT_NAME=$(basename "$SCRIPT")
                if ! compare_files "$SCRIPT" "${{ env.DEPLOY_PATH }}/scripts/$SCRIPT_NAME" "scripts/$SCRIPT_NAME"; then
                  PENDING_SYNC=true
                fi
              fi
            done
          fi

          # Check 6: systemd/ directory
          echo "=== Check 6: systemd/ directory ==="
          if [ -d "systemd" ] && [ "$(ls -A systemd 2>/dev/null)" ]; then
            for UNIT in systemd/*; do
              if [ -f "$UNIT" ]; then
                UNIT_NAME=$(basename "$UNIT")
                if ! compare_files "$UNIT" "${{ env.DEPLOY_PATH }}/systemd/$UNIT_NAME" "systemd/$UNIT_NAME"; then
                  PENDING_SYNC=true
                fi
              fi
            done
          fi

          # Check 7: server worktree cleanliness (hard block unless repairable)
          echo "=== Check 7: server git status --porcelain ==="
          SERVER_STATUS=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "cd ${{ env.DEPLOY_PATH }} && git status --porcelain 2>/dev/null" || true)
          if [ -n "$SERVER_STATUS" ]; then
            echo "::warning::Server working tree is dirty before deploy."
            echo "$SERVER_STATUS"

            REPAIRABLE_DIRTY_STATE=true
            while IFS= read -r STATUS_LINE; do
              [ -z "$STATUS_LINE" ] && continue
              STATUS_PATH="${STATUS_LINE:3}"
              if ! status_entry_is_repairable "$STATUS_PATH"; then
                echo "::error::Dirty path is outside deploy-managed surface: $STATUS_PATH"
                REPAIRABLE_DIRTY_STATE=false
              fi
            done <<< "$SERVER_STATUS"

            if [ "$REPAIR_REQUESTED" = true ] && [ "$REPAIRABLE_DIRTY_STATE" = true ]; then
              echo "::warning::Attempting GitOps-safe repair of deploy-managed server checkout"
              DRIFT_SNAPSHOT="$(bash scripts/gitops-repair-managed-checkout.sh \
                --ssh-user "${{ env.SSH_USER }}" \
                --ssh-host "${{ env.SSH_HOST }}" \
                --deploy-path "${{ env.DEPLOY_PATH }}" \
                --backup-path "${{ env.BACKUP_PATH }}" \
                --target-ref "${{ github.ref_name }}" \
                --target-sha "${{ github.sha }}" \
                --run-id "${{ github.run_id }}" \
                --repository "${{ github.repository }}")"
              REPAIR_PERFORMED=true
              echo "::notice::Server drift snapshot saved to $DRIFT_SNAPSHOT"

              SERVER_STATUS=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "cd ${{ env.DEPLOY_PATH }} && git status --porcelain 2>/dev/null" || true)
              if [ -n "$SERVER_STATUS" ]; then
                echo "::error::Server working tree remains dirty after repair."
                echo "$SERVER_STATUS"
                SERVER_DIRTY=true
                DRIFT_FOUND=true
              else
                echo "::notice::Server working tree repaired and clean ✅"
              fi
            else
              echo "::error::Server working tree is dirty. Deployment blocked by GitOps policy."
              if [ "$REPAIR_REQUESTED" = true ] && [ "$REPAIRABLE_DIRTY_STATE" = false ]; then
                echo "::error::repair_server_checkout refuses to touch files outside deploy-managed surface."
              fi
              SERVER_DIRTY=true
              DRIFT_FOUND=true
            fi
          else
            echo "::notice::Server working tree is clean ✅"
          fi

          # Output results
          if [ "$DRIFT_FOUND" = true ]; then
            echo "::error::GitOps drift detected"
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            echo "compliant=false" >> $GITHUB_OUTPUT
            echo "server_dirty=$SERVER_DIRTY" >> $GITHUB_OUTPUT
            echo "pending_sync=$PENDING_SYNC" >> $GITHUB_OUTPUT
            echo "repair_performed=$REPAIR_PERFORMED" >> $GITHUB_OUTPUT
            echo "drift_snapshot=$DRIFT_SNAPSHOT" >> $GITHUB_OUTPUT
          else
            if [ "$PENDING_SYNC" = true ]; then
              echo "::notice::Server is clean; deploy-managed files differ and will be synced during this run"
            else
              echo "::notice::All GitOps checks passed ✅"
            fi
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "compliant=true" >> $GITHUB_OUTPUT
            echo "server_dirty=false" >> $GITHUB_OUTPUT
            echo "pending_sync=$PENDING_SYNC" >> $GITHUB_OUTPUT
            echo "repair_performed=$REPAIR_PERFORMED" >> $GITHUB_OUTPUT
            echo "drift_snapshot=$DRIFT_SNAPSHOT" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Block deployment on GitOps drift
        if: steps.check.outputs.drift_detected == 'true'
        run: |
          echo "::error::Deployment blocked: GitOps drift or dirty server worktree detected."
          exit 1
      - name: Compliance summary
        if: always()
        run: |
          echo "## GitOps Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Drift Detected | \`${{ steps.check.outputs.drift_detected }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Server Dirty | \`${{ steps.check.outputs.server_dirty }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pending Sync | \`${{ steps.check.outputs.pending_sync }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Repair Performed | \`${{ steps.check.outputs.repair_performed }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliant | \`${{ steps.check.outputs.compliant }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.check.outputs.drift_snapshot }}" ]; then
            echo "- Drift snapshot: \`${{ steps.check.outputs.drift_snapshot }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "> Hard block applies only to dirty server worktree. Deploy-managed file deltas are treated as pending sync." >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Pre-flight checks and validation (P2-6)
  # ===========================================
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_deploy: ${{ steps.validate.outputs.should_deploy }}
      preflight_passed: ${{ steps.preflight.outputs.passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          chmod +x scripts/moltis-version.sh
          TRACKED_VERSION="$(scripts/moltis-version.sh version)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="$TRACKED_VERSION"
            fi
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="$TRACKED_VERSION"
          fi
          echo "tracked_version=$TRACKED_VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Tracked Moltis version in git: $TRACKED_VERSION"
          echo "::notice::Deploying Moltis version: $VERSION"

      - name: Validate deployment prerequisites
        id: validate
        run: |
          TARGET_ENV="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}"
          TRACKED_VERSION="${{ steps.version.outputs.tracked_version }}"

          # Check if this is a rollback
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "::notice::Rollback requested, skipping preflight"
            exit 0
          fi

          if [ "$TARGET_ENV" = "production" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            echo "::error::Production deploys must run from main. Current ref: ${{ github.ref_name }}"
            exit 1
          fi

          if [ "$TARGET_ENV" = "production" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ] && [ "${{ github.event.inputs.version }}" != "$TRACKED_VERSION" ]; then
            echo "::error::Production workflow_dispatch must use tracked Moltis version $TRACKED_VERSION or leave version blank."
            exit 1
          fi

          if [ "$TARGET_ENV" = "production" ] && [ "${{ github.ref_type }}" = "tag" ] && [ "${{ steps.version.outputs.version }}" != "$TRACKED_VERSION" ]; then
            echo "::error::Production tag deploy version must match tracked Moltis version $TRACKED_VERSION."
            exit 1
          fi

          echo "should_deploy=true" >> $GITHUB_OUTPUT

          # Validate SSH key is available
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::SSH_PRIVATE_KEY secret not configured"
            exit 1
          fi

          echo "::notice::All preflight checks passed"

      - name: Run preflight validation script
        id: preflight
        if: steps.validate.outputs.should_deploy == 'true'
        run: |
          echo "::group::Pre-flight Validation (P2-6)"
          chmod +x scripts/preflight-check.sh

          # Run preflight checks in CI mode (skip Docker/runtime checks, secrets in GitHub)
          # Note: --strict removed because secrets are in GitHub, not local files
          if ./scripts/preflight-check.sh --ci --json > /tmp/preflight-result.json; then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "::notice::All preflight checks passed ✅"
            cat /tmp/preflight-result.json | jq .
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "::error::Preflight checks failed"
            echo "Preflight output:"
            cat /tmp/preflight-result.json
            exit 4
          fi
          echo "::endgroup::"

      - name: Validate scripts manifest (IaC)
        run: |
          echo "::group::Scripts Manifest Validation"
          if [ -f "scripts/manifest.json" ]; then
            # Install jq if not available
            if ! command -v jq &>/dev/null; then
              sudo apt-get update -qq && sudo apt-get install -y -qq jq
            fi

            # Validate manifest syntax
            if ! jq empty scripts/manifest.json 2>/dev/null; then
              echo "::error::scripts/manifest.json is not valid JSON"
              exit 1
            fi

            # Check all scripts in manifest exist
            MISSING=0
            while IFS= read -r script; do
              if [ ! -f "scripts/$script" ]; then
                echo "::error::Script missing: $script (in manifest but not in repo)"
                MISSING=$((MISSING + 1))
              fi
            done < <(jq -r '.scripts | keys[]' scripts/manifest.json)

            if [ $MISSING -gt 0 ]; then
              exit 1
            fi

            # Summary
            TOTAL=$(jq -r '.scripts | length' scripts/manifest.json)
            ENTRYPOINTS=$(jq -r '[.scripts[] | select(.entrypoint == true)] | length' scripts/manifest.json)
            echo "::notice::Scripts validated: $TOTAL total, $ENTRYPOINTS entrypoints"
          else
            echo "::warning::scripts/manifest.json not found (IaC validation skipped)"
          fi
          echo "::endgroup::"

  # ===========================================
  # Pre-deployment Tests (moltinger-kpt)
  # ===========================================
  # Runs validation tests before deployment
  # Deploy is blocked if tests fail
  # ===========================================
  test:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.should_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck yamllint

      - name: Shellcheck - Bash scripts
        run: |
          echo "::group::Shellcheck analysis"
          FAILED=0

          # Run shellcheck on all bash scripts
          # Note: -S error means only report actual errors (not warnings/info/style)
          for script in scripts/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking: $script"
              if ! shellcheck -x -s bash -S error "$script"; then
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED script(s) failed shellcheck"
            exit 1
          fi

          echo "::notice::All scripts passed shellcheck ✅"
          echo "::endgroup::"

      - name: Yamllint - Docker Compose
        run: |
          echo "::group::YAML lint validation"

          if [ -f "docker-compose.yml" ]; then
            yamllint -d "{extends: relaxed, rules: {line-length: {max: 150}}}" docker-compose.yml
            echo "::notice::docker-compose.yml passed yamllint ✅"
          fi

          if [ -f "docker-compose.prod.yml" ]; then
            yamllint -d "{extends: relaxed, rules: {line-length: {max: 150}}}" docker-compose.prod.yml
            echo "::notice::docker-compose.prod.yml passed yamllint ✅"
          fi

          echo "::endgroup::"

      - name: Validate docker-compose syntax
        run: |
          echo "::group::Docker Compose validation"

          # Install docker-compose for validation
          sudo apt-get install -y -qq docker-compose

          # Validate compose file syntax (without pulling images)
          if docker-compose -f docker-compose.prod.yml config --quiet 2>/dev/null; then
            echo "::notice::docker-compose.prod.yml syntax valid ✅"
          else
            echo "::error::docker-compose.prod.yml has syntax errors"
            docker-compose -f docker-compose.prod.yml config
            exit 1
          fi

          echo "::endgroup::"

      - name: Test summary
        if: always()
        run: |
          echo "## Pre-deployment Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Shellcheck | ${{ job.status == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Yamllint | ${{ job.status == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Compose | ${{ job.status == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Backup current state before deployment
  # ===========================================
  backup:
    name: Backup Current State
    runs-on: ubuntu-latest
    needs: [preflight, gitops-compliance]
    if: needs.preflight.outputs.should_deploy == 'true' && github.event.inputs.rollback != 'true'
    outputs:
      backup_file: ${{ steps.backup.outputs.backup_file }}

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create pre-deployment backup
        id: backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e

            BACKUP_DIR="${{ env.BACKUP_PATH }}"
            DEPLOY_DIR="${{ env.DEPLOY_PATH }}"
            CONFIG_DIR="$DEPLOY_DIR/config"
            DATA_DIR="$DEPLOY_DIR/data"
            ENV_FILE="$DEPLOY_DIR/.env"
            COMPOSE_FILE="$DEPLOY_DIR/docker-compose.prod.yml"

            mkdir -p "$BACKUP_DIR"

            # Get current image version for backup metadata
            CURRENT_IMAGE=$(docker inspect moltis --format='{{.Config.Image}}' 2>/dev/null || echo "unknown")

            # Create backup (includes config/data/.env for full rollback)
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="$BACKUP_DIR/pre_deploy_$TIMESTAMP.tar.gz"

            BACKUP_ITEMS=""
            if [ -d "$CONFIG_DIR" ]; then
              BACKUP_ITEMS="$BACKUP_ITEMS config"
            fi
            if [ -d "$DATA_DIR" ]; then
              BACKUP_ITEMS="$BACKUP_ITEMS data"
            fi
            if [ -f "$ENV_FILE" ]; then
              BACKUP_ITEMS="$BACKUP_ITEMS .env"
            fi

            if [ -n "$BACKUP_ITEMS" ]; then
              # data/logs.jsonl is written continuously by the live service.
              # Treat volatile log churn as non-fatal so pre-deploy backup remains usable.
              tar \
                --ignore-failed-read \
                --warning=no-file-changed \
                --exclude='data/logs.jsonl' \
                -czf "$BACKUP_FILE" \
                -C "$DEPLOY_DIR" \
                $BACKUP_ITEMS
            else
              tar -czf "$BACKUP_FILE" --files-from /dev/null
              echo "::warning::No config/data/.env found, created metadata-only backup archive"
            fi

            # Backup docker-compose.prod.yml separately (for GitOps rollback)
            if [ -f "$COMPOSE_FILE" ]; then
              cp "$COMPOSE_FILE" "$BACKUP_FILE.compose"
            else
              echo "::error::Missing compose file for rollback: $COMPOSE_FILE"
              exit 1
            fi

            # Save image version metadata
            echo "$CURRENT_IMAGE" > "$BACKUP_FILE.version"

            if [ ! -f "$BACKUP_FILE" ]; then
              echo "::error::Backup archive was not created"
              exit 1
            fi

            if [ ! -f "$BACKUP_FILE.version" ]; then
              echo "::error::Backup version metadata missing"
              exit 1
            fi

            if [ ! -f "$BACKUP_FILE.compose" ]; then
              echo "::error::Backup compose metadata missing"
              exit 1
            fi

            echo "::notice::Backup created: $BACKUP_FILE ($CURRENT_IMAGE)"

            # Rotate old backups (keep last 10)
            cd "$BACKUP_DIR"
            ls -t pre_deploy_*.tar.gz 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true
            ls -t pre_deploy_*.compose 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true
            ls -t pre_deploy_*.version 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true
          EOF

          LATEST_BACKUP=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "ls -t ${{ env.BACKUP_PATH }}/pre_deploy_*.tar.gz 2>/dev/null | head -1")
          if [ -z "$LATEST_BACKUP" ]; then
            echo "::error::Failed to resolve latest backup artifact"
            exit 1
          fi

          echo "backup_timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "backup_file=$LATEST_BACKUP" >> $GITHUB_OUTPUT

  # ===========================================
  # Deploy Moltis container
  # ===========================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [preflight, backup, test, gitops-compliance]
    if: needs.preflight.outputs.should_deploy == 'true' && needs.test.result == 'success' && needs.backup.result == 'success' && needs.gitops-compliance.result == 'success'
    environment:
      name: production
      url: https://moltis.ainetic.tech
    outputs:
      auto_rollback_performed: ${{ steps.rollback_auto.outputs.rolled_back }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      # ===========================================
      # GitOps Step 1: Sync ALL configuration files
      # ===========================================
      # CRITICAL: We sync the ENTIRE docker-compose.yml, not just the version.
      # This ensures: labels, networks, volumes, environment - all match git.
      # NEVER use 'sed' to update only part of the file (causes config drift).
      # ===========================================
      - name: Sync configuration files (GitOps)
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          echo "::group::Syncing configuration files to server"

          # Sync docker-compose.yml from git to server
          # This ensures ALL configuration (labels, networks, volumes) matches git
          scp docker-compose.yml ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml

          # Sync docker-compose.prod.yml (production configuration)
          # CRITICAL: This file contains production-specific settings
          scp docker-compose.prod.yml ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.prod.yml

          # Sync config directory (moltis.toml, mcp-servers.json, etc.)
          # This ensures MCP servers and all Moltis settings match git
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}/config"
          scp -r config/* ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/config/

          # Sync scripts directory (GitOps compliance - incident #002)
          # All server scripts must come from git, not manual scp
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}/scripts"
          scp -r scripts/* ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/scripts/ 2>/dev/null || echo "No scripts to sync"

          # Sync systemd units (scheduler as code)
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}/systemd"
          scp -r systemd/* ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/systemd/ 2>/dev/null || echo "No systemd units to sync"

          echo "Configuration synced successfully (docker-compose.yml + docker-compose.prod.yml + config/ + scripts/ + systemd/)"
          echo "::endgroup::"

      # ===========================================
      # GitOps Step 1.4: Install Cron Jobs (moltinger-hdn)
      # ===========================================
      # Installs system cron jobs from scripts/cron.d/
      # All cron configurations must come from git (GitOps compliance)
      # ===========================================
      - name: Install cron jobs
        run: |
          echo "::group::Installing cron jobs from scripts/cron.d/"

          # Check if cron.d directory exists in repo
          if [ -d "scripts/cron.d" ] && [ "$(ls -A scripts/cron.d/ 2>/dev/null)" ]; then
            ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'CRONEOF'
              # Create cron.d directory if not exists
              mkdir -p /opt/moltinger/scripts/cron.d

              # Install each cron file
              for cron_file in /opt/moltinger/scripts/cron.d/*; do
                if [ -f "$cron_file" ]; then
                  cron_name=$(basename "$cron_file")
                  echo "Installing cron: $cron_name"

                  # Copy to system cron.d with correct permissions
                  cp "$cron_file" "/etc/cron.d/$cron_name"
                  chmod 644 "/etc/cron.d/$cron_name"
                  chown root:root "/etc/cron.d/$cron_name"
                fi
              done

              # Verify cron service is running
              if command -v systemctl &>/dev/null; then
                systemctl reload cron 2>/dev/null || systemctl restart cron 2>/dev/null || true
              fi

              echo "Cron jobs installed successfully"
          CRONEOF

            echo "::notice::Cron jobs installed from GitOps"
          else
            echo "::notice::No cron jobs to install (scripts/cron.d/ empty or missing)"
          fi

          echo "::endgroup::"

      - name: Disable Telegram Web auto-monitor scheduler
        run: |
          echo "::group::Disabling Telegram Web auto-monitor scheduler"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'SYSTEMDEOF'
            set -e

            rm -f /etc/cron.d/moltis-telegram-web-user-monitor
            rm -f /opt/moltinger/scripts/cron.d/moltis-telegram-web-user-monitor

            if command -v systemctl &>/dev/null; then
              systemctl disable --now moltis-telegram-web-user-monitor.timer 2>/dev/null || true
              systemctl stop moltis-telegram-web-user-monitor.service 2>/dev/null || true
              rm -f /etc/systemd/system/moltis-telegram-web-user-monitor.service
              rm -f /etc/systemd/system/moltis-telegram-web-user-monitor.timer
              systemctl daemon-reload || true
              systemctl reset-failed moltis-telegram-web-user-monitor.service moltis-telegram-web-user-monitor.timer 2>/dev/null || true
            fi

            echo "Telegram Web auto-monitor disabled"
          SYSTEMDEOF
          echo "::endgroup::"

      # ===========================================
      # GitOps Step 1.5: Generate .env from Secrets
      # ===========================================
      # CRITICAL: .env file is generated from GitHub Secrets, never committed to git
      # This ensures secrets are synced to server without exposing in repo
      # NOTE: This workflow renders only the Moltinger runtime env file.
      # Reserved Clawdiy secret inventory is documented here for future split-stack rollout:
      #   CLAWDIY_GATEWAY_TOKEN -> future Clawdiy hosted Control UI auth
      #   CLAWDIY_SERVICE_TOKEN -> future Clawdiy internal handoff bearer
      #   CLAWDIY_TELEGRAM_BOT_TOKEN -> future Clawdiy Telegram bot token
      #   CLAWDIY_TELEGRAM_ALLOWED_USERS -> future Clawdiy Telegram allowlist
      #   CLAWDIY_OPENAI_CODEX_AUTH_PROFILE -> rollout-gated provider auth artifact
      # These values must not be appended to /opt/moltinger/.env by this workflow.
      # They will be rendered by a dedicated deploy-clawdiy workflow into a separate Clawdiy env path.
      # ===========================================
      - name: Generate .env from Secrets
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          echo "::group::Generating .env file from GitHub Secrets"

          # Create .env file content with secrets expanded
          cat > /tmp/moltis.env << EOF
          # Auto-generated by CI/CD from GitHub Secrets
          # DO NOT EDIT MANUALLY - changes will be overwritten

          # Authentication
          MOLTIS_PASSWORD=${{ secrets.MOLTIS_PASSWORD }}

          # LLM Provider - GLM (Zhipu AI)
          GLM_API_KEY=${{ secrets.GLM_API_KEY }}

          # LLM Fallback - Ollama Cloud (optional, for cloud models)
          OLLAMA_API_KEY=${{ secrets.OLLAMA_API_KEY }}

          # Web Search - Tavily
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}

          # Telegram Bot
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS=${{ secrets.TELEGRAM_ALLOWED_USERS }}
          TELEGRAM_WEBHOOK_URL=${{ secrets.TELEGRAM_WEBHOOK_URL }}
          TELEGRAM_WEBHOOK_SECRET=${{ secrets.TELEGRAM_WEBHOOK_SECRET }}

          # Domain
          MOLTIS_DOMAIN=moltis.ainetic.tech

          # Deployment
          MOLTIS_VERSION=$VERSION
          EOF

          # Copy to server
          scp /tmp/moltis.env ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/.env

          # Cleanup local temp file
          rm /tmp/moltis.env

          echo ".env file generated and synced successfully"
          echo "::endgroup::"

      - name: Pull new image
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          echo "::group::Pulling Moltis image $VERSION"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << EOF
            # Try to pull the image, but don't fail if it doesn't exist remotely
            # (image may already exist locally from previous builds)
            if docker pull ${{ env.MOLTIS_IMAGE }}:$VERSION 2>/dev/null; then
              echo "Image pulled successfully"
            else
              echo "::warning::Could not pull image ${{ env.MOLTIS_IMAGE }}:$VERSION - using existing local image if available"
              # Check if image exists locally
              if docker images ${{ env.MOLTIS_IMAGE }}:$VERSION --format "{{.ID}}" | grep -q .; then
                echo "Using existing local image"
              else
                echo "::error::Image not found locally or remotely"
                exit 1
              fi
            fi
          EOF
          echo "::endgroup::"

      # ===========================================
      # GitOps Step 2: Validate configuration before deploy
      # ===========================================
      - name: Validate configuration (GitOps)
        run: |
          echo "::group::Validating docker-compose configuration"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # Validate docker-compose.prod.yml syntax (production config)
            docker compose -f docker-compose.prod.yml config --quiet

            # Verify the file matches expected structure
            if ! grep -q "traefik.enable=true" docker-compose.prod.yml; then
              echo "::error::Traefik labels missing in docker-compose.prod.yml"
              exit 1
            fi

            echo "Configuration validation passed"
          EOF
          echo "::endgroup::"

      - name: Deploy container
        id: deploy
        run: |
          echo "::group::Deploying Moltis ${{ needs.preflight.outputs.version }}"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e

            VERSION="${{ needs.preflight.outputs.version }}"
            EXPECTED_IMAGE="${{ env.MOLTIS_IMAGE }}:${{ needs.preflight.outputs.version }}"

            cd ${{ env.DEPLOY_PATH }}

            # Pull pinned image version (use production compose file)
            MOLTIS_VERSION="$VERSION" docker compose -f docker-compose.prod.yml pull moltis

            # Stop container gracefully
            echo "Stopping current container..."
            docker compose -f docker-compose.prod.yml stop moltis || true

            # Start new container
            echo "Starting new container..."
            MOLTIS_VERSION="$VERSION" docker compose -f docker-compose.prod.yml up -d moltis

            # Verify expected image is running
            RUNNING_IMAGE=$(docker inspect --format='{{.Config.Image}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo "unknown")
            if [ "$RUNNING_IMAGE" != "$EXPECTED_IMAGE" ]; then
              echo "::error::Running image mismatch. Expected: $EXPECTED_IMAGE, actual: $RUNNING_IMAGE"
              exit 1
            fi

            # Remove old images
            docker image prune -f

            echo "Deployment completed"
          EOF
          echo "::endgroup::"

      - name: Wait for health check
        id: health
        timeout-minutes: 3
        run: |
          echo "::group::Waiting for health check"

          MAX_RETRIES=30
          RETRY_INTERVAL=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HEALTH=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
              "docker inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo 'not_found'")

            echo "Health check attempt $((RETRY_COUNT + 1))/$MAX_RETRIES: $HEALTH"

            if [ "$HEALTH" = "healthy" ]; then
              echo "::notice::Container is healthy!"
              echo "status=healthy" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$HEALTH" = "not_found" ]; then
              echo "::error::Container not found!"
              echo "status=not_found" >> $GITHUB_OUTPUT
              exit 1
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep $RETRY_INTERVAL
          done

          echo "::error::Health check timeout after $MAX_RETRIES attempts"
          echo "status=unhealthy" >> $GITHUB_OUTPUT
          exit 1

          echo "::endgroup::"

      - name: Auto rollback on health check failure
        id: rollback_auto
        if: steps.health.outcome == 'failure'
        run: |
          echo "::group::Auto rollback on failed deploy health gate"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e

            BACKUP_FILE="${{ needs.backup.outputs.backup_file }}"
            if [ -z "$BACKUP_FILE" ]; then
              echo "::error::Auto rollback requires backup_file output"
              exit 1
            fi

            cd ${{ env.DEPLOY_PATH }}

            # Stop failed deployment
            docker compose -f docker-compose.prod.yml stop moltis || true

            # Restore pre-deploy state
            tar -xzf "$BACKUP_FILE" -C "${{ env.DEPLOY_PATH }}"

            if [ -f "${BACKUP_FILE}.compose" ]; then
              cp "${BACKUP_FILE}.compose" docker-compose.prod.yml
            else
              echo "::error::Rollback compose metadata missing: ${BACKUP_FILE}.compose"
              exit 1
            fi

            BACKUP_VERSION=$(cat "${BACKUP_FILE}.version" 2>/dev/null || echo "unknown")
            if [ "$BACKUP_VERSION" != "unknown" ]; then
              docker pull "$BACKUP_VERSION" || true
            fi

            docker compose -f docker-compose.prod.yml up -d moltis
          EOF
          echo "rolled_back=true" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: Verify auto rollback health
        if: steps.rollback_auto.outcome == 'success'
        run: |
          echo "::group::Verifying auto rollback health"
          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HEALTH=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
              "docker inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo 'not_found'")

            if [ "$HEALTH" = "healthy" ]; then
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 5
          done

          if [ "$HEALTH" != "healthy" ]; then
            echo "::error::Auto rollback health check failed"
            exit 1
          fi

          HTTP_CODE=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
            "curl -sk -o /dev/null -w '%{http_code}' https://moltis.ainetic.tech/health")

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "401" ]; then
            echo "::error::Auto rollback external health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "::notice::Auto rollback completed and service is healthy"
          echo "::endgroup::"

      - name: Verify external access
        if: success()
        run: |
          echo "::group::Verifying external access"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e
            # Check Traefik routing (401 = auth required, valid behavior)
            HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://moltis.ainetic.tech/health)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "::notice::External access verified via Traefik (HTTP $HTTP_CODE)"
            else
              echo "::error::External access check failed (HTTP $HTTP_CODE)"
              exit 1
            fi
          EOF
          echo "::endgroup::"
      - name: Deployment summary
        if: always()
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          STATUS="${{ steps.health.outputs.status }}"
          ROLLED_BACK="${{ steps.rollback_auto.outputs.rolled_back }}"
          RUNBOOK_URL="${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/docs/deployment-strategy.md"
          [ -z "$ROLLED_BACK" ] && ROLLED_BACK="false"

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto Rollback | $ROLLED_BACK |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://moltis.ainetic.tech |" >> $GITHUB_STEP_SUMMARY
          echo "| Runbook | $RUNBOOK_URL |" >> $GITHUB_STEP_SUMMARY

      - name: Notify auto rollback event (Slack)
        if: steps.rollback_auto.outputs.rolled_back == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::notice::SLACK_WEBHOOK_URL not configured, skipping auto-rollback notification"
            exit 0
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RUNBOOK_URL="${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/docs/deployment-strategy.md"

          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \":warning: Auto rollback executed in Deploy Moltis\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {\"type\": \"plain_text\", \"text\": \"⚠️ Auto Rollback Executed\"}
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Repo:*\\n${{ github.repository }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Branch:*\\n${{ github.ref_name }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\\n${{ github.sha }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Actor:*\\n${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {\"type\": \"button\", \"text\": {\"type\": \"plain_text\", \"text\": \"View Run\"}, \"url\": \"$RUN_URL\"},
                    {\"type\": \"button\", \"text\": {\"type\": \"plain_text\", \"text\": \"Runbook\"}, \"url\": \"$RUNBOOK_URL\"}
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL" || echo "::warning::Failed to send auto-rollback Slack notification"

      # ===========================================
      # GitOps Step 3: Record deployed git SHA
      # ===========================================
      # Stores the git commit SHA on the server for audit trail
      # This enables verification that deployed config matches git
      # ===========================================
      - name: Record deployed git SHA (GitOps audit)
        if: success()
        run: |
          echo "::group::Recording deployed git SHA"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}

            mkdir -p data

            # Record the exact commit from the CI workflow context.
            # Keep audit markers in ignored state storage, not repo root, so GitOps drift
            # checks stay truthful across repeated deploys.
            echo "${{ github.sha }}" > data/.deployed-sha

            # Also record deployment metadata
            cat > data/.deployment-info << INFO
          deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git_sha=${{ github.sha }}
          workflow_run=${{ github.run_id }}
          version=${{ needs.preflight.outputs.version }}
          INFO

            echo "Git SHA recorded: $(cat data/.deployed-sha)"
          EOF
          echo "::endgroup::"

      - name: Align server git checkout to deployed commit
        if: success()
        run: |
          echo "::group::Aligning server git checkout"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            git fetch --depth=1 origin "${{ github.ref_name }}"
            git checkout --force "${{ github.ref_name }}"
            git reset --hard "${{ github.sha }}"
            git status --short
          EOF
          echo "::endgroup::"

  # ===========================================
  # Rollback procedure
  # ===========================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: preflight
    if: github.event.inputs.rollback == 'true'
    environment:
      name: production
      url: https://moltis.ainetic.tech

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Find last backup
        id: backup
        run: |
          echo "::group::Finding last backup"
          BACKUP_INFO=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            BACKUP_DIR="${{ env.BACKUP_PATH }}"
            LATEST=$(ls -t $BACKUP_DIR/pre_deploy_*.tar.gz 2>/dev/null | head -1)

            if [ -z "$LATEST" ]; then
              echo "ERROR: No backup found"
              exit 1
            fi

            VERSION=$(cat "${LATEST}.version" 2>/dev/null || echo "unknown")
            echo "backup_file=$LATEST"
            echo "backup_version=$VERSION"
          EOF
          )

          BACKUP_FILE=$(echo "$BACKUP_INFO" | grep "backup_file=" | cut -d= -f2)
          BACKUP_VERSION=$(echo "$BACKUP_INFO" | grep "backup_version=" | cut -d= -f2)

          if [ -z "$BACKUP_FILE" ]; then
            echo "::error::No backup found for rollback"
            exit 1
          fi

          echo "backup_file=$BACKUP_FILE" >> $GITHUB_OUTPUT
          echo "backup_version=$BACKUP_VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Found backup: $BACKUP_FILE (version: $BACKUP_VERSION)"
          echo "::endgroup::"

      - name: Restore backup
        run: |
          BACKUP_FILE="${{ steps.backup.outputs.backup_file }}"
          BACKUP_VERSION="${{ steps.backup.outputs.backup_version }}"

          echo "::group::Restoring backup (GitOps)"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << EOF
            set -e

            cd ${{ env.DEPLOY_PATH }}

            # Stop container (use production compose file)
            docker compose -f docker-compose.prod.yml stop moltis || true

            # Restore config/data/.env to deployment directory
            tar -xzf "$BACKUP_FILE" -C "${{ env.DEPLOY_PATH }}"

            # Restore docker-compose.prod.yml from backup (GitOps: exact config restore)
            if [ -f "${BACKUP_FILE}.compose" ]; then
              cp "${BACKUP_FILE}.compose" docker-compose.prod.yml
              echo "Restored docker-compose.prod.yml from backup"
            fi

            # Pull the backed-up image version if known
            if [ "$BACKUP_VERSION" != "unknown" ]; then
              docker pull $BACKUP_VERSION
            fi

            # Start container (use production compose file)
            docker compose -f docker-compose.prod.yml up -d moltis

            echo "Rollback completed to version: $BACKUP_VERSION"
          EOF
          echo "::endgroup::"

      - name: Wait for health check
        timeout-minutes: 3
        run: |
          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HEALTH=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
              "docker inspect --format='{{.State.Health.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo 'not_found'")

            if [ "$HEALTH" = "healthy" ]; then
              echo "::notice::Rollback successful - container is healthy!"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 5
          done

          echo "::error::Rollback health check failed"
          exit 1

      - name: Rollback summary
        if: always()
        run: |
          echo "## Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backup | \`${{ steps.backup.outputs.backup_file }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.backup.outputs.backup_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Post-deployment verification
  # ===========================================
  verify:
    name: Post-deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy, rollback]
    if: always() && (needs.deploy.result == 'success' || needs.rollback.result == 'success' || needs.deploy.outputs.auto_rollback_performed == 'true')

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Run smoke tests
        id: smoke
        run: |
          echo "::group::Running smoke tests"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e

            # Test 1: Container is running
            echo "Test 1: Container running..."
            docker ps --filter "name=moltis" --filter "status=running" | grep -q moltis

            # Test 2: Health endpoint responds
            echo "Test 2: Health endpoint..."
            curl -sf http://localhost:13131/health > /dev/null

            # Test 3: Traefik routing works (401 = auth required, that's OK)
            echo "Test 3: Traefik routing..."
            HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://moltis.ainetic.tech/health)
            if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "Traefik routing OK (HTTP $HTTP_CODE)"
            else
              echo "Unexpected HTTP code: $HTTP_CODE"
              exit 1
            fi

            # Test 4: Main endpoint (non-blocking - Traefik middleware may cause delays)
            echo "Test 4: Main endpoint..."
            HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 https://moltis.ainetic.tech/ 2>/dev/null) || true
            if [ -n "$HTTP_CODE" ] && { [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "303" ]; }; then
              echo "Main endpoint OK (HTTP $HTTP_CODE)"
            else
              echo "Main endpoint: HTTP $HTTP_CODE (non-critical - Traefik middleware may cause delays)"
            fi

            # Test 5: GitOps - verify docker-compose.prod.yml has correct Traefik labels
            echo "Test 5: GitOps configuration check..."
            cd ${{ env.DEPLOY_PATH }}
            if grep -qE 'traefik\.http\.routers\.moltis\.rule=Host\(`(\$\{MOLTIS_DOMAIN(:-[^}]*)?\}|moltis\.ainetic\.tech)`\)' docker-compose.prod.yml; then
              echo "GitOps: Traefik Host rule check passed (literal or MOLTIS_DOMAIN template)"
            else
              echo "::error::GitOps violation: Traefik Host rule mismatch in docker-compose.prod.yml"
              echo "Expected one of:"
              echo "  - Host(\`moltis.ainetic.tech\`)"
              echo "  - Host(\`\${MOLTIS_DOMAIN:-moltis.ainetic.tech}\`)"
              echo "  - Host(\`\${MOLTIS_DOMAIN}\`)"
              echo "Found in file:"
              grep "traefik.http.routers.moltis.rule" docker-compose.prod.yml || echo "(not found)"
              exit 1
            fi

            echo "All smoke tests passed!"
          EOF
          echo "::endgroup::"

      - name: Check post-upgrade web protocol skew
        id: protocol_skew
        run: |
          echo "::group::Checking for post-upgrade web protocol skew"
          INFO=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e

            RECENT_PROTOCOL_SKEW=$(docker logs --since 15m moltis 2>&1 | grep -E -c 'ws: protocol mismatch|missing field minProtocol' || true)

            echo "detected=false"
            echo "count=$RECENT_PROTOCOL_SKEW"

            if [ "$RECENT_PROTOCOL_SKEW" -gt 0 ]; then
              echo "detected=true"
            fi
          EOF
          )

          DETECTED="$(printf '%s\n' "$INFO" | grep '^detected=' | tail -1 | cut -d= -f2)"
          COUNT="$(printf '%s\n' "$INFO" | grep '^count=' | tail -1 | cut -d= -f2)"

          [ -z "$DETECTED" ] && DETECTED="false"
          [ -z "$COUNT" ] && COUNT="0"

          echo "detected=$DETECTED" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          if [ "$DETECTED" = "true" ]; then
            echo "::warning::Detected $COUNT recent websocket protocol skew log entries after deploy. Backend may already be healthy; stale browser tabs likely need hard refresh or a fresh session."
          else
            echo "::notice::No recent websocket protocol skew detected in the post-deploy window."
          fi
          echo "::endgroup::"

      # ===========================================
      # LLM Failover Validation (T024-T026)
      # ===========================================
      - name: Validate TOML syntax
        run: |
          echo "::group::TOML syntax validation"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # Install Python TOML validator if not present
            if ! python3 -c "import toml" 2>/dev/null; then
              pip3 install toml 2>/dev/null || apt-get install -y python3-toml 2>/dev/null || true
            fi

            # Validate moltis.toml syntax
            if python3 -c "import toml; toml.load('config/moltis.toml')" 2>/dev/null; then
              echo "::notice::moltis.toml syntax is valid"
            else
              echo "::warning::TOML validation failed - checking with basic parser"
              # Fallback: basic syntax check
              if grep -E '^\s*\[.*\]\s*$' config/moltis.toml > /dev/null; then
                echo "Basic TOML structure looks OK"
              fi
            fi
          EOF
          echo "::endgroup::"

      - name: Validate Ollama configuration
        run: |
          echo "::group::Ollama configuration validation"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # Check if Ollama is configured in docker-compose.prod.yml
            if grep -q 'ollama:' docker-compose.prod.yml; then
              echo "Ollama service found in docker-compose.prod.yml"

              # Check if Ollama container is running
              if docker ps --filter "name=ollama" --filter "status=running" | grep -q ollama; then
                echo "::notice::Ollama container is running"

                # Check Ollama health
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:11434/api/tags 2>/dev/null || echo "000")
                if [ "$HTTP_CODE" = "200" ]; then
                  echo "::notice::Ollama API is responding (HTTP 200)"
                else
                  echo "::warning::Ollama API returned HTTP $HTTP_CODE (may be starting)"
                fi
              else
                echo "::warning::Ollama container is not running (may be intentional)"
              fi
            else
              echo "::notice::Ollama service not configured in docker-compose.prod.yml"
            fi
          EOF
          echo "::endgroup::"

      - name: Validate failover configuration
        run: |
          echo "::group::Failover configuration validation"
          ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # Check failover is enabled in moltis.toml
            if grep -A5 '^\[failover\]' config/moltis.toml | grep -q 'enabled.*=.*true'; then
              echo "::notice::Failover is enabled in moltis.toml"

              # Check fallback models are configured
              if grep -A10 '^\[failover\]' config/moltis.toml | grep -q 'fallback_models'; then
                echo "::notice::Fallback models are configured"
              else
                echo "::warning::No fallback_models configured in failover section"
              fi
            else
              echo "::notice::Failover is not enabled (optional feature)"
            fi

            # Check circuit breaker state file
            if [ -f /tmp/moltis-llm-state.json ]; then
              echo "::notice::Circuit breaker state file exists"
              cat /tmp/moltis-llm-state.json | head -c 200
            else
              echo "::notice::Circuit breaker state file not found (will be created on first check)"
            fi
          EOF
          echo "::endgroup::"

      - name: Get deployment info
        id: info
        run: |
          INFO=$(ssh ${{ env.SSH_USER }}@${{ env.SSH_HOST }} << 'EOF'
            IMAGE=$(docker inspect --format='{{.Config.Image}}' moltis)
            CREATED=$(docker inspect --format='{{.Created}}' moltis)
            UPTIME=$(docker inspect --format='{{.State.StartedAt}}' moltis)

            echo "image=$IMAGE"
            echo "created=$CREATED"
            echo "uptime=$UPTIME"
          EOF
          )

          echo "image=$(echo "$INFO" | grep "^image=" | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Verification summary
        run: |
          PROTOCOL_SKEW="${{ steps.protocol_skew.outputs.detected }}"
          PROTOCOL_SKEW_COUNT="${{ steps.protocol_skew.outputs.count }}"
          [ -z "$PROTOCOL_SKEW" ] && PROTOCOL_SKEW="false"
          [ -z "$PROTOCOL_SKEW_COUNT" ] && PROTOCOL_SKEW_COUNT="0"

          echo "## Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All smoke tests passed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Container Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ steps.info.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://moltis.ainetic.tech" >> $GITHUB_STEP_SUMMARY
          echo "- **Health**: https://moltis.ainetic.tech/health" >> $GITHUB_STEP_SUMMARY
          echo "- **Post-upgrade protocol skew detected**: \`$PROTOCOL_SKEW\` (recent log matches: $PROTOCOL_SKEW_COUNT)" >> $GITHUB_STEP_SUMMARY

          if [ "$PROTOCOL_SKEW" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Operator Note" >> $GITHUB_STEP_SUMMARY
            echo "- Backend rollout may still be successful if health and authoritative UAT are green." >> $GITHUB_STEP_SUMMARY
            echo "- This usually means stale browser tabs are reconnecting with an older WebSocket protocol." >> $GITHUB_STEP_SUMMARY
            echo "- Action: close old Moltis tabs and reopen the UI, or use a new incognito/private session." >> $GITHUB_STEP_SUMMARY
            echo "- Protocol skew by itself is not a rollback trigger." >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================
  # Notify on failure
  # ===========================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy, rollback]
    if: failure()

    steps:
      - name: Send failure notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RUNBOOK_URL="${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/docs/deployment-strategy.md"

          echo "::warning::Deployment failed! Check the logs for details."
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deployment to production has failed. Please check the logs above." >> $GITHUB_STEP_SUMMARY
          echo "Auto rollback is attempted automatically when the deploy health gate fails." >> $GITHUB_STEP_SUMMARY
          echo "Runbook: $RUNBOOK_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rollback Instructions" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to Actions tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Select 'Deploy Moltis' workflow" >> $GITHUB_STEP_SUMMARY
          echo "3. Click 'Run workflow'" >> $GITHUB_STEP_SUMMARY
          echo "4. Check 'Rollback to previous version'" >> $GITHUB_STEP_SUMMARY
          echo "5. Click 'Run workflow'" >> $GITHUB_STEP_SUMMARY

          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::notice::SLACK_WEBHOOK_URL not configured, skipping failure Slack notification"
            exit 0
          fi

          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \":x: Deploy Moltis failed\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {\"type\": \"plain_text\", \"text\": \"❌ Deploy Moltis Failed\"}
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Repo:*\\n${{ github.repository }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Branch:*\\n${{ github.ref_name }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\\n${{ github.sha }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Actor:*\\n${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {\"type\": \"button\", \"text\": {\"type\": \"plain_text\", \"text\": \"View Run\"}, \"url\": \"$RUN_URL\"},
                    {\"type\": \"button\", \"text\": {\"type\": \"plain_text\", \"text\": \"Runbook\"}, \"url\": \"$RUNBOOK_URL\"}
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL" || echo "::warning::Failed to send deploy failure Slack notification"
