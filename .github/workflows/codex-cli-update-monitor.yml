name: Codex CLI Update Monitor

on:
  workflow_dispatch:
    inputs:
      local_version:
        description: "Optional local Codex CLI version override for runners without codex installed"
        required: false
        default: ""
        type: string
      release_url:
        description: "Release source URL"
        required: true
        default: "https://developers.openai.com/codex/changelog"
        type: string
      include_issue_signals:
        description: "Include advisory upstream issue signals"
        required: true
        default: false
        type: boolean
      issue_signals_url:
        description: "Issue signal source URL"
        required: true
        default: "https://api.github.com/repos/openai/codex/issues?state=open&per_page=20"
        type: string
      artifact_name:
        description: "Artifact bundle name"
        required: true
        default: "codex-cli-update-monitor"
        type: string

permissions:
  contents: read

jobs:
  codex-cli-update-monitor:
    name: Run Codex CLI update monitor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run monitor
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/codex-cli-update-monitor.sh

          args=(
            --release-url "${{ inputs.release_url }}"
            --json-out codex-update-report.json
            --summary-out codex-update-summary.md
            --stdout none
          )

          if [[ -n "${{ inputs.local_version }}" ]]; then
            args+=(--local-version "${{ inputs.local_version }}")
          fi

          if [[ "${{ inputs.include_issue_signals }}" == "true" ]]; then
            args+=(--include-issue-signals --issue-signals-url "${{ inputs.issue_signals_url }}")
          fi

          ./scripts/codex-cli-update-monitor.sh "${args[@]}"

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}-json
          path: codex-update-report.json
          if-no-files-found: error

      - name: Upload summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}-summary
          path: codex-update-summary.md
          if-no-files-found: error
