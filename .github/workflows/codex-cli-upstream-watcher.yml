name: Монитор upstream-обновлений Codex CLI

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Режим запуска"
        required: true
        default: "manual"
        type: choice
        options:
          - manual
          - scheduler
      release_url:
        description: "URL основного changelog-источника"
        required: true
        default: "https://developers.openai.com/codex/changelog"
        type: string
      include_issue_signals:
        description: "Подключить advisory upstream issue signals"
        required: true
        default: true
        type: boolean
      issue_signals_url:
        description: "URL источника advisory issue signals"
        required: true
        default: "https://api.github.com/repos/openai/codex/issues?state=open&per_page=20"
        type: string
      telegram_enabled:
        description: "Включить Telegram-доставку"
        required: true
        default: false
        type: boolean
      telegram_chat_id:
        description: "Необязательный явный Telegram chat id"
        required: false
        default: ""
        type: string
      artifact_name:
        description: "Имя набора артефактов"
        required: true
        default: "codex-cli-upstream-watcher"
        type: string

permissions:
  contents: read

jobs:
  codex-cli-upstream-watcher:
    name: Запустить монитор upstream-обновлений Codex CLI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Запустить upstream watcher
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/codex-cli-upstream-watcher.sh

          args=(
            --mode "${{ inputs.mode }}"
            --release-url "${{ inputs.release_url }}"
            --json-out codex-upstream-watcher-report.json
            --summary-out codex-upstream-watcher-summary.md
            --stdout none
          )

          if [[ "${{ inputs.include_issue_signals }}" == "true" ]]; then
            args+=(--include-issue-signals --issue-signals-url "${{ inputs.issue_signals_url }}")
          fi

          if [[ "${{ inputs.telegram_enabled }}" == "true" ]]; then
            args+=(--telegram-enabled)
          fi

          if [[ -n "${{ inputs.telegram_chat_id }}" ]]; then
            args+=(--telegram-chat-id "${{ inputs.telegram_chat_id }}")
          fi

          ./scripts/codex-cli-upstream-watcher.sh "${args[@]}"

      - name: Загрузить JSON-артефакт
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-json
          path: codex-upstream-watcher-report.json
          if-no-files-found: error

      - name: Загрузить summary-артефакт
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-summary
          path: codex-upstream-watcher-summary.md
          if-no-files-found: error
