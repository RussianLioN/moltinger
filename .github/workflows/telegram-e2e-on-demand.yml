name: Telegram E2E On-Demand

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: synthetic
        type: choice
        options:
          - synthetic
          - real_user
      message:
        description: "Input message/command to send"
        required: true
        default: "/status"
        type: string
      timeout_sec:
        description: "Timeout in seconds"
        required: true
        default: "30"
        type: string
      moltis_url:
        description: "Moltis base URL"
        required: true
        default: "https://moltis.ainetic.tech"
        type: string
      artifact_name:
        description: "Artifact name"
        required: true
        default: "telegram-e2e-result"
        type: string
      verbose:
        description: "Enable verbose script logs"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  telegram-e2e:
    name: Run on-demand Telegram E2E harness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MOLTIS_PASSWORD: ${{ secrets.MOLTIS_PASSWORD }}
      TELEGRAM_TEST_API_ID: ${{ secrets.TELEGRAM_TEST_API_ID }}
      TELEGRAM_TEST_API_HASH: ${{ secrets.TELEGRAM_TEST_API_HASH }}
      TELEGRAM_TEST_SESSION: ${{ secrets.TELEGRAM_TEST_SESSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run harness
        id: run_harness
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          chmod +x scripts/telegram-e2e-on-demand.sh

          verbose_flag=""
          if [[ "${{ inputs.verbose }}" == "true" ]]; then
            verbose_flag="--verbose"
          fi

          set +e
          TRIGGER_SOURCE=workflow_dispatch \
          ./scripts/telegram-e2e-on-demand.sh \
            --mode "${{ inputs.mode }}" \
            --message "${{ inputs.message }}" \
            --timeout-sec "${{ inputs.timeout_sec }}" \
            --output "telegram-e2e-result.json" \
            --moltis-url "${{ inputs.moltis_url }}" \
            --moltis-password-env MOLTIS_PASSWORD \
            ${verbose_flag} \
            2>&1 | tee telegram-e2e.log

          exit_code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          echo "Harness exit code: ${exit_code}"

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: telegram-e2e-result.json
          if-no-files-found: error

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}-log
          path: telegram-e2e.log
          if-no-files-found: warn

      - name: Fail workflow when harness failed
        if: ${{ always() && steps.run_harness.outputs.exit_code != '0' }}
        shell: bash
        run: |
          echo "telegram-e2e harness failed with exit code ${{ steps.run_harness.outputs.exit_code }}"
          exit 1
