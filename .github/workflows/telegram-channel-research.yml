name: Telegram Channel Research

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Telegram channel or group username"
        required: true
        default: "routerich"
        type: string
      queries:
        description: "Newline-separated search queries"
        required: true
        default: |
          белые списки
          ZeroBlock
          подписка БС
          24.10.6
          FM350
        type: string
      limit:
        description: "Max messages per query"
        required: true
        default: "30"
        type: string
      scan_limit:
        description: "Optional latest-message scan limit; 0 disables latest scan"
        required: true
        default: "0"
        type: string
      backfill_limit:
        description: "Optional oldest-to-newest history batch size; 0 disables backfill"
        required: true
        default: "0"
        type: string
      backfill_min_id:
        description: "Exclusive lower message id for resumable forward backfill"
        required: true
        default: "0"
        type: string
      backfill_max_id:
        description: "Exclusive upper message id for bounded backfill; 0 means no upper bound"
        required: true
        default: "0"
        type: string
      wait_time:
        description: "Optional Telethon wait_time between history requests; 0 uses library default"
        required: true
        default: "0"
        type: string
      artifact_name:
        description: "Artifact name"
        required: true
        default: "telegram-channel-research-routerich"
        type: string
      mode:
        description: "collect or recover_session"
        required: true
        default: "collect"
        type: string
      recovery_public_key_b64:
        description: "Base64 PEM public key for recover_session encrypted artifact"
        required: false
        default: ""
        type: string
      recovery_timeout_sec:
        description: "QR approval timeout for recover_session"
        required: true
        default: "600"
        type: string

permissions:
  contents: read

jobs:
  collect:
    name: Read Telegram channel with MTProto
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TELEGRAM_TEST_API_ID: ${{ secrets.TELEGRAM_TEST_API_ID }}
      TELEGRAM_TEST_API_HASH: ${{ secrets.TELEGRAM_TEST_API_HASH }}
      TELEGRAM_TEST_SESSION: ${{ secrets.TELEGRAM_TEST_SESSION }}
      TELEGRAM_TEST_2FA_PASSWORD: ${{ secrets.TELEGRAM_TEST_2FA_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_SESSION_RECOVERY_CHAT_ID: ${{ secrets.MOLTIS_UPDATE_NOTIFY_TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Telegram dependencies
        shell: bash
        run: |
          python3 -m pip install --disable-pip-version-check --quiet telethon 'qrcode[pil]'

      - name: Collect channel evidence
        if: ${{ inputs.mode == 'collect' }}
        shell: bash
        run: |
          set -euo pipefail
          result_dir="${RUNNER_TEMP}/telegram-channel-research"
          mkdir -p "$result_dir"

          query_args=()
          while IFS= read -r query; do
            [[ -z "${query// }" ]] && continue
            query_args+=(--query "$query")
          done <<< "${{ inputs.queries }}"

          wait_time_arg=()
          if [[ -n "${{ inputs.wait_time }}" && "${{ inputs.wait_time }}" != "0" ]]; then
            wait_time_arg=(--wait-time "${{ inputs.wait_time }}")
          fi

          python3 scripts/telegram-channel-collect.py \
            --channel "${{ inputs.channel }}" \
            --limit "${{ inputs.limit }}" \
            --scan-limit "${{ inputs.scan_limit }}" \
            --backfill-limit "${{ inputs.backfill_limit }}" \
            --backfill-min-id "${{ inputs.backfill_min_id }}" \
            --backfill-max-id "${{ inputs.backfill_max_id }}" \
            --output-dir "$result_dir" \
            "${wait_time_arg[@]}" \
            "${query_args[@]}"

      - name: Recover encrypted MTProto session
        if: ${{ inputs.mode == 'recover_session' }}
        shell: bash
        run: |
          set -euo pipefail
          result_dir="${RUNNER_TEMP}/telegram-session-recovery"
          mkdir -p "$result_dir"

          if [[ -z "${{ inputs.recovery_public_key_b64 }}" ]]; then
            echo "recovery_public_key_b64 is required for recover_session" >&2
            exit 2
          fi

          printf '%s' "${{ inputs.recovery_public_key_b64 }}" | base64 -d > "$result_dir/recovery-public.pem"
          python3 scripts/telegram-session-recover.py \
            --public-key "$result_dir/recovery-public.pem" \
            --output-dir "$result_dir" \
            --timeout-sec "${{ inputs.recovery_timeout_sec }}"

      - name: Upload channel research artifact
        if: ${{ inputs.mode == 'collect' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ runner.temp }}/telegram-channel-research/
          if-no-files-found: error

      - name: Upload encrypted session recovery artifact
        if: ${{ inputs.mode == 'recover_session' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ${{ runner.temp }}/telegram-session-recovery/recovery-result.json
            ${{ runner.temp }}/telegram-session-recovery/telegram-session.enc
            ${{ runner.temp }}/telegram-session-recovery/telegram-session.key.enc
          if-no-files-found: error

      - name: Append safe summary
        if: ${{ inputs.mode == 'collect' }}
        shell: bash
        run: |
          summary_file="${RUNNER_TEMP}/telegram-channel-research/telegram-channel-summary.md"
          if [[ -f "$summary_file" ]]; then
            cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          fi
