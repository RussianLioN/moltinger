name: Claude Code Review

# Unified AI review workflow powered by Z.ai Coding Plan.
# Non-blocking by design: if API/credentials are unavailable, it publishes fallback report.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number
      focus_area:
        description: "Review focus (security/performance/quality/all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - security
          - performance
          - quality

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  claude-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GLM_API_BASE: https://api.z.ai/api/coding/paas/v4
      GLM_MODEL: glm-5
      AI_REVIEW_MAX_DIFF_CHARS: "80000"
      AI_REVIEW_PROVIDER: ${{ vars.AI_REVIEW_PROVIDER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure required tools
        run: |
          command -v gh >/dev/null 2>&1 || (echo "::error::gh CLI is required" && exit 1)
          command -v jq >/dev/null 2>&1 || (echo "::error::jq is required" && exit 1)
          command -v curl >/dev/null 2>&1 || (echo "::error::curl is required" && exit 1)

      - name: Determine PR context
        id: pr-context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "focus=all" >> "$GITHUB_OUTPUT"
            echo "author=${{ github.event.pull_request.user.login }}" >> "$GITHUB_OUTPUT"
            echo "association=${{ github.event.pull_request.author_association }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "focus=${{ inputs.focus_area }}" >> "$GITHUB_OUTPUT"
            pr_data="$(gh pr view ${{ inputs.pr_number }} --json author 2>/dev/null || true)"
            author="$(echo "$pr_data" | jq -r '.author.login // "unknown"')"
            echo "author=${author}" >> "$GITHUB_OUTPUT"
            echo "association=MANUAL" >> "$GITHUB_OUTPUT"
          fi

      - name: Build review report (Z.ai)
        id: review
        env:
          GH_TOKEN: ${{ github.token }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: |
          set -euo pipefail

          mkdir -p reports .tmp

          pr_number="${{ steps.pr-context.outputs.number }}"
          focus_area="${{ steps.pr-context.outputs.focus }}"
          pr_author="${{ steps.pr-context.outputs.author }}"
          pr_association="${{ steps.pr-context.outputs.association }}"
          provider="${AI_REVIEW_PROVIDER:-zai}"

          report_path="reports/pr-${pr_number}-review.md"
          prompt_path=".tmp/pr-${pr_number}-review-prompt.md"
          model_output_path=".tmp/pr-${pr_number}-review-output.md"
          raw_response_path=".tmp/pr-${pr_number}-raw-response.json"
          comment_path=".tmp/pr-${pr_number}-review-comment.md"
          diff_path=".tmp/pr-${pr_number}.diff"
          marker="zai-review:pr-${pr_number}"

          status="fallback"
          reason=""

          if [[ "$provider" == "off" ]]; then
            reason="AI provider disabled by AI_REVIEW_PROVIDER=off."
          elif [[ -z "${GLM_API_KEY:-}" ]]; then
            reason="Missing GLM_API_KEY secret."
          else
            pr_json="$(gh pr view "$pr_number" --json title,body,url,changedFiles,additions,deletions 2>/dev/null || true)"
            if [[ -z "$pr_json" || "$pr_json" == "null" ]]; then
              reason="Failed to fetch PR metadata via gh pr view."
            else
              pr_title="$(echo "$pr_json" | jq -r '.title // "(no title)"')"
              pr_body="$(echo "$pr_json" | jq -r '.body // "(no description)"')"
              pr_url="$(echo "$pr_json" | jq -r '.url // ""')"
              changed_files="$(echo "$pr_json" | jq -r '.changedFiles // 0')"
              additions="$(echo "$pr_json" | jq -r '.additions // 0')"
              deletions="$(echo "$pr_json" | jq -r '.deletions // 0')"

              if gh pr diff "$pr_number" > "$diff_path" 2>/dev/null; then
                max_chars="${AI_REVIEW_MAX_DIFF_CHARS:-80000}"
                diff_size="$(wc -c < "$diff_path" | tr -d ' ')"
                if [[ "$diff_size" -gt "$max_chars" ]]; then
                  head -c "$max_chars" "$diff_path" > "${diff_path}.trimmed"
                  printf '\n\n[diff truncated to %s chars]\n' "$max_chars" >> "${diff_path}.trimmed"
                  mv "${diff_path}.trimmed" "$diff_path"
                fi

                checks_summary="$(gh pr checks "$pr_number" --json name,state --jq '.[] | "- \(.name): \(.state)"' 2>/dev/null || true)"
                if [[ -z "$checks_summary" ]]; then
                  checks_summary="- CI checks unavailable"
                fi

                focus_hint="General quality, correctness, maintainability, and risks."
                case "$focus_area" in
                  security)
                    focus_hint="Prioritize security vulnerabilities, auth flows, secrets handling, and input validation."
                    ;;
                  performance)
                    focus_hint="Prioritize performance bottlenecks, expensive operations, and scalability issues."
                    ;;
                  quality)
                    focus_hint="Prioritize readability, maintainability, testability, and code quality issues."
                    ;;
                esac

                {
                  echo "Repository: ${GITHUB_REPOSITORY}"
                  echo "PR Number: ${pr_number}"
                  echo "PR URL: ${pr_url}"
                  echo "Author: ${pr_author} (${pr_association})"
                  echo "Focus: ${focus_area}"
                  echo ""
                  echo "PR Title: ${pr_title}"
                  echo ""
                  echo "PR Description:"
                  echo "${pr_body}"
                  echo ""
                  echo "Diff Stats: changed_files=${changed_files}, additions=${additions}, deletions=${deletions}"
                  echo ""
                  echo "Current CI checks:"
                  echo "${checks_summary}"
                  echo ""
                  echo "Review priority: ${focus_hint}"
                  echo ""
                  echo "Instructions:"
                  echo "1) Return Markdown only."
                  echo "2) Include sections: Executive Summary, Strengths, Risks & Issues, Security Review, Performance Considerations, Test Coverage, Code Quality, Suggested Improvements, Conclusion."
                  echo "3) Include specific file:line references when possible."
                  echo "4) Classify issues by severity: CRITICAL, MEDIUM, LOW."
                  echo "5) Keep recommendations actionable and concise."
                  echo ""
                  echo "PR Diff (possibly truncated):"
                  cat "$diff_path"
                } > "$prompt_path"

                if ZAI_RAW_RESPONSE_FILE="$raw_response_path" scripts/ci/zai_chat_completion.sh \
                  --prompt-file "$prompt_path" \
                  --output-file "$model_output_path" \
                  --system-prompt "You are a senior code reviewer. Return high-signal Markdown only, no preamble." \
                  --model "${GLM_MODEL:-glm-5}" \
                  --api-base "${GLM_API_BASE:-https://api.z.ai/api/coding/paas/v4}" \
                  --max-tokens 2200 \
                  --temperature 0.2 \
                  --timeout-seconds 120 \
                  --retry-count 1; then
                  status="success"
                  reason="OK"
                else
                  rc="$?"
                  reason="z.ai request failed (exit code ${rc})."
                fi
              else
                reason="Failed to fetch PR diff via gh pr diff."
              fi
            fi
          fi

          if [[ "$status" == "success" ]]; then
            {
              echo "# Code Review Report - PR #${pr_number}"
              echo ""
              echo "**Provider**: Z.ai Coding Plan (${GLM_MODEL:-glm-5})"
              echo "**Author**: ${pr_author} (${pr_association})"
              echo "**Focus**: ${focus_area}"
              echo "**Reviewed**: $(date -u +'%Y-%m-%d %H:%M UTC')"
              echo ""
              cat "$model_output_path"
            } > "$report_path"
          else
            {
              echo "# Code Review Report - PR #${pr_number}"
              echo ""
              echo "**Status**: Fallback"
              echo "**Checked**: $(date -u +'%Y-%m-%d %H:%M UTC')"
              echo ""
              echo "## Why fallback mode was used"
              echo "${reason}"
              echo ""
              echo "## What this means"
              echo "AI review did not run. Workflow stayed non-blocking to keep CI green."
              echo ""
              echo "## Recovery"
              echo "1. Ensure repository secret \`GLM_API_KEY\` is configured and valid."
              echo "2. Re-run this workflow (or push a new commit to PR)."
            } > "$report_path"
          fi

          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [[ "$status" == "success" ]]; then
            status_line="✅ Completed (z.ai)"
          else
            status_line="⚠️ Fallback (${reason})"
          fi

          {
            echo "<!-- ${marker} -->"
            echo "### Z.ai Code Review"
            echo ""
            echo "**Status**: ${status_line}"
            echo "**Focus**: ${focus_area}"
            echo "**Artifact**: \`zai-review-pr-${pr_number}\`"
            echo ""
            echo "[View workflow run](${run_url})"
          } > "$comment_path"

          {
            echo "## AI Code Review"
            echo "- PR: #${pr_number}"
            echo "- Status: ${status_line}"
            echo "- Focus: ${focus_area}"
            echo "- Provider: ${provider:-zai}"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "marker=${marker}" >> "$GITHUB_OUTPUT"
          echo "report_path=${report_path}" >> "$GITHUB_OUTPUT"
          echo "comment_path=${comment_path}" >> "$GITHUB_OUTPUT"

      - name: Upsert sticky PR comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! scripts/ci/upsert_sticky_comment.sh \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ steps.review.outputs.pr_number }}" \
            --marker "${{ steps.review.outputs.marker }}" \
            --body-file "${{ steps.review.outputs.comment_path }}"; then
            echo "::warning::Unable to publish/update sticky review comment."
          fi

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zai-review-pr-${{ steps.pr-context.outputs.number }}
          path: ${{ steps.review.outputs.report_path }}
          retention-days: 90
          if-no-files-found: warn
