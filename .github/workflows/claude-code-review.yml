name: Claude Code Review

# Deterministic PR review handoff workflow.
# GitHub Actions prepares context and operators complete the review in AI IDE.

on:
  pull_request:
    types: [opened, synchronize]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number
      focus_area:
        description: "Review focus (security/performance/quality/all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - security
          - performance
          - quality

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure required tools
        run: |
          command -v gh >/dev/null 2>&1 || (echo "::error::gh CLI is required" && exit 1)
          command -v jq >/dev/null 2>&1 || (echo "::error::jq is required" && exit 1)

      - name: Determine PR context
        id: pr-context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo "number=${{ github.event.pull_request.number }}"
              echo "focus=all"
              echo "author=${{ github.event.pull_request.user.login }}"
              echo "association=${{ github.event.pull_request.author_association }}"
            } >> "$GITHUB_OUTPUT"
          else
            pr_data="$(gh pr view ${{ inputs.pr_number }} --json author 2>/dev/null || true)"
            author="$(echo "$pr_data" | jq -r '.author.login // "unknown"')"
            {
              echo "number=${{ inputs.pr_number }}"
              echo "focus=${{ inputs.focus_area }}"
              echo "author=${author}"
              echo "association=MANUAL"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Build review handoff report
        id: review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p reports .tmp

          pr_number="${{ steps.pr-context.outputs.number }}"
          focus_area="${{ steps.pr-context.outputs.focus }}"
          pr_author="${{ steps.pr-context.outputs.author }}"
          pr_association="${{ steps.pr-context.outputs.association }}"

          report_path="reports/pr-${pr_number}-review.md"
          comment_path=".tmp/pr-${pr_number}-review-comment.md"
          marker="zai-review:pr-${pr_number}"
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          status="ready"
          reason="Deterministic handoff prepared."
          pr_title="(unavailable)"
          pr_body="(unavailable)"
          pr_url=""
          changed_files="0"
          additions="0"
          deletions="0"
          files_summary="- File list unavailable"
          checks_summary="- CI checks unavailable"

          pr_json="$(gh pr view "$pr_number" --json title,body,url,changedFiles,additions,deletions 2>/dev/null || true)"
          if [[ -z "$pr_json" || "$pr_json" == "null" ]]; then
            status="degraded"
            reason="Failed to fetch PR metadata via gh pr view."
          else
            pr_title="$(echo "$pr_json" | jq -r '.title // "(no title)"')"
            pr_body="$(echo "$pr_json" | jq -r '.body // "(no description)"')"
            pr_url="$(echo "$pr_json" | jq -r '.url // ""')"
            changed_files="$(echo "$pr_json" | jq -r '.changedFiles // 0')"
            additions="$(echo "$pr_json" | jq -r '.additions // 0')"
            deletions="$(echo "$pr_json" | jq -r '.deletions // 0')"

            api_files="$(
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/files?per_page=100" --paginate \
                --jq '.[] | "- \(.filename) (+\(.additions // 0)/-\(.deletions // 0))"' 2>/dev/null \
                | sed -n '1,40p' || true
            )"
            if [[ -n "$api_files" ]]; then
              files_summary="$api_files"
            fi

            api_checks="$(
              gh pr checks "$pr_number" --json name,state --jq '.[] | "- \(.name): \(.state)"' 2>/dev/null \
                | sed -n '1,40p' || true
            )"
            if [[ -n "$api_checks" ]]; then
              checks_summary="$api_checks"
            fi
          fi

          focus_hint="General quality, correctness, maintainability, and risks."
          case "$focus_area" in
            security)
              focus_hint="Prioritize security vulnerabilities, auth flows, secrets handling, and input validation."
              ;;
            performance)
              focus_hint="Prioritize performance bottlenecks, expensive operations, and scalability issues."
              ;;
            quality)
              focus_hint="Prioritize readability, maintainability, testability, and code quality issues."
              ;;
          esac

          if [[ "$status" == "ready" ]]; then
            status_line="✅ Ready for AI IDE review"
          else
            status_line="⚠️ Degraded context (${reason})"
          fi

          {
            echo "# Code Review Handoff - PR #${pr_number}"
            echo ""
            echo "**Status**: ${status_line}"
            echo "**Reviewed**: $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo "**Review execution**: Manual in AI IDE"
            echo "**Focus**: ${focus_area}"
            echo "**Author**: ${pr_author} (${pr_association})"
            echo ""
            echo "## What this workflow does"
            echo "- Collects deterministic PR context and current CI signals."
            echo "- Publishes a sticky handoff comment and artifact."
            echo "- Does not invoke any AI provider in GitHub Actions."
            echo ""
            echo "## AI IDE handoff"
            echo "1. Open PR #${pr_number} in your AI IDE."
            echo "2. Use this artifact and current CI state as the review baseline."
            echo "3. Return the final review from the IDE as a human-authored PR comment."
            echo ""
            if [[ -n "$pr_url" ]]; then
              echo "## PR"
              echo "- URL: ${pr_url}"
              echo "- Title: ${pr_title}"
              echo ""
            fi
            if [[ "$status" != "ready" ]]; then
              echo "## Context issue"
              echo "${reason}"
              echo ""
            fi
            echo "## PR description"
            echo "${pr_body}"
            echo ""
            echo "## Diff stats"
            echo "- Changed files: ${changed_files}"
            echo "- Additions: ${additions}"
            echo "- Deletions: ${deletions}"
            echo ""
            echo "## Focus guidance"
            echo "${focus_hint}"
            echo ""
            echo "## Changed files"
            echo "${files_summary}"
            echo ""
            echo "## Current CI checks"
            echo "${checks_summary}"
          } > "$report_path"

          {
            echo "<!-- ${marker} -->"
            echo "### PR Review Handoff"
            echo ""
            echo "**Status**: ${status_line}"
            echo "**Focus**: ${focus_area}"
            echo "**Review execution**: Manual in AI IDE"
            echo "**Workflow mode**: Deterministic preflight only"
            echo ""
            echo "No AI provider is invoked in GitHub Actions for this workflow."
            echo ""
            echo "[View workflow run](${run_url})"
          } > "$comment_path"

          {
            echo "## PR Review Handoff"
            echo "- PR: #${pr_number}"
            echo "- Status: ${status_line}"
            echo "- Focus: ${focus_area}"
            echo "- Review execution: Manual in AI IDE"
            echo "- Workflow mode: Deterministic preflight only"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "pr_number=${pr_number}"
            echo "status=${status}"
            echo "reason=${reason}"
            echo "marker=${marker}"
            echo "report_path=${report_path}"
            echo "comment_path=${comment_path}"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert sticky PR comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! scripts/ci/upsert_sticky_comment.sh \
            --repo "${GITHUB_REPOSITORY}" \
            --issue-number "${{ steps.review.outputs.pr_number }}" \
            --marker "${{ steps.review.outputs.marker }}" \
            --body-file "${{ steps.review.outputs.comment_path }}"; then
            echo "::warning::Unable to publish/update sticky review comment."
          fi

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zai-review-pr-${{ steps.pr-context.outputs.number }}
          path: ${{ steps.review.outputs.report_path }}
          retention-days: 90
          if-no-files-found: warn
