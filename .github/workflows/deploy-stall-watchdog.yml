name: Deploy Moltis Stall Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: '7,22,37,52 * * * *'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    name: Detect stalled deploy runs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout trusted default-branch automation
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Evaluate email prerequisites
        id: email
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.MOLTIS_UPDATE_NOTIFY_EMAIL }}
        run: |
          set -euo pipefail

          if [[ -n "$SMTP_SERVER" && -n "$SMTP_USERNAME" && -n "$SMTP_PASSWORD" && -n "$SMTP_TO" ]]; then
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_send=false" >> "$GITHUB_OUTPUT"
            echo "reason=required SMTP secrets are missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate Telegram prerequisites
        id: telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.MOLTIS_UPDATE_NOTIFY_TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          if [[ -n "$TELEGRAM_BOT_TOKEN" && -n "$TELEGRAM_CHAT_ID" ]]; then
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_send=false" >> "$GITHUB_OUTPUT"
            echo "reason=required Telegram secrets are missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect stalled deploy runs
        id: watchdog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RESULT="$(bash ./scripts/deploy-stall-watchdog.sh \
            --repo "${{ github.repository }}" \
            --workflow-name "Deploy Moltis" \
            --workflow-file "deploy.yml" \
            --threshold-minutes 45 \
            --max-runs 100 \
            --json)"
          echo "$RESULT"

          {
            echo "result<<EOF"
            echo "$RESULT"
            echo "EOF"
            echo "status=$(jq -r '.status' <<<"$RESULT")"
            echo "stalled_count=$(jq -r '.stalled_count' <<<"$RESULT")"
          } >> "$GITHUB_OUTPUT"

      - name: Build watchdog payload
        id: payload
        if: ${{ steps.watchdog.outputs.stalled_count != '0' }}
        env:
          WATCHDOG_RESULT: ${{ steps.watchdog.outputs.result }}
        run: |
          set -euo pipefail

          SUBJECT="[Moltis] Stalled Deploy Moltis run(s) detected"
          TELEGRAM_MESSAGE="$(
            jq -r '
              [
                "Detected stalled Deploy Moltis workflow runs.",
                "",
                "Threshold: \(.threshold_minutes) minutes",
                "Checked at: \(.checked_at)",
                "",
                (
                  .stalled_runs[0:5]
                  | map("- run #\(.run_number) (\(.status)) branch=\(.head_branch // "detached") age=\(.age_minutes)m " + .html_url)
                  | join("\n")
                )
              ] | join("\n")
            ' <<<"$WATCHDOG_RESULT"
          )"
          EMAIL_BODY="$(
            jq -r '
              [
                "Detected stalled Deploy Moltis workflow runs.",
                "",
                "Threshold: \(.threshold_minutes) minutes",
                "Checked at: \(.checked_at)",
                "",
                (
                  .stalled_runs[0:10]
                  | map("* run #\(.run_number) (\(.status)) branch=\(.head_branch // "detached") age=\(.age_minutes)m\\n  \(.html_url)")
                  | join("\n")
                )
              ] | join("\n")
            ' <<<"$WATCHDOG_RESULT"
          )"

          {
            echo "subject<<EOF"
            echo "$SUBJECT"
            echo "EOF"
            echo "telegram_message<<EOF"
            echo "$TELEGRAM_MESSAGE"
            echo "EOF"
            echo "email_body<<EOF"
            echo "$EMAIL_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send watchdog email (optional)
        id: send_email
        if: ${{ always() && steps.watchdog.outputs.stalled_count != '0' && steps.email.outputs.should_send == 'true' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT != '' && secrets.SMTP_PORT || '465' }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.MOLTIS_UPDATE_NOTIFY_EMAIL }}
          from: ${{ secrets.MOLTIS_UPDATE_NOTIFY_FROM != '' && secrets.MOLTIS_UPDATE_NOTIFY_FROM || secrets.SMTP_USERNAME }}
          subject: ${{ steps.payload.outputs.subject }}
          body: ${{ steps.payload.outputs.email_body }}

      - name: Send watchdog Telegram notification (optional)
        id: send_telegram
        if: ${{ always() && steps.watchdog.outputs.stalled_count != '0' && steps.telegram.outputs.should_send == 'true' }}
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.MOLTIS_UPDATE_NOTIFY_TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE: ${{ steps.payload.outputs.telegram_message }}
        run: |
          set -euo pipefail

          PAYLOAD="$(jq -nc \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "$TELEGRAM_MESSAGE" \
            '{chat_id: $chat_id, text: $text}')"

          RESULT="$(
            curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD"
          )"
          echo "$RESULT"

          if ! jq -e '.ok == true' >/dev/null 2>&1 <<<"$RESULT"; then
            echo "::error::Telegram send failed"
            exit 1
          fi

      - name: Validate watchdog notification delivery
        if: ${{ always() && steps.watchdog.outputs.stalled_count != '0' }}
        env:
          EMAIL_ENABLED: ${{ steps.email.outputs.should_send || 'false' }}
          TELEGRAM_ENABLED: ${{ steps.telegram.outputs.should_send || 'false' }}
          EMAIL_OUTCOME: ${{ steps.send_email.outcome || 'skipped' }}
          TELEGRAM_OUTCOME: ${{ steps.send_telegram.outcome || 'skipped' }}
        run: |
          set -euo pipefail

          configured_channels=0
          successful_channels=0

          if [[ "$EMAIL_ENABLED" == "true" ]]; then
            configured_channels=$((configured_channels + 1))
            [[ "$EMAIL_OUTCOME" == "success" ]] && successful_channels=$((successful_channels + 1))
          fi

          if [[ "$TELEGRAM_ENABLED" == "true" ]]; then
            configured_channels=$((configured_channels + 1))
            [[ "$TELEGRAM_OUTCOME" == "success" ]] && successful_channels=$((successful_channels + 1))
          fi

          if (( configured_channels > 0 && successful_channels == 0 )); then
            echo "::error::All configured watchdog notification channels failed"
            exit 1
          fi

      - name: Watchdog summary
        if: always()
        env:
          WATCHDOG_RESULT: ${{ steps.watchdog.outputs.result }}
        run: |
          RESULT="${WATCHDOG_RESULT:-}"
          if [[ -z "$RESULT" ]]; then
            RESULT='{"status":"error","stalled_count":0,"stalled_runs":[]}'
          fi

          {
            echo "## Deploy Moltis Stall Watchdog"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Status | \`$(jq -r '.status // "unknown"' <<<"$RESULT")\` |"
            echo "| Stalled count | \`$(jq -r '.stalled_count // 0' <<<"$RESULT")\` |"
            echo "| Threshold (minutes) | \`$(jq -r '.threshold_minutes // 0' <<<"$RESULT")\` |"
            echo "| Email send | \`${{ steps.email.outputs.should_send || 'false' }}\` |"
            echo "| Email outcome | \`${{ steps.send_email.outcome || 'skipped' }}\` |"
            echo "| Telegram send | \`${{ steps.telegram.outputs.should_send || 'false' }}\` |"
            echo "| Telegram outcome | \`${{ steps.send_telegram.outcome || 'skipped' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail watchdog when stalled runs were detected
        if: ${{ steps.watchdog.outputs.stalled_count != '0' }}
        run: |
          echo "::error::Detected stalled Deploy Moltis workflow runs"
          exit 1
