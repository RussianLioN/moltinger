# Moltis Test Suite CI/CD Workflow
# Automated test execution on PR and push to main
#
# Triggered by:
#   - Pull requests to main branch
#   - Push to main branch
#   - Manual workflow dispatch
#
# Test Jobs:
#   - unit-tests: Fast unit tests (< 5 min)
#   - integration-tests: Service integration tests
#   - security-tests: Security validation
#   - e2e-tests: Full stack end-to-end tests (main only)
#
# Blocking Behavior:
#   - Deploy blocked if any test fails
#   - Fast-fail on unit test failure
#   - All results uploaded as artifacts
#
# Part of: 001-docker-deploy-improvements
# Related: deploy.yml (depends on test results)

name: Test Suite

# Prevent parallel test runs for same ref
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - e2e
          - security
      timeout:
        description: 'Test timeout in minutes'
        required: false
        default: '30'
        type: number

env:
  # Test configuration
  MOLTIS_URL: http://localhost:13131
  MOLTIS_PASSWORD: test_password
  TEST_TIMEOUT: ${{ github.event.inputs.timeout || 30 }}

jobs:
  # ============================================================
  # Unit Tests - Fast, isolated tests (< 5 minutes)
  # ============================================================
  # Runs on every PR and push
  # Tests: config validation, circuit breaker logic, metrics
  # ============================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -y -qq jq

      - name: Make test scripts executable
        run: |
          chmod +x tests/run_unit.sh
          chmod +x tests/unit/*.sh
          chmod +x tests/lib/test_helpers.sh

      - name: Run unit tests
        id: unit
        run: |
          echo "::group::Unit Tests"
          if ./tests/run_unit.sh --json > test-results/unit.json 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
            echo "::notice::Unit tests passed"
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "::error::Unit tests failed"
            cat test-results/unit.json
            exit 1
          fi
          echo "::endgroup::"

      - name: Display unit test summary
        if: always()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          if [ -f test-results/unit.json ]; then
            jq -r '"| Total Tests | \(.total_tests) |"' test-results/unit.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Total Tests | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Passed | \(.passed) |"' test-results/unit.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Passed | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Failed | \(.failed) |"' test-results/unit.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Failed | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Status | ${{ steps.unit.outputs.status }} |"' >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | ${{ steps.unit.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/unit.json
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================
  # Integration Tests - Service integration with Docker
  # ============================================================
  # Runs on every PR and push
  # Tests: API endpoints, LLM failover, MCP servers, Telegram
  # Uses GitHub Actions service containers for Moltis
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15

    # Service container for Moltis
    services:
      moltis:
        image: ghcr.io/moltis-org/moltis:latest
        ports:
          - 13131:13131
        env:
          MOLTIS_PASSWORD: test_password
        options: >-
          --health-cmd "curl -sf http://localhost:13131/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -y -qq jq curl

      - name: Wait for Moltis service
        timeout-minutes: 3
        run: |
          echo "::group::Waiting for Moltis service"
          MAX_RETRIES=30
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -sf http://localhost:13131/health > /dev/null 2>&1; then
              echo "::notice::Moltis service is ready"
              exit 0
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT/$MAX_RETRIES: Waiting for Moltis..."
            sleep 5
          done

          echo "::error::Moltis service failed to start"
          docker logs ${{ job.services.moltis.id }}
          exit 1
          echo "::endgroup::"

      - name: Make test scripts executable
        run: |
          chmod +x tests/run_integration.sh
          chmod +x tests/integration/*.sh
          chmod +x tests/lib/test_helpers.sh

      - name: Run integration tests
        id: integration
        env:
          MOLTIS_URL: http://localhost:13131
          MOLTIS_PASSWORD: test_password
        run: |
          echo "::group::Integration Tests"
          if ./tests/run_integration.sh --json > integration-results/integration.json 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
            echo "::notice::Integration tests passed"
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "::error::Integration tests failed"
            cat integration-results/integration.json
            exit 1
          fi
          echo "::endgroup::"

      - name: Display integration test summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          if [ -f integration-results/integration.json ]; then
            jq -r '"| Total Tests | \(.total_tests) |"' integration-results/integration.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Total Tests | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Passed | \(.passed) |"' integration-results/integration.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Passed | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Failed | \(.failed) |"' integration-results/integration.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Failed | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Status | ${{ steps.integration.outputs.status }} |"' >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | ${{ steps.integration.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: integration-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Moltis service logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: moltis-service-logs
          path: /var/run/docker/containers/${{ job.services.moltis.id }}/*.log
          retention-days: 3
          if-no-files-found: warn

  # ============================================================
  # Security Tests - Security validation
  # ============================================================
  # Runs on every PR and push
  # Tests: Authentication, input validation, secret exposure
  # ============================================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -y -qq jq

      - name: Make test scripts executable
        run: |
          chmod +x tests/run_security.sh
          chmod +x tests/security/*.sh
          chmod +x tests/lib/test_helpers.sh

      - name: Run security tests
        id: security
        run: |
          echo "::group::Security Tests"
          if ./tests/run_security.sh --json > security-results/security.json 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
            echo "::notice::Security tests passed (no issues found)"
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "::warning::Security tests found issues"
            cat security-results/security.json
            # Don't fail the build on security warnings (just report)
            echo "security_issues=true" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Display security test summary
        if: always()
        run: |
          echo "## Security Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          if [ -f security-results/security.json ]; then
            jq -r '"| Total Checks | \(.total_checks) |"' security-results/security.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Total Checks | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Issues Found | \(.issues_found) |"' security-results/security.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Issues Found | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Critical | \(.critical) |"' security-results/security.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Critical | 0 |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| High | \(.high) |"' security-results/security.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| High | 0 |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ${{ steps.security.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | ${{ steps.security.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: security-results/
          retention-days: 30  # Keep longer for audit
          if-no-files-found: ignore

      - name: Create security issue on findings
        if: failure() && steps.security.outputs.status == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Security Issues Detected in Test Suite';
            const body = `## Security Test Results
            Security tests found issues during workflow run ${{ github.run_number }}.

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Actor:** ${{ github.actor }}

            Please review the security test artifacts for details.
            `;

            // Only create issue if it doesn't exist
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security', 'automated']
            });

            const exists = issues.some(issue => issue.title.includes(title));

            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'automated']
              });
            }

  # ============================================================
  # E2E Tests - Full stack end-to-end tests
  # ============================================================
  # Runs on push to main or manual dispatch only
  # Tests: Complete chat flow, failover chain, recovery scenarios
  # Requires full Docker stack
  # ============================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [integration-tests, security-tests]
    # Only run E2E on main push or manual trigger (not PRs)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -y -qq jq docker-compose

      - name: Make test scripts executable
        run: |
          chmod +x tests/run_e2e.sh
          chmod +x tests/e2e/*.sh
          chmod +x tests/lib/test_helpers.sh

      - name: Start Docker stack
        run: |
          echo "::group::Starting Docker stack"
          docker-compose -f docker-compose.yml up -d

          # Wait for services to be healthy
          MAX_WAIT=120
          WAIT_TIME=0
          while [ $WAIT_TIME -lt $MAX_WAIT ]; do
            if curl -sf http://localhost:13131/health > /dev/null 2>&1; then
              echo "::notice::Docker stack is ready"
              break
            fi
            WAIT_TIME=$((WAIT_TIME + 5))
            echo "Waiting for services... ($WAIT_TIME/$MAX_WAIT)"
            sleep 5
          done

          if [ $WAIT_TIME -ge $MAX_WAIT ]; then
            echo "::error::Docker stack failed to start"
            docker-compose -f docker-compose.yml logs
            exit 1
          fi
          echo "::endgroup::"

      - name: Run E2E tests
        id: e2e
        env:
          MOLTIS_URL: http://localhost:13131
          MOLTIS_PASSWORD: test_password
          TEST_TIMEOUT: ${{ env.TEST_TIMEOUT }}
        run: |
          echo "::group::E2E Tests"
          if ./tests/run_e2e.sh --json --timeout ${{ env.TEST_TIMEOUT }} > e2e-results/e2e.json 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
            echo "::notice::E2E tests passed"
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "::error::E2E tests failed"
            cat e2e-results/e2e.json
            exit 1
          fi
          echo "::endgroup::"

      - name: Stop Docker stack
        if: always()
        run: |
          docker-compose -f docker-compose.yml down -v || true

      - name: Display E2E test summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          if [ -f e2e-results/e2e.json ]; then
            jq -r '"| Total Scenarios | \(.total_scenarios) |"' e2e-results/e2e.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Total Scenarios | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Passed | \(.passed) |"' e2e-results/e2e.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Passed | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Failed | \(.failed) |"' e2e-results/e2e.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Failed | N/A |" >> $GITHUB_STEP_SUMMARY
            jq -r '"| Duration | \(.duration) |"' e2e-results/e2e.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| Duration | N/A |" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ${{ steps.e2e.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | ${{ steps.e2e.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: |
            /var/run/docker/containers/**/*.log
            docker-compose-logs.txt
          retention-days: 3
          if-no-files-found: warn

  # ============================================================
  # Test Summary - Aggregate all test results
  # ============================================================
  # Runs after all tests complete
  # Provides consolidated test report
  # ============================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests, e2e-tests]
    if: always()

    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts

      - name: Generate test summary
        run: |
          echo "# Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅ Pass' || needs.integration-tests.result == 'skipped' && '⊘ Skipped' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Tests | ${{ needs.security-tests.result == 'success' && '✅ Pass' || needs.security-tests.result == 'skipped' && '⊘ Skipped' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result == 'success' && '✅ Pass' || needs.e2e-tests.result == 'skipped' && '⊘ Skipped' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All test results have been uploaded as artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Check overall test status
        run: |
          # Fail if any critical test failed
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "::error::Unit tests failed - blocking deployment"
            exit 1
          fi

          if [ "${{ needs.integration-tests.result }}" != "success" ] && [ "${{ needs.integration-tests.result }}" != "skipped" ]; then
            echo "::error::Integration tests failed - blocking deployment"
            exit 1
          fi

          # Security tests show warnings but don't block
          if [ "${{ needs.security-tests.result }}" != "success" ] && [ "${{ needs.security-tests.result }}" != "skipped" ]; then
            echo "::warning::Security tests found issues - review required"
          fi

          if [ "${{ needs.e2e-tests.result }}" != "success" ] && [ "${{ needs.e2e-tests.result }}" != "skipped" ]; then
            echo "::error::E2E tests failed - blocking deployment"
            exit 1
          fi

          echo "::notice::All critical tests passed - deployment can proceed"
