# Moltis Test Suite CI/CD Workflow
# Automated test execution on PR and push to main
#
# Features:
#   - Matrix testing support (multi-OS, multi-shell)
#   - Test result caching for faster builds
#   - Slack notification on failure
#   - Artifact uploads for all test results
#
# Part of: 001-docker-deploy-improvements

name: Test Suite

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options: [all, unit, integration, e2e, security]
      enable_matrix:
        description: 'Enable matrix testing'
        type: boolean
        default: false

jobs:
  # ============================================================
  # Unit Tests with Matrix Support
  # ============================================================
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    # Matrix testing support
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        # Expand matrix when enable_matrix is true
        include:
          - os: ubuntu-latest
            variant: default
      max-parallel: 4

    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Cache test dependencies
      - name: Cache test dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
            test-results
          key: ${{ runner.os }}-test-deps-${{ hashFiles('tests/run_unit.sh', 'tests/lib/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-test-deps-

      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -y -qq jq

      - name: Make scripts executable
        run: chmod +x tests/*.sh tests/unit/*.sh tests/lib/*.sh

      - name: Run unit tests
        id: unit
        run: |
          mkdir -p test-results
          if ./tests/run_unit.sh --json > test-results/unit.json 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            cat test-results/unit.json
            exit 1
          fi

      - name: Display summary
        if: always()
        run: |
          echo "## Unit Tests (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.unit.outputs.status }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.variant }}
          path: test-results/
          retention-days: 7

  # ============================================================
  # Integration Tests
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15

    services:
      moltis:
        image: ghcr.io/moltis-org/moltis:latest
        ports:
          - 13131:13131
        env:
          MOLTIS_PASSWORD: test_password
        options: >-
          --health-cmd "curl -sf http://localhost:13131/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      # Cache integration dependencies
      - name: Cache integration dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
            integration-results
          key: ${{ runner.os }}-integration-${{ hashFiles('tests/run_integration.sh', 'tests/integration/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-integration-

      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -y -qq jq curl

      - name: Make scripts executable
        run: chmod +x tests/*.sh tests/integration/*.sh tests/lib/*.sh

      - name: Wait for Moltis
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:13131/health; then
              echo "Moltis is ready"
              exit 0
            fi
            sleep 5
          done
          echo "Moltis failed to start"
          exit 1

      - name: Run integration tests
        id: integration
        env:
          MOLTIS_URL: http://localhost:13131
          MOLTIS_PASSWORD: test_password
        run: |
          mkdir -p integration-results
          if ./tests/run_integration.sh --json > integration-results/integration.json 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            cat integration-results/integration.json
            exit 1
          fi

      - name: Display summary
        if: always()
        run: |
          echo "## Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.integration.outputs.status }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: integration-results/
          retention-days: 7

  # ============================================================
  # Security Tests
  # ============================================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Cache security dependencies
      - name: Cache security dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
            security-results
          key: ${{ runner.os }}-security-${{ hashFiles('tests/run_security.sh', 'tests/security/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-security-

      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -y -qq jq

      - name: Make scripts executable
        run: chmod +x tests/*.sh tests/security/*.sh tests/lib/*.sh

      - name: Run security tests
        id: security
        run: |
          mkdir -p security-results
          if ./tests/run_security.sh --json > security-results/security.json 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            # Security warnings don't block
            echo "security_issues=true" >> $GITHUB_OUTPUT
          fi

      - name: Display summary
        if: always()
        run: |
          echo "## Security Tests" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.security.outputs.status }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: security-results/
          retention-days: 30

  # ============================================================
  # E2E Tests (main branch only)
  # ============================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [integration-tests, security-tests]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Cache E2E dependencies
      - name: Cache E2E dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
            e2e-results
          key: ${{ runner.os }}-e2e-${{ hashFiles('tests/run_e2e.sh', 'tests/e2e/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-e2e-

      - name: Install dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -y -qq jq docker-compose

      - name: Make scripts executable
        run: chmod +x tests/*.sh tests/e2e/*.sh tests/lib/*.sh

      - name: Start Docker stack
        run: |
          docker-compose -f docker-compose.yml up -d
          for i in {1..24}; do
            if curl -sf http://localhost:13131/health; then
              echo "Stack is ready"
              exit 0
            fi
            sleep 5
          done
          echo "Stack failed to start"
          docker-compose -f docker-compose.yml logs
          exit 1

      - name: Run E2E tests
        id: e2e
        env:
          MOLTIS_URL: http://localhost:13131
          MOLTIS_PASSWORD: test_password
        run: |
          mkdir -p e2e-results
          if ./tests/run_e2e.sh --json --timeout 300 > e2e-results/e2e.json 2>&1; then
            echo "status=pass" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            cat e2e-results/e2e.json
            exit 1
          fi

      - name: Stop Docker stack
        if: always()
        run: docker-compose -f docker-compose.yml down -v || true

      - name: Display summary
        if: always()
        run: |
          echo "## E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.e2e.outputs.status }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: e2e-results/
          retention-days: 7

  # ============================================================
  # Slack Notification on Failure
  # ============================================================
  notify-slack:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests, e2e-tests]
    # Only notify on main branch failures
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured, skipping"
            exit 0
          fi

          # Build failed tests list
          FAILED=""
          [ "${{ needs.unit-tests.result }}" != "success" ] && FAILED+="Unit Tests, "
          [ "${{ needs.integration-tests.result }}" != "success" ] && [ "${{ needs.integration-tests.result }}" != "skipped" ] && FAILED+="Integration Tests, "
          [ "${{ needs.e2e-tests.result }}" != "success" ] && [ "${{ needs.e2e-tests.result }}" != "skipped" ] && FAILED+="E2E Tests, "
          FAILED=${FAILED%, }

          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": ':x: Test Suite Failed on *${{ github.ref_name }}*',
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {\"type\": \"plain_text\", \"text\": ':x: Test Suite Failed'}
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Repo:*\\n${{ github.repository }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Branch:*\\n${{ github.ref_name }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\\n${{ github.sha }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Actor:*\\n${{ github.actor }}\"}
                  ]
                },
                {
                  \"type\": \"section\",
                  \"text\": {\"type\": \"mrkdwn\", \"text\": \"*Failed:*\\n$FAILED\"}
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {\"type\": \"button\", \"text\": {\"type\": \"plain_text\", \"text\": \"View Run\"}, \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"},
                    {\"type\": \"button\", \"text\": {\"type\": \"plain_text\", \"text\": \"View Commit\"}, \"url\": \"${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}\"}
                  ]
                }
              ]
            }" \
            "$SLACK_WEBHOOK_URL"

  # ============================================================
  # Test Summary
  # ============================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests, e2e-tests]
    if: always()

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts

      - name: Generate summary
        run: |
          echo "# Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit | ${{ needs.unit-tests.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration-tests.result == 'success' && '✅' || needs.integration-tests.result == 'skipped' && '⊘' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-tests.result == 'success' && '✅' || needs.security-tests.result == 'skipped' && '⊘' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E | ${{ needs.e2e-tests.result == 'success' && '✅' || needs.e2e-tests.result == 'skipped' && '⊘' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check status
        run: |
          [ "${{ needs.unit-tests.result }}" != "success" ] && exit 1 || true
          [ "${{ needs.integration-tests.result }}" != "success" ] && [ "${{ needs.integration-tests.result }}" != "skipped" ] && exit 1 || true
          [ "${{ needs.e2e-tests.result }}" != "success" ] && [ "${{ needs.e2e-tests.result }}" != "skipped" ] && exit 1 || true
          echo "All critical tests passed"
