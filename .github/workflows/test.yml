name: Test Suite

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      lane_group:
        description: Lane group or individual lane to run
        required: false
        default: pr
        type: choice
        options:
          - pr
          - main
          - nightly
          - all
          - static
          - component
          - topology_registry
          - integration_local
          - security_api
          - mcp_fake
          - e2e_browser
          - resilience
          - live_external
          - security_runtime_smoke
          - telegram_live
          - provider_live
          - mcp_real
      live_mode:
        description: Enable live-only suites
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  resolve-target:
    name: Resolve lane group
    runs-on: ubuntu-latest
    outputs:
      lane_group: ${{ steps.resolve.outputs.lane_group }}
      live_mode: ${{ steps.resolve.outputs.live_mode }}
      artifact_name: ${{ steps.resolve.outputs.artifact_name }}
      compose_project: ${{ steps.resolve.outputs.compose_project }}
    steps:
      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_LANE_GROUP: ${{ github.event.inputs.lane_group || '' }}
          INPUT_LIVE_MODE: ${{ github.event.inputs.live_mode || 'false' }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            pull_request)
              lane_group="pr"
              live_mode="false"
              ;;
            push)
              lane_group="main"
              live_mode="false"
              ;;
            schedule)
              lane_group="nightly"
              live_mode="true"
              ;;
            workflow_dispatch)
              lane_group="${INPUT_LANE_GROUP:-pr}"
              live_mode="${INPUT_LIVE_MODE:-false}"
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME" >&2
              exit 1
              ;;
          esac

          artifact_name="test-results-${lane_group//[^A-Za-z0-9_-]/-}"
          compose_project="ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          {
            echo "lane_group=$lane_group"
            echo "live_mode=$live_mode"
            echo "artifact_name=$artifact_name"
            echo "compose_project=$compose_project"
          } >> "$GITHUB_OUTPUT"

  run-tests:
    name: Run ${{ needs.resolve-target.outputs.lane_group }}
    runs-on: ubuntu-latest
    needs: resolve-target
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Install OS dependencies
        run: |
          sudo apt-get update -yqq
          sudo apt-get install -y -qq jq sqlite3

      - name: Install npm dependencies
        run: npm install --no-fund --no-audit

      - name: Make shell scripts executable
        run: |
          find tests scripts -type f -name '*.sh' -exec chmod +x {} +

      - name: Run canonical lane group
        id: run
        continue-on-error: true
        env:
          LANE_GROUP: ${{ needs.resolve-target.outputs.lane_group }}
          LIVE_MODE: ${{ needs.resolve-target.outputs.live_mode }}
          COMPOSE_PROJECT: ${{ needs.resolve-target.outputs.compose_project }}
        run: |
          set -euo pipefail
          mkdir -p test-results

          args=(--lane "$LANE_GROUP" --json --junit --compose-project "$COMPOSE_PROJECT")
          if [[ "$LIVE_MODE" == "true" ]]; then
            args+=(--live)
          fi

          set +e
          TEST_REPORT_DIR="$PWD/test-results" ./tests/run.sh "${args[@]}" > test-results/runner.stdout 2> test-results/runner.stderr
          runner_exit_code=$?
          set -e

          printf '%s\n' "$runner_exit_code" > test-results/runner-exit-code.txt
          echo "runner_exit_code=$runner_exit_code" >> "$GITHUB_OUTPUT"

      - name: Collect diagnostics
        if: always()
        env:
          COMPOSE_PROJECT: ${{ needs.resolve-target.outputs.compose_project }}
        run: |
          set -euo pipefail
          mkdir -p test-results/diagnostics

          docker compose -f compose.test.yml -p "$COMPOSE_PROJECT" ps > test-results/diagnostics/compose-ps.txt 2>&1 || true
          docker compose -f compose.test.yml -p "$COMPOSE_PROJECT" logs --no-color > test-results/diagnostics/compose-logs.txt 2>&1 || true
          docker ps -a > test-results/diagnostics/docker-ps.txt 2>&1 || true

          container_ids=$(docker ps -aq --filter "label=com.docker.compose.project=$COMPOSE_PROJECT")
          if [[ -n "$container_ids" ]]; then
            docker inspect $container_ids > test-results/diagnostics/docker-inspect.json 2>&1 || true
          else
            echo "No compose containers found for $COMPOSE_PROJECT" > test-results/diagnostics/docker-inspect.json
          fi

      - name: Publish runner summary
        if: always()
        env:
          LANE_GROUP: ${{ needs.resolve-target.outputs.lane_group }}
          LIVE_MODE: ${{ needs.resolve-target.outputs.live_mode }}
        run: |
          set -euo pipefail
          echo "## Canonical Runner" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lane/group: \`$LANE_GROUP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Live mode: \`$LIVE_MODE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runner exit code: \`$(cat test-results/runner-exit-code.txt 2>/dev/null || echo missing)\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f test-results/summary.json ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            jq -r '
              "| Metric | Value |",
              "| --- | --- |",
              "| Aggregate status | `" + .status + "` |",
              "| Total suites | `" + ((.summary.total_suites // 0)|tostring) + "` |",
              "| Total cases | `" + ((.summary.total_cases // 0)|tostring) + "` |",
              "| Passed | `" + ((.summary.passed // 0)|tostring) + "` |",
              "| Failed | `" + ((.summary.failed // 0)|tostring) + "` |",
              "| Skipped | `" + ((.summary.skipped // 0)|tostring) + "` |"
            ' test-results/summary.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "`summary.json` was not produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve-target.outputs.artifact_name }}
          path: test-results/
          if-no-files-found: error
          retention-days: 14

  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs: [resolve-target, run-tests]
    if: always()
    steps:
      - name: Download canonical test artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.resolve-target.outputs.artifact_name }}
          path: test-artifacts

      - name: Evaluate summary.json
        run: |
          set -euo pipefail

          summary_file=$(find test-artifacts -name summary.json -print -quit)
          if [[ -z "$summary_file" || ! -s "$summary_file" ]]; then
            echo "Missing summary.json artifact" >&2
            exit 1
          fi

          jq -e '
            (.lane | type == "string") and
            ((.status == "passed") or (.status == "failed") or (.status == "skipped")) and
            (.summary.total_cases | type == "number") and
            (.summary.passed | type == "number") and
            (.summary.failed | type == "number") and
            (.summary.skipped | type == "number") and
            (.cases | type == "array")
          ' "$summary_file" >/dev/null

          lane=$(jq -r '.lane' "$summary_file")
          status=$(jq -r '.status' "$summary_file")
          total_cases=$(jq -r '.summary.total_cases' "$summary_file")
          passed=$(jq -r '.summary.passed' "$summary_file")
          failed=$(jq -r '.summary.failed' "$summary_file")
          skipped=$(jq -r '.summary.skipped' "$summary_file")

          echo "## Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lane/group | \`$lane\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Aggregate status | \`$status\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total cases | \`$total_cases\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | \`$passed\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed | \`$failed\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Skipped | \`$skipped\` |" >> "$GITHUB_STEP_SUMMARY"

          if jq -e '.cases | map(select(.status == "failed" or .status == "error")) | length > 0' "$summary_file" >/dev/null; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Failed cases" >> "$GITHUB_STEP_SUMMARY"
            jq -r '
              .cases
              | map(select(.status == "failed" or .status == "error"))
              | .[:20]
              | map("- `" + .id + "`: " + (.message // .status))
              | .[]
            ' "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$total_cases" -le 0 ]]; then
            echo "summary.json contains no test cases" >&2
            exit 1
          fi

          if [[ "$status" != "passed" ]]; then
            echo "Gate failed because summary.json status is $status" >&2
            exit 1
          fi

  notify-slack:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [resolve-target, gate]
    if: always() && github.ref == 'refs/heads/main' && needs.gate.result == 'failure'
    steps:
      - name: Download canonical test artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.resolve-target.outputs.artifact_name }}
          path: test-artifacts

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "SLACK_WEBHOOK_URL not configured, skipping"
            exit 0
          fi

          summary_file=$(find test-artifacts -name summary.json -print -quit)
          if [[ -z "$summary_file" || ! -s "$summary_file" ]]; then
            echo "summary.json missing, skipping Slack payload generation"
            exit 0
          fi

          lane=$(jq -r '.lane' "$summary_file")
          status=$(jq -r '.status' "$summary_file")
          passed=$(jq -r '.summary.passed' "$summary_file")
          failed=$(jq -r '.summary.failed' "$summary_file")
          skipped=$(jq -r '.summary.skipped' "$summary_file")
          failed_cases=$(jq -r '
            .cases
            | map(select(.status == "failed" or .status == "error"))
            | .[:10]
            | map("- " + .id + ": " + (.message // .status))
            | if length == 0 then "- no failed cases recorded" else join("\n") end
          ' "$summary_file")

          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg lane "$lane" \
            --arg status "$status" \
            --arg passed "$passed" \
            --arg failed "$failed" \
            --arg skipped "$skipped" \
            --arg failed_cases "$failed_cases" \
            '{
              text: (":x: Test gate failed for " + $repo + " on " + $branch),
              blocks: [
                {
                  type: "header",
                  text: {type: "plain_text", text: ":x: Test gate failed"}
                },
                {
                  type: "section",
                  fields: [
                    {type: "mrkdwn", text: "*Repo:*\n" + $repo},
                    {type: "mrkdwn", text: "*Branch:*\n" + $branch},
                    {type: "mrkdwn", text: "*Actor:*\n" + $actor},
                    {type: "mrkdwn", text: "*Lane/group:*\n" + $lane}
                  ]
                },
                {
                  type: "section",
                  fields: [
                    {type: "mrkdwn", text: "*Aggregate status:*\n`" + $status + "`"},
                    {type: "mrkdwn", text: "*Passed / Failed / Skipped:*\n`" + $passed + " / " + $failed + " / " + $skipped + "`"}
                  ]
                },
                {
                  type: "section",
                  text: {type: "mrkdwn", text: "*Failed cases:*\n" + $failed_cases}
                },
                {
                  type: "actions",
                  elements: [
                    {type: "button", text: {type: "plain_text", text: "View run"}, url: $run_url}
                  ]
                }
              ]
            }')

          curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
