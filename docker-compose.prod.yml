# Moltis Production Docker Deployment
# Version: 2.0
# Features: Resource limits, health checks, logging, secrets, monitoring

x-common-env: &common-env
  # Network configuration
  MOLTIS_HOST: 0.0.0.0
  MOLTIS_NO_TLS: "true"
  MOLTIS_BEHIND_PROXY: "true"

x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:13131/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-logging: &logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    labels: "service,environment"

services:
  # ========================================================================
  # MOLTIS - Main Application
  # ========================================================================
  moltis:
    image: ghcr.io/moltis-org/moltis:${MOLTIS_VERSION:-v1.7.0}
    container_name: moltis
    restart: unless-stopped

    # Security: Drop all capabilities, add only what's needed
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Required for Docker socket access (sandbox execution)
    privileged: true
    read_only: false

    ports:
      - "${MOLTIS_PORT:-13131}:13131"
      - "${MOLTIS_REDIRECT_PORT:-13132}:13132"

    volumes:
      - ./config:/home/moltis/.config/moltis:ro
      - moltis-data:/home/moltis/.moltis
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      <<: *common-env
      # Secrets are read from Docker secrets (see secrets section below)
      MOLTIS_PASSWORD_FILE: /run/secrets/moltis_password
      # Telegram bot configuration
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      # Tavily API for MCP server
      TAVILY_API_KEY_FILE: /run/secrets/tavily_api_key
      # GLM-5 API key for Z.ai Coding Plan (OpenAI-compatible)
      GLM_API_KEY_FILE: /run/secrets/glm_api_key

    # Production secrets management
    secrets:
      - moltis_password
      - telegram_bot_token
      - tavily_api_key
      - glm_api_key

    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

    healthcheck:
      <<: *healthcheck

    logging:
      <<: *logging
      options:
        labels: "service=moltis,environment=production"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.moltis.rule=Host(`${MOLTIS_DOMAIN:-ainetic.tech}`)"
      - "traefik.http.routers.moltis.entrypoints=websecure"
      - "traefik.http.routers.moltis.tls.certresolver=letsencrypt"
      - "traefik.http.services.moltis.loadbalancer.server.port=13131"
      - "traefik.http.services.moltis.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.moltis.loadbalancer.healthcheck.interval=30s"
      - "com.centurylinklabs.watchtower.enable=true"
      # Monitoring labels
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=13131"
      - "prometheus.io/path=/metrics"

    networks:
      - traefik_proxy
      - monitoring

  # ========================================================================
  # WATCHTOWER - Auto-updates with notifications
  # ========================================================================
  watchtower:
    image: containrrr/watchtower:v1.7.1
    container_name: watchtower
    restart: unless-stopped

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/watchtower:/config:ro

    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "86400"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_NOTIFICATIONS: "email"
      WATCHTOWER_NOTIFICATION_EMAIL_FROM: ${WATCHTOWER_EMAIL_FROM:-}
      WATCHTOWER_NOTIFICATION_EMAIL_TO: ${WATCHTOWER_EMAIL_TO:-}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER: ${SMTP_HOST:-}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT: ${SMTP_PORT:-587}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER: ${SMTP_USER:-}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD: ${SMTP_PASSWORD:-}
      WATCHTOWER_TIMEOUT: "300"

    logging:
      <<: *logging
      options:
        labels: "service=watchtower,environment=production"

    networks:
      - monitoring

  # ========================================================================
  # CADVISOR - Container Metrics
  # ========================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

    privileged: true
    devices:
      - /dev/kmsg

    command:
      - "--housekeeping_interval=30s"
      - "--docker_only=true"
      - "--disable_metrics=disk,network,tcp,udp,percpu,sched,hugetlb,referenced_memory,cpu_topology,resctrl"

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      <<: *logging
      options:
        labels: "service=cadvisor,environment=production"

    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=8080"
      - "prometheus.io/path=/metrics"

    networks:
      - monitoring

  # ========================================================================
  # PROMETHEUS - Metrics Collection
  # ========================================================================
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      <<: *logging
      options:
        labels: "service=prometheus,environment=production"

    networks:
      - monitoring

  # ========================================================================
  # ALERTMANAGER - Alert Handling
  # ========================================================================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped

    ports:
      - "9093:9093"

    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager

    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      <<: *logging
      options:
        labels: "service=alertmanager,environment=production"

    networks:
      - monitoring

  # ========================================================================
  # OLLAMA - Fallback LLM Sidecar
  # ========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-fallback
    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama-data:/root/.ollama

    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_ORIGINS: "*"
      # API key for cloud models (from .env, GitOps-compliant)
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}

    # Resource limits for LLM inference
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      <<: *logging
      options:
        labels: "service=ollama,environment=production"

    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=11434"
      - "prometheus.io/path=/metrics"

    networks:
      - monitoring

# ========================================================================
# SECRETS - Secure credential management
# ========================================================================
secrets:
  moltis_password:
    file: ./secrets/moltis_password.txt
  telegram_bot_token:
    file: ./secrets/telegram_bot_token.txt
  tavily_api_key:
    file: ./secrets/tavily_api_key.txt
  glm_api_key:
    file: ./secrets/glm_api_key.txt
  # OLLAMA_API_KEY uses environment variable (GitOps-compliant via CI/CD .env)

# ========================================================================
# VOLUMES
# ========================================================================
volumes:
  moltis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  ollama-data:
    driver: local
  prometheus-data:
  alertmanager-data:

# ========================================================================
# NETWORKS
# ========================================================================
networks:
  traefik_proxy:
    external: true
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
