# Reviewed intent sidecar for `docs/GIT-TOPOLOGY-REGISTRY.md`.
# Keep records sorted by `subject_type`, then `subject_key`.
# Allowed subject_type: `branch`, `worktree`, `remote`
# Allowed intent: `active`, `historical`, `extract-only`, `cleanup-candidate`, `protected`, `needs-decision`
# `subject_key` must match the rendered registry row key exactly.
# `pr` is optional and stores the related GitHub PR number when it exists.
version: 1
defaults:
  missing_intent: needs-decision
records:
  - subject_type: branch
    subject_key: chore/topology-registry-publish
    intent: protected
    note: Dedicated single-writer publish lane for topology snapshots; keep out of ordinary cleanup.
  - subject_type: branch
    subject_key: codex/full-review
    intent: protected
    note: Protected parallel Codex review lane; keep out of automated cleanup.
  - subject_type: branch
    subject_key: main
    intent: active
    note: Canonical source of truth; checked out in the primary root worktree.
  - subject_type: remote
    subject_key: origin/chore/topology-registry-publish
    intent: protected
    note: Dedicated publish remote for topology snapshot publication.
  - subject_type: worktree
    subject_key: codex-full-review
    intent: protected
    note: Parallel Codex session; protect from cleanup.
  - subject_type: worktree
    subject_key: moltinger-chore-topology-registry-publish
    intent: protected
    note: Dedicated single-writer publish worktree for topology snapshots.
  - subject_type: worktree
    subject_key: primary-root
    intent: active
    note: Canonical root worktree; neutral base for triage, cleanup, and merges.
