# Reviewed intent sidecar for `docs/GIT-TOPOLOGY-REGISTRY.md`.
# Keep records sorted by `subject_type`, then `subject_key`.
# Allowed subject_type: `branch`, `worktree`, `remote`
# Allowed intent: `active`, `historical`, `extract-only`, `cleanup-candidate`, `protected`, `needs-decision`
# `subject_key` must match the rendered registry row key exactly.
# `pr` is optional and stores the related GitHub PR number when it exists.
version: 1
defaults:
  missing_intent: needs-decision
records:
  - subject_type: branch
    subject_key: 001-clawdiy-agent-platform
    intent: active
    note: Active permanent-agent platform rollout branch.
  - subject_type: branch
    subject_key: 001-docker-deploy-improvements
    intent: historical
    note: Historical branch.
  - subject_type: branch
    subject_key: 001-fallback-llm-ollama
    intent: historical
    note: Historical branch.
  - subject_type: branch
    subject_key: 001-moltis-docker-deploy
    intent: historical
    note: Historical branch with local drift.
  - subject_type: branch
    subject_key: 003-testing-infrastructure
    intent: historical
    note: Historical planning branch.
  - subject_type: branch
    subject_key: codex/004-telegram-e2e-harness
    intent: extract-only
    note: Unmerged source branch; treat as extraction source, not merge target.
  - subject_type: branch
    subject_key: codex/fix-bot
    intent: extract-only
    note: PR #8 already merged, but branch still contains extra commits; do not merge raw.
    pr: 8
  - subject_type: branch
    subject_key: codex/full-review
    intent: protected
    note: Open parallel branch; separate worktree exists.
    pr: 6
  - subject_type: branch
    subject_key: codex/webhook-moltinger
    intent: extract-only
    note: Valuable but broad operational branch; extract selectively.
  - subject_type: branch
    subject_key: main
    intent: active
    note: Canonical source of truth; checked out in the primary root worktree.
  - subject_type: branch
    subject_key: test/rca-guard-uat-20260307-0015
    intent: cleanup-candidate
    note: Local-only stale test branch with gone upstream.
  - subject_type: remote
    subject_key: origin/001-frontend
    intent: cleanup-candidate
    note: Review later; currently dangling.
  - subject_type: remote
    subject_key: origin/001-moltis-docker-deploy
    intent: historical
    note: Historical; review before cleanup.
  - subject_type: remote
    subject_key: origin/003-testing-infrastructure
    intent: historical
    note: Historical planning branch.
  - subject_type: remote
    subject_key: origin/codex/004-telegram-e2e-harness
    intent: extract-only
    note: Source for future Telegram consolidation.
  - subject_type: remote
    subject_key: origin/codex/fix-bot
    intent: extract-only
    note: Source for future Telegram consolidation.
    pr: 8
  - subject_type: remote
    subject_key: origin/codex/webhook-moltinger
    intent: extract-only
    note: Source for future Telegram consolidation.
  - subject_type: worktree
    subject_key: codex-full-review
    intent: protected
    note: Parallel Codex session; protect from cleanup.
    pr: 6
  - subject_type: worktree
    subject_key: primary-root
    intent: active
    note: Canonical root worktree; neutral base for triage, cleanup, and merges.
